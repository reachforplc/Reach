              const filtered = prev.filter(s => s.teacherLabel !== parsed.teacherLabel);
              const next = [...filtered, parsed];
              setTimeout(() => { setNameMap(cm => { setPendingMismatches(() => detectMismatches(next, cm)); return cm; }); }, 0);
              return next;
            });
            if (parsed._needsRename) {
              const guess = guessLabelsFromRows(rows, parsed, name);
              setPendingRenames(prev => ({ ...prev, [parsed.teacherLabel]: { teacherName: guess.teacherName, label: guess.teacherLabel, previewStudents: guess.previewStudents, source: guess.source } }));
            }
            return;
          }

          // Generic path — check saved mappings: exact match first, loose fallback second
          const fp = headerFingerprint(rows[0] || []);
          const fpLoose = headerFingerprintLoose(rows[0] || []);

          // Try exact fingerprint first, then loose fingerprint
          const savedMapping = columnMappings[fp] ||
            Object.entries(columnMappings).find(([k, v]) =>
              k.startsWith("loose:") && k === fpLoose
            )?.[1];

          if (savedMapping) {
            // Known format — apply silently
            const newSections = parseGenericGradebook(rows, savedMapping, name);
            if (!newSections.length) { setError(`Could not parse "${file.name}" with the saved mapping.`); return; }
            setSections(prev => {
              const filtered = prev.filter(s => !newSections.find(ns => ns.teacherLabel === s.teacherLabel));
              const next = [...filtered, ...newSections];
              setTimeout(() => { setNameMap(cm => { setPendingMismatches(() => detectMismatches(next, cm)); return cm; }); }, 0);
              return next;
            });
            return;
          }

          // Unknown format — show mapping UI
          setPendingMapping({ rows, fileName: file.name, name });
        } catch (err) {
          setError("Error reading file: " + err.message);
        }
      };
      reader.readAsText(file);
    });
  };

  const onDrop = useCallback((e) => {
    e.preventDefault();
    setDragOver(false);
    processFiles(e.dataTransfer.files);
  }, []);

  const removeSection = (label) => {
    setSections(prev => prev.filter(s => s.teacherLabel !== label));
  };

  // Called when facilitator confirms a column mapping from the UI
  const confirmMapping = (mapping) => {
    if (!pendingMapping) return;
    const { rows, fileName, name } = pendingMapping;
    const fp = headerFingerprint(rows[0] || []);
    const fpLoose = headerFingerprintLoose(rows[0] || []);
    // Store the source filename so it's recognizable in the saved mappings list
    const mappingWithMeta = { ...mapping, _sourceName: fileName, _savedAt: new Date().toISOString().slice(0, 10) };
    const updated = { ...columnMappings, [fp]: mappingWithMeta, [fpLoose]: mappingWithMeta };
    setColumnMappings(updated);
    if (driveUser?.accessToken) driveSaveMappings(updated);
    const newSections = parseGenericGradebook(rows, mapping, name);
    if (!newSections.length) { setError(`Could not parse "${fileName}" with this mapping.`); setPendingMapping(null); return; }
    setSections(prev => {
      const filtered = prev.filter(s => !newSections.find(ns => ns.teacherLabel === s.teacherLabel));
      const next = [...filtered, ...newSections];
      setTimeout(() => { setNameMap(cm => { setPendingMismatches(() => detectMismatches(next, cm)); return cm; }); }, 0);
      return next;
    });
    setPendingMapping(null);
  };

  // Attempt to guess teacher name and section label from file content.
  // Returns { teacherName, teacherLabel, previewStudents }
  const guessLabelsFromRows = (rows, parsedSection, fileName) => {
    const previewStudents = (parsedSection?.students || []).slice(0, 5).map(s => s.name);

    // For Canvas files: SectionNames column (col 3) has "CourseName-Teacher-Period"
    if (parsedSection?._source === "canvas_quiz" && rows.length > 1) {
      const sectionName = (rows[1]?.[3] || "").trim();
      if (sectionName) {
        // e.g. "Am Studies-9SST400-Aitken-Period 2" → teacher=Aitken, label=Aitken Period 2
        const parts = sectionName.split(/[-–]/);
        // Teacher name is usually the second-to-last part before "Period N"
        const periodPart = parts.find(p => /period\s*\d+/i.test(p.trim()));
        const teacherPart = parts.find(p => /^[A-Z][a-z]+$/.test(p.trim()) && !periodPart?.includes(p));
        if (teacherPart && periodPart) {
          const tName = teacherPart.trim();
          return { teacherName: tName, teacherLabel: `${tName} ${periodPart.trim()}`, previewStudents, source: sectionName };
        }
        if (teacherPart) {
          return { teacherName: teacherPart.trim(), teacherLabel: sectionName, previewStudents, source: sectionName };
        }
        return { teacherName: sectionName, teacherLabel: sectionName, previewStudents, source: sectionName };
      }
    }

    // For IC files: no internal teacher info — try to extract from filename more aggressively
    // e.g. "gradebook_Smith_export" → try each word as potential teacher name
    const words = fileName.replace(/[_\-\.]/g, " ").split(/\s+/).filter(w => w.length > 2 && !/^\d+$/.test(w) && !/^(gradebook|export|data|report|csv|class|roster|scores?|test|quiz|unit|period|per|pd|sec|section|assessment|student)$/i.test(w));
    const likelyTeacher = words[0] || "";

    return { teacherName: likelyTeacher, teacherLabel: likelyTeacher, previewStudents, source: null };
  };

  // Returns true if the filename looks like a raw export with no teacher/period info
  const filenameNeedsLabel = (name) => {
    if (/[\s\-\u2013_]+(?:period|per|pd|section|sec|p)[\s\-\u2013_]*\d+/i.test(name)) return false;
    if (/_student$/i.test(name)) return false;
    if (/[\s_\-]\d+$/.test(name)) return false;
    return true;
  };

  // Confirm a rename: update the section in state and save to Drive
  const confirmRename = (teacherLabel, newTeacherName, newLabel, fingerprint) => {
    setSections(prev => prev.map(s => {
      if (s.teacherLabel !== teacherLabel) return s;
      return { ...s, teacherName: newTeacherName, teacherLabel: newLabel || teacherLabel, _needsRename: false };
    }));
    setPendingRenames(prev => { const n = { ...prev }; delete n[teacherLabel]; return n; });
    // Save to Drive so same file auto-labeled next time
    if (fingerprint) {
      const updated = { ...fileLabels, [fingerprint]: { teacherName: newTeacherName, teacherLabel: newLabel || teacherLabel } };
      setFileLabels(updated);
      if (driveUser?.accessToken) driveSaveFileLabels(updated);
    }
    // Re-run mismatch detection with updated labels
    setTimeout(() => {
      setSections(current => {
        setNameMap(cm => { setPendingMismatches(() => detectMismatches(current, cm)); return cm; });
        return current;
      });
    }, 0);
  };

  // Open editor: seed from existing subgroupMap or blank, merge in any students from loaded sections
  const openSgEditor = () => {
    // Build base student list from subgroupMap if it exists
    const existing = subgroupMap ? Object.values(subgroupMap).map(v => ({
      name: v.name, id: v.id || "", subgroups: [...(v.subgroups || [])]
    })) : [];

    // Merge in any students from loaded sections not already in the list
    const ids = new Set(existing.map(s => s.id || s.name));
    sections.forEach(sec => {
      sec.students.forEach(stu => {
        const key = stu.studentId || stu.name;
        if (!ids.has(key)) {
          existing.push({ name: stu.name, id: stu.studentId || "", subgroups: [], isNew: true });
          ids.add(key);
        }
      });
    });

    // Derive columns from existing subgroupMap data
    const allSgs = new Set(DEFAULT_SUBGROUPS);
    existing.forEach(s => s.subgroups.forEach(sg => allSgs.add(sg)));
    setSgColumns([...allSgs]);
    setSgStudents(existing.sort((a, b) => a.name.localeCompare(b.name)));
    setSgEditorMode("edit");
    setSgEditorOpen(true);
  };

  // Parse pasted class list — handles "First Last", "Last, First", optionally with ID
  const parsePastedRoster = () => {
    const lines = sgPasteText.split("\n").map(l => l.trim()).filter(Boolean);
    const parsed = lines.map(line => {
      // Try to extract an ID — any sequence of 5+ digits
      const idMatch = line.match(/\b(\d{5,})\b/);
      const id = idMatch ? idMatch[1] : "";
      const namePart = line.replace(/\b\d{5,}\b/, "").replace(/\t/g, " ").trim().replace(/,\s*$/, "").trim();
      let name;
      if (namePart.includes(",")) {
        const ci = namePart.indexOf(",");
        const last = namePart.slice(0, ci).trim();
        const first = namePart.slice(ci + 1).trim();
        name = first ? `${first} ${last}` : last;
      } else {
        name = namePart;
      }
      return name ? { name, id, subgroups: [], isNew: true } : null;
    }).filter(Boolean);

    // Merge with existing
    setSgStudents(prev => {
      const ids = new Set(prev.map(s => s.id || s.name));
      const toAdd = parsed.filter(s => !ids.has(s.id || s.name));
      return [...prev, ...toAdd].sort((a, b) => a.name.localeCompare(b.name));
    });
    setSgPasteText("");
    setSgEditorMode("edit");
  };

  const toggleSgStudentGroup = (studentIdx, group) => {
    setSgStudents(prev => prev.map((s, i) => {
      if (i !== studentIdx) return s;
      const has = s.subgroups.includes(group);
      return { ...s, subgroups: has ? s.subgroups.filter(g => g !== group) : [...s.subgroups, group] };
    }));
  };

  const addSgColumn = () => {
    const col = sgNewCol.trim();
    if (!col || sgColumns.includes(col)) return;
    setSgColumns(prev => [...prev, col]);
    setSgNewCol("");
  };

  const removeSgColumn = (col) => {
    setSgColumns(prev => prev.filter(c => c !== col));
    setSgStudents(prev => prev.map(s => ({ ...s, subgroups: s.subgroups.filter(g => g !== col) })));
  };

  // Build subgroupMap object from editor state and save
  const commitSgEditor = () => {
    const map = {};
    sgStudents.forEach(s => {
      const key = s.id || s.name;
      map[key] = { name: s.name, id: s.id, subgroups: s.subgroups };
    });
    setSubgroupMap(map);
    setSubgroupFromDrive(false);
    setSgEditorOpen(false);
    // Save to Drive
    if (driveUser?.accessToken) {
      // Build CSV text in IC format: Student, Sub Group (one row per membership)
      const rows = [["Student", "Sub Group"]];
      sgStudents.forEach(s => {
        const cell = s.id ? `${s.name} #${s.id}` : s.name;
        if (s.subgroups.length === 0) {
          // No subgroups — still include so student is known
        } else {
          s.subgroups.forEach(sg => rows.push([cell, sg]));
        }
      });
      const csv = rows.map(r => r.map(v => v.includes(",") ? `"${v}"` : v).join(",")).join("\n");
      driveSaveSubgroups(csv).then(saved => {
        if (saved) { setDriveSubgroupFile(saved); setSubgroupFromDrive(true); }
      });
    }
  };

  // ── end subgroup editor helpers ───────────────────────────────────────────────

  const generateReport = () => {
    if (!sections.length) { setError("No gradebook files loaded."); return; }

    // Compute combined stats using each section's built-in current pct
    const allPcts = sections.flatMap(sec => sec.students.map(s => s.pct).filter(v => v !== null));

    const stats = computeStats(allPcts);
    const dist = gradeDist(allPcts);
    const proficient = allPcts.filter(p => p >= teamSettings.proficiencyThreshold).length;
    const notProficient = allPcts.length - proficient;
    const proficiencyPct = allPcts.length > 0 ? Math.round((proficient / allPcts.length) * 100) : 0;

    const gd = buildGrowthData(sections, currentAssessmentName, subgroupMap, priorMap, nameMap, teamSettings);
    // Count students whose score changed (reassessed) and who crossed into proficiency via reassessment
    const reassessedCount = gd.reassessments.length;
    // Count how many individual assessment instances crossed into proficiency
    const reassessedToProfCount = gd.reassessments
      .flatMap(s => s.reassessedAssessments)
      .filter(r => r.crossedProficiency).length;

    setReport({ stats, dist, proficient, notProficient, proficiencyPct, totalStudents: allPcts.length, reassessedCount, reassessedToProfCount });
    setGrowthData(gd);
    setActiveTab("analysis");
  };

  const GRADE_COLORS = { A:"#15803d", B:"#65a30d", C:"#d97706", D:"#ea580c", F:"#dc2626" };
  const GRADE_BGS = { A:"#dcfce7", B:"#f0fdf4", C:"#fef9c3", D:"#fff7ed", F:"#fee2e2" };

  const downloadSnapshot = () => {
    try {
      const state = {
        sections,
        growthData: growthData ? {
          enriched:      growthData.enriched,
          subgroupStats: growthData.subgroupStats,
          classAvg:      growthData.classAvg,
          totalStudents: growthData.totalStudents,
          reassessments: growthData.reassessments,
        } : null,
        report,
        teamSettings,
        assessmentName: currentAssessmentName,
        teamName: activeTeam ? activeTeam.name : null,
      };
      const json = JSON.stringify(state);
      const bytes = new TextEncoder().encode(json);
      let bin = "";
      for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      const b64 = btoa(bin);
      const viewerEl = document.getElementById("viewer-template-b64");
      const viewerB64 = viewerEl ? viewerEl.textContent.trim() : "";
      const viewerBytes = Uint8Array.from(atob(viewerB64), c => c.charCodeAt(0));
      const viewerTemplate = new TextDecoder("utf-8").decode(viewerBytes);
      const snapshot = viewerTemplate.replace('content=""', 'content="' + b64 + '"');
      const blob = new Blob([snapshot], { type: "text/html;charset=utf-8;" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href = url;
      a.download = (currentAssessmentName || "Assessment") + "_Report.html";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch(e) { alert("Download failed: " + e.message); }
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh", background: "#f1f5f9" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #0f172a 0%, #1a2d4a 60%, #0f2d3d 100%)", padding: "0 1.5rem", flexShrink: 0, borderBottom: "1px solid rgba(20,184,166,0.2)" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", height: 60 }}>

        {/* Logo + Wordmark */}
        <div style={{ display: "flex", alignItems: "center", gap: "0.65rem" }}>
          {/* Back button when in workspace */}
          {view === "workspace" && !isSnapshot && (
            <button onClick={goHome} style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 7, color: "#94a3b8", padding: "0.3rem 0.7rem", fontSize: "0.75rem", fontWeight: 600, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: "0.3rem", marginRight: "0.25rem" }}>
              ← Teams
            </button>
          )}
          <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="38" height="38" rx="10" fill="rgba(20,184,166,0.18)"/>
            <rect x="7" y="22" width="5" height="9" rx="1.5" fill="#2dd4bf" opacity="0.5"/>
            <rect x="14" y="16" width="5" height="15" rx="1.5" fill="#2dd4bf" opacity="0.7"/>
            <rect x="21" y="10" width="5" height="21" rx="1.5" fill="#2dd4bf"/>
            <path d="M28 14 L31 8 L34 14" stroke="#f0fdf4" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
            <line x1="31" y1="8" x2="31" y2="20" stroke="#f0fdf4" strokeWidth="1.8" strokeLinecap="round"/>
          </svg>
          <div>
            <div style={{ display: "flex", alignItems: "baseline", gap: "0.35rem" }}>
              <span style={{ fontFamily: "'DM Serif Display', serif", fontWeight: 400, color: "white", fontSize: "1.45rem", letterSpacing: "-0.01em", lineHeight: 1 }}>Reach</span>
              <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#2dd4bf", display: "inline-block", marginBottom: 2, flexShrink: 0 }}></span>
            </div>
            {activeTeam
              ? <div style={{ fontSize: "0.65rem", color: "#2dd4bf", letterSpacing: "0.06em", textTransform: "uppercase", marginTop: "0.05rem", fontWeight: 700, display: "flex", alignItems: "center", gap: "0.4rem" }}>
                  {activeTeam.name}
                  {activeTeam.archived && <span style={{ background: "rgba(148,163,184,0.3)", color: "#94a3b8", borderRadius: 4, padding: "0.05rem 0.35rem", fontSize: "0.6rem", fontWeight: 700, letterSpacing: "0.04em" }}>ARCHIVED</span>}
                </div>
              : <div style={{ fontSize: "0.62rem", color: "#5eead4", letterSpacing: "0.1em", textTransform: "uppercase", marginTop: "0.05rem", fontWeight: 600 }}>Student Intervention Tracker</div>
            }
          </div>
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: "1rem" }}>
        {currentAssessmentName && view === "workspace" && (
          <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
            <span style={{ fontSize: "0.65rem", color: "#475569", textTransform: "uppercase", letterSpacing: "0.07em", fontWeight: 600 }}>Analyzing:</span>
            <span style={{ background: "rgba(20,184,166,0.18)", color: "#5eead4", borderRadius: 6, padding: "0.22rem 0.65rem", fontSize: "0.78rem", fontWeight: 700, border: "1px solid rgba(20,184,166,0.3)" }}>{currentAssessmentName}</span>
          </div>
        )}
        {/* Gear settings button — only in workspace */}
        {view === "workspace" && !isSnapshot && (
          <button onClick={() => setSettingsOpen(v => !v)}
            title="Team Settings"
            style={{ background: settingsOpen ? "rgba(20,184,166,0.2)" : "rgba(255,255,255,0.08)", border: `1px solid ${settingsOpen ? "rgba(20,184,166,0.5)" : "rgba(255,255,255,0.15)"}`, borderRadius: 7, color: settingsOpen ? "#2dd4bf" : "#94a3b8", padding: "0.3rem 0.55rem", fontSize: "0.9rem", cursor: "pointer", fontFamily: "inherit", lineHeight: 1 }}>
            ⚙
          </button>
        )}
        {/* Help button — always visible */}
        {!isSnapshot && (
          <button onClick={() => setHelpOpen(v => !v)}
            title="Help & Guide"
            style={{ background: helpOpen ? "rgba(20,184,166,0.2)" : "rgba(255,255,255,0.08)", border: `1px solid ${helpOpen ? "rgba(20,184,166,0.5)" : "rgba(255,255,255,0.15)"}`, borderRadius: 7, color: helpOpen ? "#2dd4bf" : "#94a3b8", padding: "0.3rem 0.6rem", fontSize: "0.85rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", lineHeight: 1 }}>
            ?
          </button>
        )}
        {/* Report a problem — always visible */}
        {!isSnapshot && (
          <a href={(() => {
            const subject = encodeURIComponent("Reach — Problem Report");
            const body = encodeURIComponent(
              "Describe what happened:\n\n\n\n--- Auto-filled context ---\n" +
              `Team: ${activeTeam ? activeTeam.name : "None"}\n` +
              `Assessment: ${currentAssessmentName || "None"}\n` +
              `Browser: ${navigator.userAgent.match(/(Chrome|Firefox|Safari|Edge)\/[\d.]+/)?.[0] || "Unknown"}\n` +
              `Page: ${window.location.href}`
            );
            return `mailto:reachplcapp@gmail.com?subject=${subject}&body=${body}`;
          })()}
            style={{ fontSize: "0.7rem", color: "#64748b", textDecoration: "none", whiteSpace: "nowrap", padding: "0.3rem 0.1rem", cursor: "pointer" }}
            onMouseEnter={e => e.target.style.color = "#94a3b8"}
            onMouseLeave={e => e.target.style.color = "#64748b"}>
            Report a problem
          </a>
        )}
        {/* Google Drive auth */}
        {!isSnapshot && (
          driveUser
            ? <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
                {driveUser.picture && <img src={driveUser.picture} alt="" style={{ width: 26, height: 26, borderRadius: "50%", border: "2px solid rgba(20,184,166,0.5)" }} />}
                <div style={{ fontSize: "0.72rem", lineHeight: 1.3 }}>
                  <div style={{ color: "#e2e8f0", fontWeight: 600 }}>{driveUser.name}</div>
                  <div style={{ color: "#64748b" }}>Drive connected</div>
                </div>
                <button onClick={driveSignOut} style={{ background: "rgba(255,255,255,0.08)", color: "#94a3b8", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 6, padding: "0.25rem 0.6rem", fontSize: "0.7rem", cursor: "pointer", fontFamily: "inherit" }}>Sign out</button>
              </div>
            : <button onClick={driveSignIn} disabled={driveStatus === "signing-in"}
                style={{ display: "flex", alignItems: "center", gap: "0.4rem", background: "white", color: "#374151", border: "none", borderRadius: 7, padding: "0.38rem 0.85rem", fontSize: "0.75rem", fontWeight: 600, cursor: "pointer", fontFamily: "inherit", boxShadow: "0 1px 4px rgba(0,0,0,0.25)" }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                {driveStatus === "signing-in" ? "Signing in…" : "Sign in with Google"}
              </button>
        )}
        </div>

        </div>
      </div>

      {/* ── HELP PANEL ── */}
      {helpOpen && (
        <HelpPanel onClose={() => setHelpOpen(false)} />
      )}

      {/* ── HOMEPAGE ── */}
      {view === "home" && (
        <div style={{ flex: 1, overflowY: "auto" }}>
          <div style={{ maxWidth: 900, margin: "0 auto", padding: "2.5rem 1.5rem" }}>

            {/* Welcome */}
            <div style={{ marginBottom: "2rem" }}>
              <h1 style={{ fontFamily: "'DM Serif Display', serif", fontWeight: 400, color: "#0f172a", fontSize: "1.75rem", margin: "0 0 0.4rem", letterSpacing: "-0.01em" }}>
                {driveUser && teams.filter(t => !t.archived).length > 0
                  ? `Welcome back${driveUser.name ? ", " + driveUser.name.split(" ")[0] : ""}.`
                  : driveUser && teamsLoaded && teams.filter(t => !t.archived).length === 0
                  ? `Welcome to Reach${driveUser.name ? ", " + driveUser.name.split(" ")[0] : ""}!`
                  : "Welcome to Reach."}
              </h1>
              <p style={{ color: "#64748b", fontSize: "0.9rem", margin: 0 }}>
                {driveUser && teams.filter(t => !t.archived).length > 0
                  ? "Select a team to continue, or create a new one."
                  : driveUser && teamsLoaded && teams.filter(t => !t.archived).length === 0
                  ? "Let's set up your first team."
                  : "Sign in with Google to get started."}
              </p>
            </div>

            {/* ── STEP 2: SUBGROUPS ── */}
            {(() => {
              const stepDone = !!subgroupMap && Object.keys(subgroupMap).length > 0;
              return (
                <div style={{ background: "white", border: `1px solid ${stepDone ? "#86efac" : "#e2e8f0"}`, borderRadius: 12, marginBottom: "1rem", overflow: "hidden" }}>

                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.92rem" }}>Subgroup Data <span style={{ fontWeight: 400, color: "#94a3b8", fontSize: "0.78rem" }}>— optional</span></div>

                    {stepDone && (

                            <div style={{ display: "flex", gap: "0.5rem", marginTop: "0.5rem" }}>
                              <button onClick={parsePastedRoster} disabled={!sgPasteText.trim()}

                              <button onClick={() => setSgEditorMode("edit")} style={{ background: "none", border: "1px solid #e2e8f0", borderRadius: 7, padding: "0.45rem 0.75rem", fontSize: "0.78rem", fontWeight: 600, cursor: "pointer", fontFamily: "inherit", color: "#64748b" }}>Cancel</button>
                            </div>

                        {sgEditorMode === "edit" && (
                          <div>

                              <span style={{ fontSize: "0.72rem", fontWeight: 700, color: "#475569", textTransform: "uppercase", letterSpacing: "0.05em" }}>Subgroups:</span>

                              <button onClick={() => setSgEditorMode("paste")}
                                style={{ background: "white", border: "1px solid #e2e8f0", borderRadius: 8, padding: "0.5rem 0.9rem", fontSize: "0.8rem", fontWeight: 600, cursor: "pointer", fontFamily: "inherit", color: "#475569" }}>

                            <div style={{ display: "flex", gap: "0.5rem" }}>
                              <button onClick={openSgEditor} style={{ background: "white", border: "1px solid #86efac", borderRadius: 6, padding: "0.3rem 0.75rem", fontSize: "0.75rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", color: "#15803d" }}>Edit</button>
                              <button onClick={() => { setSubgroupMap(null); setSubgroupFromDrive(false); }} style={{ background: "white", border: "1px solid #e2e8f0", borderRadius: 6, padding: "0.3rem 0.75rem", fontSize: "0.75rem", fontWeight: 600, cursor: "pointer", fontFamily: "inherit", color: "#64748b" }}>Remove</button>
                            </div>
                          </div>

                          <div style={{ display: "flex", gap: "0.75rem", flexWrap: "wrap" }}>
                            {/* Drop zone for CSV */}

                              <input id="sgFileIn" type="file" accept=".csv" onChange={e => processFiles(e.target.files)} style={{ display: "none" }} />

                            {/* Divider */}

                              <div style={{ fontWeight: 600, color: "#0f766e", fontSize: "0.8rem", marginBottom: "0.15rem" }}>Build subgroup list</div>
                              <div style={{ fontSize: "0.7rem", color: "#64748b" }}>Paste a class roster and assign subgroups</div>
                            </div>
                          </div>

                              Load
                            </button>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              );
            })()}

            {/* ── STEP 3: GRADEBOOK DATA ── */}
            {(() => {
              const stepDone = sections.length > 0 && pendingMismatches.length === 0 && !pendingMapping;

                <div style={{ background: "white", border: `1px solid ${stepDone ? "#86efac" : "#e2e8f0"}`, borderRadius: 12, marginBottom: "1rem", overflow: "hidden" }}>

                  <div style={{ padding: "1rem 1.25rem", borderBottom: "1px solid #f1f5f9", display: "flex", alignItems: "center", gap: "0.75rem" }}>
                    <div style={{ width: 28, height: 28, borderRadius: "50%", background: stepDone ? "#dcfce7" : "#f0fdfa", border: `2px solid ${stepDone ? "#15803d" : "#0f766e"}`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: "0.8rem", color: stepDone ? "#15803d" : "#0f766e", flexShrink: 0 }}>

                      <div style={{ fontSize: "0.72rem", color: "#64748b", display: "flex", alignItems: "center", gap: "0.5rem", flexWrap: "wrap" }}>
                        Upload gradebook exports — IC, Canvas, PowerSchool, or any CSV format
                        {Object.keys(fileLabels).length > 0 && (
                          <button onClick={() => {
                            setFileLabels({});

                            withToken(async (token) => {
                              await Promise.all([

                                )}
                                <button onClick={() => setSections(prev => prev.filter(x => x.teacherLabel !== s.teacherLabel))} style={{ background: "none", border: "none", color: "#94a3b8", cursor: "pointer", fontSize: "0.85rem", padding: 0, lineHeight: 1 }}>✕</button>
                              </div>

                              {/* Inline rename UI */}
                              {renaming && (
                                <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderTop: "none", borderRadius: "0 0 8px 8px", padding: "0.85rem 0.75rem", display: "flex", flexDirection: "column", gap: "0.65rem" }}>

                                  {/* Student preview */}
                                  {renaming.previewStudents?.length > 0 && (
                                    <div>
                                      <div style={{ fontSize: "0.7rem", fontWeight: 700, color: "#78350f", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "0.3rem" }}>Students in this file</div>
                                      <div style={{ display: "flex", flexWrap: "wrap", gap: "0.25rem" }}>
                                        {renaming.previewStudents.map((n, i) => (
                                          <span key={i} style={{ background: "white", border: "1px solid #fde68a", borderRadius: 20, padding: "0.12rem 0.5rem", fontSize: "0.72rem", color: "#92400e" }}>{n}</span>
                                        ))}
                                        {s.students.length > 5 && <span style={{ fontSize: "0.72rem", color: "#94a3b8", padding: "0.12rem 0.25rem" }}>+{s.students.length - 5} more</span>}
                                      </div>
                                    </div>
                                  )}

                                  {/* Source hint */}
                                  {renaming.source && (
                                    <div style={{ fontSize: "0.72rem", color: "#78350f", background: "white", borderRadius: 6, padding: "0.3rem 0.6rem", border: "1px solid #fde68a" }}>
                                      <span style={{ fontWeight: 700 }}>From file: </span>{renaming.source}
                                    </div>
                                  )}

                                  <div style={{ fontSize: "0.75rem", color: "#92400e", fontWeight: 600 }}>
                                    Confirm or edit the teacher and section name — Reach will remember this for next time.
                                  </div>

                                  <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", alignItems: "flex-end" }}>
                                    <div style={{ flex: 1, minWidth: 140 }}>
                                      <label style={{ display: "block", fontSize: "0.7rem", fontWeight: 700, color: "#78350f", marginBottom: "0.2rem", textTransform: "uppercase", letterSpacing: "0.05em" }}>Teacher Name</label>
                                      <input value={renaming.teacherName} onChange={e => setPendingRenames(prev => ({ ...prev, [s.teacherLabel]: { ...prev[s.teacherLabel], teacherName: e.target.value } }))}
                                        placeholder="e.g. Smith" style={{ width: "100%", border: "1px solid #fde68a", borderRadius: 6, padding: "0.35rem 0.6rem", fontSize: "0.82rem", fontFamily: "inherit", outline: "none", background: "white" }} />
                                    </div>
                                    <div style={{ flex: 1, minWidth: 140 }}>
                                      <label style={{ display: "block", fontSize: "0.7rem", fontWeight: 700, color: "#78350f", marginBottom: "0.2rem", textTransform: "uppercase", letterSpacing: "0.05em" }}>Section Label</label>
                                      <input value={renaming.label} onChange={e => setPendingRenames(prev => ({ ...prev, [s.teacherLabel]: { ...prev[s.teacherLabel], label: e.target.value } }))}
                                        placeholder="e.g. Smith Period 1" style={{ width: "100%", border: "1px solid #fde68a", borderRadius: 6, padding: "0.35rem 0.6rem", fontSize: "0.82rem", fontFamily: "inherit", outline: "none", background: "white" }} />
                                    </div>
                                    <button onClick={() => confirmRename(s.teacherLabel, renaming.teacherName.trim(), renaming.label.trim(), s._fingerprint)}
                                      disabled={!renaming.teacherName.trim()}
                                      style={{ background: renaming.teacherName.trim() ? "#0f766e" : "#e2e8f0", color: renaming.teacherName.trim() ? "white" : "#94a3b8", border: "none", borderRadius: 7, padding: "0.35rem 0.9rem", fontSize: "0.8rem", fontWeight: 700, cursor: renaming.teacherName.trim() ? "pointer" : "not-allowed", fontFamily: "inherit", whiteSpace: "nowrap" }}>
                                      Confirm & Remember
                                    </button>
                                    <button onClick={() => { setPendingRenames(prev => { const n = { ...prev }; delete n[s.teacherLabel]; return n; }); setSections(prev => prev.map(x => x.teacherLabel === s.teacherLabel ? { ...x, _needsRename: false } : x)); }}
                                      style={{ background: "none", border: "none", color: "#94a3b8", cursor: "pointer", fontFamily: "inherit", fontSize: "0.75rem", padding: 0 }}>
                                      Skip
                                    </button>
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {/* Column mapping UI */}
                    {pendingMapping && (
                      <ColumnMappingUI rows={pendingMapping.rows} fileName={pendingMapping.fileName} onConfirm={confirmMapping} onCancel={() => setPendingMapping(null)} />
                    )}

                    {/* Mismatch resolver */}
                    {pendingMismatches.length > 0 && (
                      <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 10, padding: "1rem 1.25rem", marginTop: "0.75rem" }}>
                        <div style={{ fontWeight: 700, color: "#92400e", fontSize: "0.88rem", marginBottom: "0.25rem" }}>⚠️ Assessment name mismatch detected</div>
                        <p style={{ fontSize: "0.78rem", color: "#78350f", margin: "0 0 0.75rem", lineHeight: 1.5 }}>Teachers are using different names for the same assessment. Set a canonical name for each — saved automatically so you only need to do this once.</p>
                        <div style={{ display: "flex", flexDirection: "column", gap: "0.75rem" }}>
                          {pendingMismatches.map((m, mi) => (
                            <div key={mi} style={{ background: "white", borderRadius: 8, padding: "0.75rem 1rem", border: "1px solid #fde68a" }}>
                              <div style={{ fontSize: "0.72rem", fontWeight: 700, color: "#92400e", marginBottom: "0.4rem", textTransform: "uppercase", letterSpacing: "0.04em" }}>Column {m.colIndex + 1}</div>
                              <div style={{ display: "flex", flexWrap: "wrap", gap: "0.35rem", marginBottom: "0.6rem" }}>
                                {Object.entries(m.names).map(([label, name]) => (
                                  <span key={label} style={{ background: "#fef9c3", borderRadius: 6, padding: "0.2rem 0.6rem", fontSize: "0.72rem" }}>
                                    <span style={{ fontWeight: 700, color: "#78350f" }}>{label}:</span>
                                    <span style={{ color: "#92400e", marginLeft: "0.3rem" }}>"{name}"</span>
                                  </span>
                                ))}
                              </div>
                              <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
                                <label style={{ fontSize: "0.75rem", fontWeight: 600, color: "#78350f", whiteSpace: "nowrap" }}>Canonical name:</label>
                                <input value={m.draft} onChange={e => setPendingMismatches(prev => prev.map((x, i) => i === mi ? { ...x, draft: e.target.value } : x))}
                                  style={{ flex: 1, border: "1px solid #fde68a", borderRadius: 6, padding: "0.35rem 0.6rem", fontSize: "0.82rem", fontFamily: "inherit", outline: "none", background: "#fffbeb" }} placeholder="e.g. Unit 7 Test" />
                                <button onClick={() => {
                                  const canonical = m.draft.trim(); if (!canonical) return;
                                  const newEntries = {}; Object.values(m.names).forEach(rawName => { newEntries[rawName] = canonical; });
                                  setNameMap(prev => {
                                    const updated = { ...prev, ...newEntries };
                                    driveSaveNameMap(updated);
                                    return updated;
                                  });
                                  setPendingMismatches(prev => prev.filter((_, i) => i !== mi));
                                }} style={{ background: "#0f766e", color: "white", border: "none", borderRadius: 6, padding: "0.35rem 0.8rem", fontSize: "0.78rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}>Confirm</button>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              );
            })()}

            {/* ── Continue button ── */}
            {sections.length > 0 && pendingMismatches.length === 0 && !pendingMapping && (
              <div style={{ display: "flex", justifyContent: "flex-end", alignItems: "center", gap: "0.75rem" }}>
                {Object.keys(pendingRenames).length > 0 && (
                  <span style={{ fontSize: "0.75rem", color: "#d97706", fontWeight: 600 }}>
                    ⚠️ {Object.keys(pendingRenames).length} section{Object.keys(pendingRenames).length !== 1 ? "s" : ""} need{Object.keys(pendingRenames).length === 1 ? "s" : ""} naming
                  </span>
                )}
                <button onClick={() => setActiveTab("data")}
                  style={{ background: "linear-gradient(135deg, #0f766e, #0d9488)", color: "white", border: "none", borderRadius: 8, padding: "0.65rem 1.75rem", fontSize: "0.92rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", boxShadow: "0 3px 12px rgba(15,118,110,0.3)" }}>
                  Continue to Data →
                </button>
              </div>
            )}
          </div>
        )}

        {/* ── DATA TAB ── */}
        {activeTab === "data" && sections.length === 0 && (
          <div style={{ textAlign: "center", padding: "3rem", color: "#64748b" }}>
            <div style={{ fontSize: "2.5rem", marginBottom: "0.75rem" }}>📭</div>
            <p>No data yet. Upload Gradebook CSV files to get started.</p>
            <button onClick={() => setActiveTab("upload")} style={{ background: "#0f766e", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.2rem", fontFamily: "inherit", fontWeight: 600, cursor: "pointer" }}>Upload Files →</button>
          </div>
        )}

        {activeTab === "data" && sections.length > 0 && (
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "1.25rem" }}>
              <div onClick={() => document.getElementById("fileIn2").click()}
                style={{ border: "2px dashed #99f6e4", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", background: "white", color: "#0f766e", gap: "0.4rem", padding: "0.6rem 1.1rem", fontSize: "0.82rem", fontWeight: 600 }}>
                <span style={{ fontSize: "1.1rem" }}>＋</span>
                <span>Add more sections</span>
                <input id="fileIn2" type="file" accept=".csv" multiple onChange={e => processFiles(e.target.files)} style={{ display: "none" }} />
              </div>
              <span style={{ fontSize: "0.75rem", color: "#64748b" }}>{sections.length} section{sections.length !== 1 ? "s" : ""} loaded</span>
            </div>

            <div style={{ textAlign: "center", marginBottom: "1.25rem" }}>
              <button onClick={generateReport}
                style={{ background: "linear-gradient(135deg, #0f766e, #0d9488)", color: "white", border: "none", borderRadius: 10, padding: "0.85rem 2.5rem", fontSize: "1rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", boxShadow: "0 4px 18px rgba(15,118,110,0.35)" }}>
                📊 Generate Report — {currentAssessmentName}
              </button>
            </div>

            {/* Student scores preview table — uses built-in pct */}
            {(() => {
              const allStudentRows = sections.flatMap(sec =>
                sec.students
                  .filter(s => s.pct !== null)
                  .map(s => ({ ...s, teacherLabel: sec.teacherLabel,
                    possible: sec.validCols[sec.validCols.length - 1]?.possible ?? 1 }))
              ).sort((a, b) => a.pct - b.pct);
              const totalProf = allStudentRows.filter(s => s.pct >= teamSettings.proficiencyThreshold).length;
              const totalProfPct = allStudentRows.length > 0 ? Math.round((totalProf / allStudentRows.length) * 100) : 0;

              return (
                <div style={{ background: "white", borderRadius: 10, overflow: "hidden", boxShadow: "0 2px 8px rgba(15,23,42,0.07)", marginBottom: "1.25rem" }}>
                  <div onClick={() => setStudentTableOpen(o => !o)} style={{ padding: "0.85rem 1.25rem", borderBottom: studentTableOpen ? "1px solid #e2e8f0" : "none", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "0.5rem", cursor: "pointer", userSelect: "none" }}>
                    <h3 style={{ margin: 0, color: "#0f172a", fontFamily: "'Lora', serif", fontSize: "0.92rem" }}>Student Scores — {currentAssessmentName}</h3>
                    <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
                      <span style={{ fontSize: "0.72rem", color: "#64748b" }}>{allStudentRows.length} students</span>
                      <span style={{ background: totalProfPct >= 70 ? "#dcfce7" : "#fee2e2", color: totalProfPct >= 70 ? "#15803d" : "#dc2626", borderRadius: 20, padding: "0.15rem 0.55rem", fontSize: "0.72rem", fontWeight: 700 }}>{totalProfPct}% Proficient</span>
                      <span style={{ color: "#94a3b8", fontSize: "0.8rem", fontWeight: 700 }}>{studentTableOpen ? "▲" : "▼"}</span>
                    </div>
                  </div>
                  {studentTableOpen && (
                    <div style={{ overflowX: "auto" }}>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.8rem" }}>
                        <thead>
                          <tr style={{ background: "#f8fafc" }}>
                            {["Student", ...(sections.length > 1 ? ["Section"] : []), "% Score", "Grade", "Proficiency", "Prior Assessments"].map(h => (
                              <th key={h} style={{ padding: "0.5rem 0.65rem", textAlign: "left", color: "#374151", fontWeight: 700, borderBottom: "2px solid #e2e8f0", fontSize: "0.72rem" }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {allStudentRows.map((s, i) => {
                            const grade = s.pct >= 90 ? "A" : s.pct >= 80 ? "B" : s.pct >= 70 ? "C" : s.pct >= 60 ? "D" : "F";
                            const gc = GRADE_COLORS[grade];
                            const gb = GRADE_BGS[grade];
                            return (
                              <tr key={i} style={{ borderBottom: "1px solid #f1f5f9", background: i % 2 === 0 ? "white" : "#fafafa" }}>
                                <td style={{ padding: "0.45rem 0.65rem", fontWeight: 500 }}>{s.name}</td>
                                {sections.length > 1 && <td style={{ padding: "0.45rem 0.65rem" }}><span style={{ background: "#f0fdfa", color: "#0f766e", borderRadius: 20, padding: "0.1rem 0.4rem", fontSize: "0.68rem", fontWeight: 600 }}>{s.teacherLabel}</span></td>}
                                <td style={{ padding: "0.45rem 0.65rem" }}>
                                  <div style={{ display: "flex", alignItems: "center", gap: "0.35rem" }}>
                                    <div style={{ width: 50, height: 5, background: "#e2e8f0", borderRadius: 3, overflow: "hidden" }}>
                                      <div style={{ width: `${Math.min(s.pct,100)}%`, height: "100%", background: gc, borderRadius: 3 }} />
                                    </div>
                                    <span style={{ fontWeight: 600 }}>{s.pct}%</span>
                                  </div>
                                </td>
                                <td style={{ padding: "0.45rem 0.65rem" }}><span style={{ background: gb, color: gc, borderRadius: 20, padding: "0.1rem 0.45rem", fontSize: "0.75rem", fontWeight: 800 }}>{grade}</span></td>
                                <td style={{ padding: "0.45rem 0.65rem" }}><span style={{ background: s.pct >= 70 ? "#dcfce7" : "#fee2e2", color: s.pct >= 70 ? "#15803d" : "#dc2626", borderRadius: 20, padding: "0.1rem 0.45rem", fontSize: "0.7rem", fontWeight: 700 }}>{s.pct >= teamSettings.proficiencyThreshold ? "Proficient" : "Not Proficient"}</span></td>
                                <td style={{ padding: "0.45rem 0.65rem" }}>
                                  <div style={{ display: "flex", gap: "0.2rem", flexWrap: "wrap" }}>
                                    {s.history.map((h, j) => (
                                      <span key={j} title={h.assessment} style={{ background: h.score >= 70 ? "#dcfce7" : "#fee2e2", color: h.score >= 70 ? "#15803d" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.3rem", fontSize: "0.65rem", fontWeight: 700 }}>{h.score}%</span>
                                    ))}
                                    {s.history.length === 0 && <span style={{ color: "#94a3b8", fontSize: "0.65rem" }}>—</span>}
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>
              );
            })()}
          </div>
        )}

        {/* ── ANALYSIS TAB ── */}
        {/* Archived team banner */}
        {activeTeam?.archived && activeTab === "analysis" && (
          <div style={{ background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 10, padding: "0.75rem 1.1rem", marginBottom: "1rem", display: "flex", alignItems: "center", justifyContent: "space-between", gap: "1rem" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
              <span style={{ fontSize: "0.8rem" }}>📦</span>
              <span style={{ fontSize: "0.78rem", color: "#64748b" }}>You are viewing an <strong>archived team</strong>. Data is read-only.</span>
            </div>
            <div style={{ display: "flex", gap: "0.5rem", flexShrink: 0 }}>
              <button onClick={() => unarchiveTeam(activeTeam.id)}
                style={{ background: "white", color: "#0f766e", border: "1px solid #0f766e", borderRadius: 7, padding: "0.35rem 0.85rem", fontSize: "0.75rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                Unarchive
              </button>
              <button onClick={goHome}
                style={{ background: "white", color: "#475569", border: "1px solid #e2e8f0", borderRadius: 7, padding: "0.35rem 0.85rem", fontSize: "0.75rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                ← Back to Teams
              </button>
            </div>
          </div>
        )}
        {activeTab === "analysis" && !report && (
          <div style={{ textAlign: "center", padding: "3rem", color: "#64748b" }}>
            <div style={{ fontSize: "2.5rem", marginBottom: "0.75rem" }}>📊</div>
            <p>Go to the <strong>Data tab</strong> and click <strong>Generate Report</strong>.</p>
            <button onClick={() => setActiveTab(sections.length ? "data" : "upload")} style={{ background: "#0f766e", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.2rem", fontFamily: "inherit", fontWeight: 600, cursor: "pointer" }}>
              {sections.length ? "Go to Data →" : "Upload Files →"}
            </button>
          </div>
        )}

        {activeTab === "analysis" && report && (() => {
          const { stats, dist, proficient, notProficient, proficiencyPct, totalStudents, reassessedCount, reassessedToProfCount } = report;
          // hasPrior = true when any student has in-file prior columns OR cross-trimester analytics
          const hasPrior = sections.some(sec => sec.historyCols.length > 0) || (priorMap && Object.keys(priorMap).length > 0);

          return (
            <div className="tab-analysis">
              {/* Report header */}
              <div style={{ background: "linear-gradient(135deg, #0f172a, #1e3a5f)", borderRadius: 12, padding: "1.25rem 1.5rem", marginBottom: "1.5rem", color: "white" }}>
                <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexWrap: "wrap", gap: "0.75rem" }}>
                  <div>
                    <div style={{ fontFamily: "'Lora', serif", fontSize: "1.2rem", fontWeight: 700, marginBottom: "0.2rem" }}>{currentAssessmentName}</div>
                    <div style={{ fontSize: "0.75rem", color: "#94a3b8" }}>{[...new Set(sections.map(s => s.teacherName || s.teacherLabel))].join(" · ")} · {totalStudents} students · {sections.length} section{sections.length !== 1 ? "s" : ""}</div>
                  </div>
                  {/* Inline proficiency threshold stepper */}
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: "0.2rem" }}>
                    <div style={{ fontSize: "0.62rem", color: "#64748b", textTransform: "uppercase", letterSpacing: "0.06em", fontWeight: 600 }}>Proficiency</div>
                    <div style={{ display: "flex", alignItems: "center", gap: "0.3rem" }}>
                      <button onClick={() => saveTeamSettings({ ...teamSettings, proficiencyThreshold: Math.max(50, teamSettings.proficiencyThreshold - 5) })}
                        style={{ width: 24, height: 24, border: "1px solid rgba(255,255,255,0.2)", borderRadius: 5, background: "rgba(255,255,255,0.08)", color: "white", cursor: "pointer", fontFamily: "inherit", fontSize: "1rem", display: "flex", alignItems: "center", justifyContent: "center", lineHeight: 1 }}>−</button>
                      <div style={{ background: "rgba(20,184,166,0.2)", border: "1px solid rgba(20,184,166,0.4)", borderRadius: 7, padding: "0.2rem 0.6rem", fontWeight: 800, color: "#2dd4bf", fontSize: "0.95rem", minWidth: 52, textAlign: "center" }}>
                        {teamSettings.proficiencyThreshold}%
                      </div>
                      <button onClick={() => saveTeamSettings({ ...teamSettings, proficiencyThreshold: Math.min(95, teamSettings.proficiencyThreshold + 5) })}
                        style={{ width: 24, height: 24, border: "1px solid rgba(255,255,255,0.2)", borderRadius: 5, background: "rgba(255,255,255,0.08)", color: "white", cursor: "pointer", fontFamily: "inherit", fontSize: "1rem", display: "flex", alignItems: "center", justifyContent: "center", lineHeight: 1 }}>+</button>
                    </div>
                  </div>
                </div>
              </div>

              {/* ── OVERALL PERFORMANCE ── */}
              <div style={{ marginBottom: "1.75rem" }}>
                <h2 style={{ color: "#0f172a", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.75rem", fontFamily: "'Lora', serif" }}>📋 Overall Performance</h2>

                {/* Stat pills */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: "0.6rem", marginBottom: "1rem" }}>
                  {[
                    ["Mean", stats.mean + "%", proficiencyPct >= teamSettings.proficiencyThreshold ? "#15803d" : "#dc2626"],
                    ["Median", stats.median + "%", "#0f766e"],
                    ["High", stats.high + "%", "#15803d"],
                    ["Low", stats.low + "%", "#dc2626"],
                    ["Std Dev", stats.stdDev + "%", "#64748b"],
                  ].map(([lbl, val, color]) => (
                    <div key={lbl} style={{ background: "white", borderRadius: 10, padding: "0.75rem 0.5rem", textAlign: "center", boxShadow: "0 1px 4px rgba(15,23,42,0.07)" }}>
                      <div style={{ fontWeight: 800, color, fontSize: "1.15rem" }}>{val}</div>
                      <div style={{ fontSize: "0.65rem", color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.05em", marginTop: "0.15rem" }}>{lbl}</div>
                    </div>
                  ))}
                </div>

                {/* Proficiency summary */}
                <div style={{ background: "white", borderRadius: 10, padding: "1rem 1.25rem", boxShadow: "0 1px 4px rgba(15,23,42,0.07)", marginBottom: "1rem" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.5rem" }}>
                    <span style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.88rem" }}>Proficiency Rate (≥{teamSettings.proficiencyThreshold}%)</span>
                    <div style={{ display: "flex", alignItems: "baseline", gap: "0.5rem" }}>
                      <span style={{ fontWeight: 800, fontSize: "1.1rem", color: proficiencyPct >= teamSettings.proficiencyThreshold ? "#15803d" : "#dc2626" }}>{proficiencyPct}%</span>
                      {reassessedToProfCount > 0 && (
                        <span style={{ fontSize: "0.72rem", color: "#7c3aed", fontWeight: 700 }}>({reassessedToProfCount} via reassessment)</span>
                      )}
                    </div>
                  </div>
                  <div style={{ height: 10, background: "#e2e8f0", borderRadius: 5, overflow: "hidden", marginBottom: "0.4rem" }}>
                    <div style={{ width: proficiencyPct + "%", height: "100%", background: proficiencyPct >= 70 ? "#15803d" : proficiencyPct >= 50 ? "#d97706" : "#dc2626", borderRadius: 5, transition: "width 0.5s" }} />
                  </div>
                  <div style={{ fontSize: "0.72rem", color: "#64748b" }}>{proficient} proficient · {notProficient} not proficient · {totalStudents} total</div>
                </div>

                {/* Grade distribution */}
                <div style={{ background: "white", borderRadius: 10, padding: "1rem 1.25rem", boxShadow: "0 1px 4px rgba(15,23,42,0.07)" }}>
                  <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.85rem", marginBottom: "0.75rem" }}>Grade Distribution</div>
                  {(() => {
                    const maxBarH = 180;
                    // Which grade band does the threshold fall in?
                    // A=90-100, B=80-89, C=70-79, D=60-69, F=<60
                    // We'll show a dotted line across the chart at the threshold position
                    // Position = fraction of the threshold within its grade band
                    const thresh = teamSettings.proficiencyThreshold;
                    // Find which column the threshold sits in
                    const bands = [["F",0,59,"#dc2626","#fee2e2","<60%"],["D",60,69,"#ea580c","#fff7ed","60–69%"],["C",70,79,"#d97706","#fef9c3","70–79%"],["B",80,89,"#65a30d","#f0fdf4","80–89%"],["A",90,100,"#15803d","#dcfce7","90–100%"]];
                    const threshBandIdx = bands.findIndex(([,lo,hi]) => thresh >= lo && thresh <= hi + 1);
                    return (
                      <div style={{ display: "flex", gap: "0.6rem", alignItems: "flex-end", position: "relative" }}>
                        {bands.map(([g, lo, hi, color, bg, range], bi) => {
                          const count = dist[g];
                          const pct = totalStudents > 0 ? Math.round((count / totalStudents) * 100) : 0;
                          const barH = Math.max(pct * 1.8, count > 0 ? 4 : 0);
                          const isThreshBand = bi === threshBandIdx;
                          // Within the band, where does the threshold sit? (0=bottom, 1=top of band)
                          const bandRange = hi - lo + 1;
                          const posInBand = (thresh - lo) / bandRange; // 0–1 from bottom of band
                          return (
                            <div key={g} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: "0.2rem", position: "relative" }}>
                              <div style={{ fontSize: "0.7rem", fontWeight: 700, color }}>{count > 0 ? pct + "%" : ""}</div>
                              <div style={{ width: "100%", position: "relative" }}>
                                <div style={{ width: "100%", height: barH, background: color, borderRadius: "3px 3px 0 0", minHeight: count > 0 ? 4 : 0 }} />
                                {/* Threshold marker line — spans full column width at threshold boundary */}
                                {isThreshBand && (
                                  <div style={{ position: "absolute", left: -3, right: -3, bottom: 0, display: "flex", flexDirection: "column", alignItems: "center", pointerEvents: "none" }}>
                                    <div style={{ background: "#0f172a", color: "white", fontSize: "0.55rem", fontWeight: 800, borderRadius: 3, padding: "0.1rem 0.3rem", whiteSpace: "nowrap", marginBottom: 2 }}>{thresh}% ▼</div>
                                    <div style={{ width: "100%", height: 2, background: "#0f172a", borderRadius: 1 }} />
                                  </div>
                                )}
                              </div>
                              <div style={{ width: "100%", height: 2, background: "#e2e8f0" }} />
                              <div style={{ fontWeight: 800, color, fontSize: "0.85rem" }}>{g}</div>
                              <div style={{ fontWeight: 700, color, fontSize: "0.72rem" }}>{count}</div>
                              <div style={{ fontSize: "0.6rem", color: "#94a3b8", textAlign: "center" }}>{range}</div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })()}
                </div>

                {/* Per-teacher summary — combined + collapsible period breakdown */}
                {(() => {
                  const teacherNames = [...new Set(sections.map(s => s.teacherName || s.teacherLabel))].sort();
                  if (sections.length <= 1) return null;

                  // Mini grade distribution bar for a set of pcts
                  const MiniDistBar = ({ pcts }) => {
                    const d = gradeDist(pcts);
                    const total = pcts.length;
                    if (total === 0) return null;
                    return (
                      <div style={{ display: "flex", gap: "0.15rem", alignItems: "flex-end", height: 32 }}>
                        {[["F","#dc2626"],["D","#ea580c"],["C","#d97706"],["B","#65a30d"],["A","#15803d"]].map(([g, color]) => {
                          const count = d[g];
                          const pct = Math.round((count / total) * 100);
                          const barH = Math.max(pct * 0.28, count > 0 ? 3 : 0);
                          return (
                            <div key={g} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "0.1rem", minWidth: 20 }}>
                              {count > 0 && <div style={{ fontSize: "0.55rem", fontWeight: 700, color, lineHeight: 1 }}>{count}</div>}
                              <div style={{ width: 18, height: barH, background: color, borderRadius: "2px 2px 0 0", minHeight: count > 0 ? 3 : 0 }} />
                              <div style={{ fontSize: "0.55rem", fontWeight: 800, color }}>{g}</div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  };

                  return (
                    <div style={{ marginTop: "1rem" }}>
                      <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.85rem", marginBottom: "0.5rem" }}>Teacher Breakdown</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: "0.75rem" }}>
                        {teacherNames.map(tName => {
                          const teacherSections = sections.filter(s => (s.teacherName || s.teacherLabel) === tName);
                          const allPcts = teacherSections.flatMap(sec => sec.students.map(s => s.pct).filter(v => v !== null));
                          const tStats = computeStats(allPcts);
                          const tProf = allPcts.filter(p => p >= teamSettings.proficiencyThreshold).length;
                          const tProfPct = allPcts.length > 0 ? Math.round((tProf / allPcts.length) * 100) : 0;
                          const profDiff = tProfPct - proficiencyPct;
                          const hasMultiplePeriods = teacherSections.length > 1;

                          return (
                            <TeacherBreakdownCard
                              key={tName}
                              tName={tName}
                              allPcts={allPcts}
                              tStats={tStats}
                              tProfPct={tProfPct}
                              profDiff={profDiff}
                              hasMultiplePeriods={hasMultiplePeriods}
                              teacherSections={teacherSections}
                              proficiencyPct={proficiencyPct}
                              MiniDistBar={MiniDistBar}
                            />
                          );
                        })}
                      </div>
                    </div>
                  );
                })()}
              </div>

              {/* ── SUBGROUP PERFORMANCE ── */}
              {growthData && Object.values(growthData.subgroupStats).some(sg => sg.large) && (
                <div style={{ marginBottom: "1.75rem" }}>
                  <h2 style={{ color: "#0f172a", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Lora', serif" }}>👥 Subgroup Performance</h2>
                  <p style={{ fontSize: "0.78rem", color: "#64748b", margin: "0 0 0.75rem", lineHeight: 1.5 }}>
                    Subgroups with more than 20 students compared to class average ({growthData.classAvg}%). Groups flagged ⚠️ are more than 10 points below the class average.
                  </p>
                  <div style={{ display: "flex", flexDirection: "column", gap: "0.6rem" }}>
                    {Object.values(growthData.subgroupStats).filter(sg => sg.large).sort((a, b) => a.gap - b.gap).map(sg => {
                      const gapColor = sg.flagged ? "#dc2626" : sg.gap >= 0 ? "#15803d" : "#d97706";
                      const trendSymbol = sg.trend === "closing" ? "↑ Closing gap" : sg.trend === "widening" ? "↓ Widening gap" : sg.trend === "holding" ? "→ Holding steady" : null;
                      const trendColor = sg.trend === "closing" ? "#15803d" : sg.trend === "widening" ? "#dc2626" : "#64748b";
                      return (
                        <div key={sg.name} style={{ border: `1px solid ${sg.flagged ? "#fca5a5" : "#e2e8f0"}`, borderLeft: `4px solid ${gapColor}`, borderRadius: 8, padding: "0.75rem 1rem", background: sg.flagged ? "#fef2f2" : "white" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "0.5rem" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: "0.6rem" }}>
                              <span style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.9rem" }}>{sg.name}</span>
                              <span style={{ fontSize: "0.7rem", color: "#64748b" }}>n={sg.count}</span>
                              {sg.flagged && <span style={{ background: "#fee2e2", color: "#dc2626", borderRadius: 4, padding: "0.1rem 0.45rem", fontSize: "0.68rem", fontWeight: 800 }}>⚠️ GAP</span>}
                            </div>
                            <div style={{ display: "flex", gap: "1rem", alignItems: "center", flexWrap: "wrap" }}>
                              <span style={{ fontSize: "0.85rem" }}>Avg: <strong style={{ color: gapColor }}>{sg.avg}%</strong></span>
                              <span style={{ fontSize: "0.85rem", color: gapColor, fontWeight: 700 }}>{sg.gap >= 0 ? "+" : ""}{sg.gap} pts vs class</span>
                              {trendSymbol && <span style={{ fontSize: "0.78rem", color: trendColor, fontWeight: 600 }}>{trendSymbol}</span>}
                            </div>
                          </div>
                          <div style={{ marginTop: "0.5rem", height: 6, background: "#e2e8f0", borderRadius: 3, overflow: "hidden", position: "relative" }}>
                            <div style={{ position: "absolute", left: Math.min(growthData.classAvg, 100) + "%", top: 0, bottom: 0, width: 2, background: "#94a3b8" }} />
                            <div style={{ width: Math.min(sg.avg, 100) + "%", height: "100%", background: gapColor, borderRadius: 3 }} />
                          </div>
                          <div style={{ fontSize: "0.65rem", color: "#94a3b8", marginTop: "0.3rem" }}>Class avg: {growthData.classAvg}%</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* ── STUDENT RISK TRACKING ── */}
              {growthData && (() => {
                const riskOrder = { "PERSISTENTLY_AT_RISK": 0, "AT_RISK": 1, "RECOVERING": 2, "OK": 3 };
                const byTeacher = {};
                growthData.enriched.forEach(s => {
                  const t = s.teacherName || s.teacherLabel || "Unknown";
                  if (!byTeacher[t]) byTeacher[t] = [];
                  byTeacher[t].push(s);
                });
                Object.keys(byTeacher).forEach(t => {
                  byTeacher[t].sort((a, b) => (riskOrder[a.riskStatus] ?? 3) - (riskOrder[b.riskStatus] ?? 3) || a.name.localeCompare(b.name));
                });
                const teacherKeys = Object.keys(byTeacher).sort();

                return (
                  <div style={{ marginBottom: "1.75rem" }}>
                    <h2 style={{ color: "#0f172a", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Lora', serif" }}>📈 Student Risk Tracking</h2>
                    {!hasPrior ? (
                      <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 8, padding: "0.7rem 1rem", fontSize: "0.82rem", color: "#92400e", marginBottom: "0.75rem" }}>

                      </div>
                    ) : (
                      <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", marginBottom: "0.75rem", fontSize: "0.72rem" }}>
                        {[["PERSISTENTLY_AT_RISK", teamSettings.riskSettings.level2Color, teamSettings.riskSettings.level2Color + "22", teamSettings.riskSettings.level2Label],["AT_RISK", teamSettings.riskSettings.level1Color, teamSettings.riskSettings.level1Color + "22", teamSettings.riskSettings.level1Label],["RECOVERING", teamSettings.riskSettings.recoveringColor, teamSettings.riskSettings.recoveringColor + "22", teamSettings.riskSettings.recoveringLabel]].map(([k,c,bg,lbl]) => (
                          <span key={k} style={{ background: bg, color: c, borderRadius: 4, padding: "0.15rem 0.5rem", fontWeight: 700 }}>{lbl}</span>

                      </div>

                      const allStu = byTeacher[teacherKey];
