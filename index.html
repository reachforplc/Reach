                              <span style={{ fontSize: "0.72rem", fontWeight: 700, color: "#475569", textTransform: "uppercase", letterSpacing: "0.05em" }}>Subgroups:</span>
                              {sgColumns.map(col => (
                                <span key={col} style={{ display: "flex", alignItems: "center", gap: "0.25rem", background: "#f0fdfa", border: "1px solid #99f6e4", borderRadius: 20, padding: "0.15rem 0.5rem", fontSize: "0.72rem", fontWeight: 600, color: "#0f766e" }}>
                                  {col}
                                  <button onClick={() => removeSgColumn(col)} style={{ background: "none", border: "none", color: "#94a3b8", cursor: "pointer", padding: 0, fontSize: "0.7rem", lineHeight: 1 }}>✕</button>
                                </span>
                              ))}
                              <div style={{ display: "flex", alignItems: "center", gap: "0.3rem" }}>
                                <input value={sgNewCol} onChange={e => setSgNewCol(e.target.value)} onKeyDown={e => e.key === "Enter" && addSgColumn()}
                                  placeholder="+ Add subgroup" style={{ border: "1px dashed #cbd5e1", borderRadius: 20, padding: "0.15rem 0.6rem", fontSize: "0.72rem", fontFamily: "inherit", outline: "none", width: 130 }} />
                                {sgNewCol.trim() && <button onClick={addSgColumn} style={{ background: "#0f766e", color: "white", border: "none", borderRadius: 20, padding: "0.15rem 0.55rem", fontSize: "0.7rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>Add</button>}
                              </div>
                            </div>

                            {/* Student table */}
                            {sgStudents.length === 0 ? (
                              <div style={{ textAlign: "center", padding: "1.5rem", color: "#94a3b8", fontSize: "0.82rem" }}>
                                No students yet.
                                <button onClick={() => setSgEditorMode("paste")} style={{ background: "none", border: "none", color: "#0f766e", cursor: "pointer", fontFamily: "inherit", fontWeight: 600, fontSize: "0.82rem", marginLeft: "0.25rem" }}>Paste a class roster →</button>
                              </div>
                            ) : (
                              <div style={{ border: "1px solid #e2e8f0", borderRadius: 8, overflow: "hidden", marginBottom: "0.75rem" }}>
                                <div style={{ overflowX: "auto", maxHeight: 380, overflowY: "auto" }}>
                                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.78rem" }}>
                                    <thead style={{ position: "sticky", top: 0, zIndex: 1 }}>
                                      <tr style={{ background: "#f8fafc" }}>
                                        <th style={{ padding: "0.5rem 0.75rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "2px solid #e2e8f0", whiteSpace: "nowrap" }}>Student</th>
                                        {sgColumns.map(col => (
                                          <th key={col} style={{ padding: "0.5rem 0.5rem", textAlign: "center", fontWeight: 700, color: "#374151", borderBottom: "2px solid #e2e8f0", whiteSpace: "nowrap", fontSize: "0.7rem" }}>{col}</th>
                                        ))}
                                        <th style={{ padding: "0.5rem 0.5rem", borderBottom: "2px solid #e2e8f0", width: 28 }}></th>
                                      </tr>
                                    </thead>
                                    <tbody>
                                      {sgStudents.map((s, si) => (
                                        <tr key={si} style={{ borderBottom: "1px solid #f1f5f9", background: s.isNew ? "#fefce8" : si % 2 === 0 ? "white" : "#fafafa" }}>
                                          <td style={{ padding: "0.4rem 0.75rem", fontWeight: 500, whiteSpace: "nowrap" }}>
                                            {s.name}
                                            {s.isNew && <span style={{ marginLeft: "0.4rem", fontSize: "0.62rem", background: "#fef9c3", color: "#92400e", borderRadius: 4, padding: "0.05rem 0.3rem", fontWeight: 700 }}>new</span>}
                                          </td>
                                          {sgColumns.map(col => (
                                            <td key={col} style={{ padding: "0.4rem 0.5rem", textAlign: "center" }}>
                                              <input type="checkbox" checked={s.subgroups.includes(col)} onChange={() => toggleSgStudentGroup(si, col)} style={{ cursor: "pointer", width: 15, height: 15 }} />
                                            </td>
                                          ))}
                                          <td style={{ padding: "0.4rem 0.5rem", textAlign: "center" }}>
                                            <button onClick={() => setSgStudents(prev => prev.filter((_, i) => i !== si))} style={{ background: "none", border: "none", color: "#cbd5e1", cursor: "pointer", fontSize: "0.8rem", padding: 0, lineHeight: 1 }}
                                              onMouseEnter={e => e.currentTarget.style.color = "#dc2626"} onMouseLeave={e => e.currentTarget.style.color = "#cbd5e1"}>✕</button>
                                          </td>
                                        </tr>
                                      ))}
                                    </tbody>
                                  </table>
                                </div>
                              </div>
                            )}

                            <div style={{ display: "flex", gap: "0.5rem", alignItems: "center", flexWrap: "wrap" }}>
                              <button onClick={commitSgEditor}
                                style={{ background: "linear-gradient(135deg, #0f766e, #0d9488)", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.2rem", fontSize: "0.85rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                                {subgroupMap ? "Save Changes" : "Save Subgroups"}
                                {driveUser && <span style={{ opacity: 0.85, marginLeft: "0.3rem", fontSize: "0.75rem" }}>· syncs to Drive</span>}
                              </button>
                              <button onClick={() => setSgEditorMode("paste")}
                                style={{ background: "white", border: "1px solid #e2e8f0", borderRadius: 8, padding: "0.5rem 0.9rem", fontSize: "0.8rem", fontWeight: 600, cursor: "pointer", fontFamily: "inherit", color: "#475569" }}>
                                + Paste more students
                              </button>
                              <button onClick={() => setSgEditorOpen(false)}
                                style={{ background: "none", border: "none", color: "#94a3b8", cursor: "pointer", fontFamily: "inherit", fontSize: "0.78rem", padding: 0 }}>
                                Cancel
                              </button>
                            </div>
                          </div>
                        )}
                      </div>
                    ) : (
                      /* Editor closed — show status + actions */
                      <div>
                        {stepDone ? (
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "#f0fdf4", borderRadius: 8, padding: "0.65rem 1rem", border: "1px solid #86efac", flexWrap: "wrap", gap: "0.5rem" }}>
                            <div>
                              <span style={{ fontWeight: 600, color: "#15803d", fontSize: "0.82rem" }}>✓ {Object.keys(subgroupMap).length} students · {[...new Set(Object.values(subgroupMap).flatMap(s => s.subgroups))].join(", ") || "no subgroups assigned"}</span>
                              {subgroupFromDrive && <span style={{ fontSize: "0.7rem", color: "#64748b", marginLeft: "0.5rem" }}>loaded from Drive</span>}
                            </div>
                            <div style={{ display: "flex", gap: "0.5rem" }}>
                              <button onClick={openSgEditor} style={{ background: "white", border: "1px solid #86efac", borderRadius: 6, padding: "0.3rem 0.75rem", fontSize: "0.75rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", color: "#15803d" }}>Edit</button>
                              <button onClick={() => { setSubgroupMap(null); setSubgroupFromDrive(false); }} style={{ background: "white", border: "1px solid #e2e8f0", borderRadius: 6, padding: "0.3rem 0.75rem", fontSize: "0.75rem", fontWeight: 600, cursor: "pointer", fontFamily: "inherit", color: "#64748b" }}>Remove</button>
                            </div>
                          </div>
                        ) : (
                          <div style={{ display: "flex", gap: "0.75rem", flexWrap: "wrap" }}>
                            {/* Drop zone for CSV */}
                            <div style={{ flex: 1, minWidth: 200, border: "2px dashed #cbd5e1", borderRadius: 10, padding: "1rem", textAlign: "center", cursor: "pointer", background: "#f8fafc" }}
                              onClick={() => document.getElementById("sgFileIn").click()}
                              onDragOver={e => e.preventDefault()}
                              onDrop={e => { e.preventDefault(); processFiles(e.dataTransfer.files); }}>
                              <div style={{ fontSize: "1.25rem", marginBottom: "0.25rem" }}>📄</div>
                              <div style={{ fontWeight: 600, color: "#374151", fontSize: "0.8rem", marginBottom: "0.15rem" }}>Upload subgroup CSV</div>
                              <div style={{ fontSize: "0.7rem", color: "#94a3b8" }}>IC format or wide column format</div>
                              <input id="sgFileIn" type="file" accept=".csv" onChange={e => processFiles(e.target.files)} style={{ display: "none" }} />
                            </div>
                            {/* Divider */}
                            <div style={{ display: "flex", alignItems: "center", color: "#94a3b8", fontSize: "0.75rem", fontWeight: 600 }}>or</div>
                            {/* Build in app */}
                            <div style={{ flex: 1, minWidth: 200, border: "2px dashed #99f6e4", borderRadius: 10, padding: "1rem", textAlign: "center", cursor: "pointer", background: "#f0fdfa" }}
                              onClick={() => { setSgStudents([]); setSgColumns([...DEFAULT_SUBGROUPS]); setSgEditorMode("paste"); setSgEditorOpen(true); }}>
                              <div style={{ fontSize: "1.25rem", marginBottom: "0.25rem" }}>✏️</div>
                              <div style={{ fontWeight: 600, color: "#0f766e", fontSize: "0.8rem", marginBottom: "0.15rem" }}>Build subgroup list</div>
                              <div style={{ fontSize: "0.7rem", color: "#64748b" }}>Paste a class roster and assign subgroups</div>
                            </div>
                          </div>
                        )}

                        {/* Drive subgroup file available but not loaded */}
                        {driveSubgroupFile && !stepDone && (
                          <div style={{ marginTop: "0.75rem", display: "flex", alignItems: "center", justifyContent: "space-between", background: "#f0f9ff", borderRadius: 8, padding: "0.6rem 0.9rem", border: "1px solid #bae6fd" }}>
                            <span style={{ fontSize: "0.78rem", color: "#0c4a6e" }}>📄 Saved subgroup file found in Drive</span>
                            <button onClick={driveLoadSubgroups} disabled={driveStatus === "loading"}
                              style={{ background: "#0369a1", color: "white", border: "none", borderRadius: 6, padding: "0.3rem 0.75rem", fontSize: "0.75rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                              Load
                            </button>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              );
            })()}

            {/* ── STEP 3: GRADEBOOK DATA ── */}
            {(() => {
              const stepDone = sections.length > 0 && pendingMismatches.length === 0 && !pendingMapping;
              return (
                <div style={{ background: "white", border: `1px solid ${stepDone ? "#86efac" : "#e2e8f0"}`, borderRadius: 12, marginBottom: "1rem", overflow: "hidden" }}>
                  {/* Step header */}
                  <div style={{ padding: "1rem 1.25rem", borderBottom: "1px solid #f1f5f9", display: "flex", alignItems: "center", gap: "0.75rem" }}>
                    <div style={{ width: 28, height: 28, borderRadius: "50%", background: stepDone ? "#dcfce7" : "#f0fdfa", border: `2px solid ${stepDone ? "#15803d" : "#0f766e"}`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: "0.8rem", color: stepDone ? "#15803d" : "#0f766e", flexShrink: 0 }}>
                      {stepDone ? "✓" : "3"}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.92rem" }}>Gradebook Data</div>
                      <div style={{ fontSize: "0.72rem", color: "#64748b", display: "flex", alignItems: "center", gap: "0.5rem", flexWrap: "wrap" }}>
                        Upload gradebook exports — IC, Canvas, PowerSchool, or any CSV format
                        {Object.keys(fileLabels).length > 0 && (
                          <button onClick={() => {
                            setFileLabels({});
                            setNameMap({});
                            withToken(async (token) => {
                              await Promise.all([
                                driveUpsertJSON(token, "reach_file_labels.json", "{}"),
                                driveUpsertJSON(token, "reach_namemap.json", "{}"),
                              ]);
                            });
                          }} style={{ background: "none", border: "none", color: "#94a3b8", cursor: "pointer", fontFamily: "inherit", fontSize: "0.68rem", padding: 0, textDecoration: "underline", whiteSpace: "nowrap" }}>
                            Reset saved labels
                          </button>
                        )}
                      </div>
                    </div>
                    {stepDone && (
                      <div style={{ fontSize: "0.75rem", color: "#15803d", fontWeight: 600 }}>
                        {sections.length} section{sections.length !== 1 ? "s" : ""} · {sections.reduce((n, s) => n + s.students.length, 0)} students · <strong>{resolve(currentAssessmentName)}</strong>
                      </div>
                    )}
                  </div>

                  <div style={{ padding: "1rem 1.25rem" }}>
                    {/* Drop zone */}
                    <div
                      onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                      onDragLeave={() => setDragOver(false)}
                      onDrop={onDrop}
                      onClick={() => document.getElementById("fileIn").click()}
                      style={{ border: `2px dashed ${dragOver ? "#0f766e" : "#cbd5e1"}`, borderRadius: 10, padding: "1.5rem", textAlign: "center", cursor: "pointer", background: dragOver ? "#f0fdfa" : "#f8fafc", transition: "all 0.2s", marginBottom: sections.length ? "0.75rem" : 0 }}>
                      <div style={{ fontSize: "1.5rem", marginBottom: "0.3rem" }}>📂</div>
                      <div style={{ fontWeight: 600, color: "#374151", fontSize: "0.85rem", marginBottom: "0.2rem" }}>
                        {sections.length ? "Drop more files or click to add" : "Drop gradebook CSV files here or click to browse"}
                      </div>
                      <div style={{ color: "#94a3b8", fontSize: "0.75rem" }}>IC, Canvas Quiz Student, PowerSchool, Skyward, and more — multiple files at once</div>
                      <input id="fileIn" type="file" accept=".csv" multiple onChange={e => processFiles(e.target.files)} style={{ display: "none" }} />
                    </div>

                    {/* Loaded sections list */}
                    {sections.length > 0 && (
                      <div style={{ display: "flex", flexDirection: "column", gap: "0.5rem", marginBottom: "0.75rem" }}>
                        {sections.map(s => {
                          const renaming = pendingRenames[s.teacherLabel];
                          return (
                            <div key={s.teacherLabel}>
                              <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", background: s._needsRename ? "#fffbeb" : "#f0fdfa", borderRadius: 7, padding: "0.45rem 0.75rem", border: `1px solid ${s._needsRename ? "#fde68a" : "#99f6e4"}` }}>
                                <span style={{ fontSize: "0.82rem", fontWeight: 600, color: s._needsRename ? "#92400e" : "#0f766e", flex: 1 }}>
                                  {s.teacherName || s.teacherLabel}
                                  {s.teacherLabel !== (s.teacherName || s.teacherLabel) && (
                                    <span style={{ fontWeight: 400, color: "#94a3b8", fontSize: "0.72rem", marginLeft: "0.35rem" }}>({s.teacherLabel})</span>
                                  )}
                                </span>
                                <span style={{ fontSize: "0.72rem", color: "#64748b" }}>{s.students.length} students</span>
                                <span style={{ fontSize: "0.68rem", background: s._needsRename ? "#fef9c3" : "#e0f7f4", color: s._needsRename ? "#92400e" : "#0f766e", borderRadius: 4, padding: "0.1rem 0.4rem", fontWeight: 600 }}>{s.currentAssessment}</span>
                                {s._needsRename && !renaming && (
                                  <button onClick={() => setPendingRenames(prev => ({ ...prev, [s.teacherLabel]: { teacherName: s.teacherName, label: s.teacherLabel, previewStudents: (parsedSection => (parsedSection?.students || []).slice(0,5).map(st=>st.name))(s) } }))}
                                    style={{ background: "#d97706", color: "white", border: "none", borderRadius: 5, padding: "0.2rem 0.55rem", fontSize: "0.7rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}>
                                    ✏️ Name this section
                                  </button>
                                )}
                                <button onClick={() => setSections(prev => prev.filter(x => x.teacherLabel !== s.teacherLabel))} style={{ background: "none", border: "none", color: "#94a3b8", cursor: "pointer", fontSize: "0.85rem", padding: 0, lineHeight: 1 }}>✕</button>
                              </div>

                              {/* Inline rename UI */}
                              {renaming && (
                                <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderTop: "none", borderRadius: "0 0 8px 8px", padding: "0.85rem 0.75rem", display: "flex", flexDirection: "column", gap: "0.65rem" }}>

                                  {/* Student preview */}
                                  {renaming.previewStudents?.length > 0 && (
                                    <div>
                                      <div style={{ fontSize: "0.7rem", fontWeight: 700, color: "#78350f", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "0.3rem" }}>Students in this file</div>
                                      <div style={{ display: "flex", flexWrap: "wrap", gap: "0.25rem" }}>
                                        {renaming.previewStudents.map((n, i) => (
                                          <span key={i} style={{ background: "white", border: "1px solid #fde68a", borderRadius: 20, padding: "0.12rem 0.5rem", fontSize: "0.72rem", color: "#92400e" }}>{n}</span>
                                        ))}
                                        {s.students.length > 5 && <span style={{ fontSize: "0.72rem", color: "#94a3b8", padding: "0.12rem 0.25rem" }}>+{s.students.length - 5} more</span>}
                                      </div>
                                    </div>
                                  )}

                                  {/* Source hint */}
                                  {renaming.source && (
                                    <div style={{ fontSize: "0.72rem", color: "#78350f", background: "white", borderRadius: 6, padding: "0.3rem 0.6rem", border: "1px solid #fde68a" }}>
                                      <span style={{ fontWeight: 700 }}>From file: </span>{renaming.source}
                                    </div>
                                  )}

                                  <div style={{ fontSize: "0.75rem", color: "#92400e", fontWeight: 600 }}>
                                    Confirm or edit the teacher and section name — Reach will remember this for next time.
                                  </div>

                                  <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", alignItems: "flex-end" }}>
                                    <div style={{ flex: 1, minWidth: 140 }}>
                                      <label style={{ display: "block", fontSize: "0.7rem", fontWeight: 700, color: "#78350f", marginBottom: "0.2rem", textTransform: "uppercase", letterSpacing: "0.05em" }}>Teacher Name</label>
                                      <input value={renaming.teacherName} onChange={e => setPendingRenames(prev => ({ ...prev, [s.teacherLabel]: { ...prev[s.teacherLabel], teacherName: e.target.value } }))}
                                        placeholder="e.g. Smith" style={{ width: "100%", border: "1px solid #fde68a", borderRadius: 6, padding: "0.35rem 0.6rem", fontSize: "0.82rem", fontFamily: "inherit", outline: "none", background: "white" }} />
                                    </div>
                                    <div style={{ flex: 1, minWidth: 140 }}>
                                      <label style={{ display: "block", fontSize: "0.7rem", fontWeight: 700, color: "#78350f", marginBottom: "0.2rem", textTransform: "uppercase", letterSpacing: "0.05em" }}>Section Label</label>
                                      <input value={renaming.label} onChange={e => setPendingRenames(prev => ({ ...prev, [s.teacherLabel]: { ...prev[s.teacherLabel], label: e.target.value } }))}
                                        placeholder="e.g. Smith Period 1" style={{ width: "100%", border: "1px solid #fde68a", borderRadius: 6, padding: "0.35rem 0.6rem", fontSize: "0.82rem", fontFamily: "inherit", outline: "none", background: "white" }} />
                                    </div>
                                    <button onClick={() => confirmRename(s.teacherLabel, renaming.teacherName.trim(), renaming.label.trim(), s._fingerprint)}
                                      disabled={!renaming.teacherName.trim()}
                                      style={{ background: renaming.teacherName.trim() ? "#0f766e" : "#e2e8f0", color: renaming.teacherName.trim() ? "white" : "#94a3b8", border: "none", borderRadius: 7, padding: "0.35rem 0.9rem", fontSize: "0.8rem", fontWeight: 700, cursor: renaming.teacherName.trim() ? "pointer" : "not-allowed", fontFamily: "inherit", whiteSpace: "nowrap" }}>
                                      Confirm & Remember
                                    </button>
                                    <button onClick={() => { setPendingRenames(prev => { const n = { ...prev }; delete n[s.teacherLabel]; return n; }); setSections(prev => prev.map(x => x.teacherLabel === s.teacherLabel ? { ...x, _needsRename: false } : x)); }}
                                      style={{ background: "none", border: "none", color: "#94a3b8", cursor: "pointer", fontFamily: "inherit", fontSize: "0.75rem", padding: 0 }}>
                                      Skip
                                    </button>
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {/* Column mapping UI */}
                    {pendingMapping && (
                      <ColumnMappingUI rows={pendingMapping.rows} fileName={pendingMapping.fileName} onConfirm={confirmMapping} onCancel={() => setPendingMapping(null)} />
                    )}

                    {/* Mismatch resolver */}
                    {pendingMismatches.length > 0 && (
                      <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 10, padding: "1rem 1.25rem", marginTop: "0.75rem" }}>
                        <div style={{ fontWeight: 700, color: "#92400e", fontSize: "0.88rem", marginBottom: "0.25rem" }}>⚠️ Assessment name mismatch detected</div>
                        <p style={{ fontSize: "0.78rem", color: "#78350f", margin: "0 0 0.75rem", lineHeight: 1.5 }}>Teachers are using different names for the same assessment. Set a canonical name for each — saved automatically so you only need to do this once.</p>
                        <div style={{ display: "flex", flexDirection: "column", gap: "0.75rem" }}>
                          {pendingMismatches.map((m, mi) => (
                            <div key={mi} style={{ background: "white", borderRadius: 8, padding: "0.75rem 1rem", border: "1px solid #fde68a" }}>
                              <div style={{ fontSize: "0.72rem", fontWeight: 700, color: "#92400e", marginBottom: "0.4rem", textTransform: "uppercase", letterSpacing: "0.04em" }}>Column {m.colIndex + 1}</div>
                              <div style={{ display: "flex", flexWrap: "wrap", gap: "0.35rem", marginBottom: "0.6rem" }}>
                                {Object.entries(m.names).map(([label, name]) => (
                                  <span key={label} style={{ background: "#fef9c3", borderRadius: 6, padding: "0.2rem 0.6rem", fontSize: "0.72rem" }}>
                                    <span style={{ fontWeight: 700, color: "#78350f" }}>{label}:</span>
                                    <span style={{ color: "#92400e", marginLeft: "0.3rem" }}>"{name}"</span>
                                  </span>
                                ))}
                              </div>
                              <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
                                <label style={{ fontSize: "0.75rem", fontWeight: 600, color: "#78350f", whiteSpace: "nowrap" }}>Canonical name:</label>
                                <input value={m.draft} onChange={e => setPendingMismatches(prev => prev.map((x, i) => i === mi ? { ...x, draft: e.target.value } : x))}
                                  style={{ flex: 1, border: "1px solid #fde68a", borderRadius: 6, padding: "0.35rem 0.6rem", fontSize: "0.82rem", fontFamily: "inherit", outline: "none", background: "#fffbeb" }} placeholder="e.g. Unit 7 Test" />
                                <button onClick={() => {
                                  const canonical = m.draft.trim(); if (!canonical) return;
                                  const newEntries = {}; Object.values(m.names).forEach(rawName => { newEntries[rawName] = canonical; });
                                  setNameMap(prev => {
                                    const updated = { ...prev, ...newEntries };
                                    driveSaveNameMap(updated);
                                    return updated;
                                  });
                                  setPendingMismatches(prev => prev.filter((_, i) => i !== mi));
                                }} style={{ background: "#0f766e", color: "white", border: "none", borderRadius: 6, padding: "0.35rem 0.8rem", fontSize: "0.78rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}>Confirm</button>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              );
            })()}

            {/* ── Continue button ── */}
            {sections.length > 0 && pendingMismatches.length === 0 && !pendingMapping && (
              <div style={{ display: "flex", justifyContent: "flex-end", alignItems: "center", gap: "0.75rem" }}>
                {Object.keys(pendingRenames).length > 0 && (

        {activeTab === "analysis" && report && (() => {
          const { stats, dist, proficient, notProficient, proficiencyPct, totalStudents, reassessedCount, reassessedToProfCount } = report;
          // hasPrior = true when any student has in-file prior columns OR cross-trimester analytics
          const hasPrior = sections.some(sec => sec.historyCols.length > 0) || (priorMap && Object.keys(priorMap).length > 0);

          return (
            <div className="tab-analysis">
              {/* Report header */}
              <div style={{ background: "linear-gradient(135deg, #0f172a, #1e3a5f)", borderRadius: 12, padding: "1.25rem 1.5rem", marginBottom: "1.5rem", color: "white" }}>
                <div style={{ fontFamily: "'Lora', serif", fontSize: "1.2rem", fontWeight: 700, marginBottom: "0.2rem" }}>{currentAssessmentName}</div>
                <div style={{ fontSize: "0.75rem", color: "#94a3b8" }}>{[...new Set(sections.map(s => s.teacherName || s.teacherLabel))].join(" · ")} · {totalStudents} students · {sections.length} section{sections.length !== 1 ? "s" : ""}</div>
              </div>

              <div style={{ marginBottom: "1.75rem" }}>

                <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: "0.6rem", marginBottom: "1rem" }}>

                    ["Mean", stats.mean + "%", proficiencyPct >= 70 ? "#15803d" : "#dc2626"],
                    ["Median", stats.median + "%", "#0f766e"],
                    ["High", stats.high + "%", "#15803d"],
                    ["Low", stats.low + "%", "#dc2626"],
                    ["Std Dev", stats.stdDev + "%", "#64748b"],

                    <div key={lbl} style={{ background: "white", borderRadius: 10, padding: "0.75rem 0.5rem", textAlign: "center", boxShadow: "0 1px 4px rgba(15,23,42,0.07)" }}>

                      <div style={{ fontSize: "0.65rem", color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.05em", marginTop: "0.15rem" }}>{lbl}</div>

                    <span style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.88rem" }}>Proficiency Rate (≥70%)</span>
                    <div style={{ display: "flex", alignItems: "baseline", gap: "0.5rem" }}>
                      <span style={{ fontWeight: 800, fontSize: "1.1rem", color: proficiencyPct >= 70 ? "#15803d" : "#dc2626" }}>{proficiencyPct}%</span>
                      {reassessedToProfCount > 0 && (
                        <span style={{ fontSize: "0.72rem", color: "#7c3aed", fontWeight: 700 }}>({reassessedToProfCount} via reassessment)</span>
                      )}
                    </div>
                  </div>
                  <div style={{ height: 10, background: "#e2e8f0", borderRadius: 5, overflow: "hidden", marginBottom: "0.4rem" }}>
                    <div style={{ width: proficiencyPct + "%", height: "100%", background: proficiencyPct >= 70 ? "#15803d" : proficiencyPct >= 50 ? "#d97706" : "#dc2626", borderRadius: 5, transition: "width 0.5s" }} />
                  </div>
                  <div style={{ fontSize: "0.72rem", color: "#64748b" }}>{proficient} proficient · {notProficient} not proficient · {totalStudents} total</div>

                  <div style={{ display: "flex", gap: "0.6rem", alignItems: "flex-end" }}>
                    {[["A","#15803d","#dcfce7","90–100%"],["B","#65a30d","#f0fdf4","80–89%"],["C","#d97706","#fef9c3","70–79%"],["D","#ea580c","#fff7ed","60–69%"],["F","#dc2626","#fee2e2","<60%"]].map(([g, color, bg, range]) => {
                      const count = dist[g];

                          <div style={{ width: "100%", height: barH, background: color, borderRadius: "3px 3px 0 0", minHeight: count > 0 ? 4 : 0 }} />
                          <div style={{ width: "100%", height: 2, background: "#e2e8f0" }} />
                          <div style={{ fontWeight: 800, color, fontSize: "0.85rem" }}>{g}</div>
                          <div style={{ fontWeight: 700, color, fontSize: "0.72rem" }}>{count}</div>
                          <div style={{ fontSize: "0.6rem", color: "#94a3b8", textAlign: "center" }}>{range}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Per-teacher summary — combined + collapsible period breakdown */}
                {(() => {
                  const teacherNames = [...new Set(sections.map(s => s.teacherName || s.teacherLabel))].sort();
                  if (sections.length <= 1) return null;

                  // Mini grade distribution bar for a set of pcts
                  const MiniDistBar = ({ pcts }) => {
                    const d = gradeDist(pcts);
                    const total = pcts.length;
                    if (total === 0) return null;
                    return (
                      <div style={{ display: "flex", gap: "0.15rem", alignItems: "flex-end", height: 32 }}>
                        {[["A","#15803d"],["B","#65a30d"],["C","#d97706"],["D","#ea580c"],["F","#dc2626"]].map(([g, color]) => {
                          const count = d[g];
                          const pct = Math.round((count / total) * 100);
                          const barH = Math.max(pct * 0.28, count > 0 ? 3 : 0);
                          return (
                            <div key={g} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "0.1rem", minWidth: 20 }}>
                              {count > 0 && <div style={{ fontSize: "0.55rem", fontWeight: 700, color, lineHeight: 1 }}>{count}</div>}
                              <div style={{ width: 18, height: barH, background: color, borderRadius: "2px 2px 0 0", minHeight: count > 0 ? 3 : 0 }} />
                              <div style={{ fontSize: "0.55rem", fontWeight: 800, color }}>{g}</div>
                            </div>

                  return (
                    <div style={{ marginTop: "1rem" }}>
                      <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.85rem", marginBottom: "0.5rem" }}>Teacher Breakdown</div>

                          const allPcts = teacherSections.flatMap(sec => sec.students.map(s => s.pct).filter(v => v !== null));
                          const tStats = computeStats(allPcts);
                          const tProf = allPcts.filter(p => p >= 70).length;
                          const tProfPct = allPcts.length > 0 ? Math.round((tProf / allPcts.length) * 100) : 0;
                          const profDiff = tProfPct - proficiencyPct;
                          const hasMultiplePeriods = teacherSections.length > 1;

                          return (
                            <TeacherBreakdownCard
                              key={tName}
                              tName={tName}
                              allPcts={allPcts}
                              tStats={tStats}
                              tProfPct={tProfPct}
                              profDiff={profDiff}
                              hasMultiplePeriods={hasMultiplePeriods}
                              teacherSections={teacherSections}
                              proficiencyPct={proficiencyPct}
                              MiniDistBar={MiniDistBar}
                            />

                      </div>
                    </div>
                  );
                })()}
              </div>

              {/* ── SUBGROUP PERFORMANCE ── */}
              {growthData && Object.values(growthData.subgroupStats).some(sg => sg.large) && (
                <div style={{ marginBottom: "1.75rem" }}>
                  <h2 style={{ color: "#0f172a", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Lora', serif" }}>👥 Subgroup Performance</h2>
                  <p style={{ fontSize: "0.78rem", color: "#64748b", margin: "0 0 0.75rem", lineHeight: 1.5 }}>

                  </p>
                  <div style={{ display: "flex", flexDirection: "column", gap: "0.6rem" }}>
                    {Object.values(growthData.subgroupStats).filter(sg => sg.large).sort((a, b) => a.gap - b.gap).map(sg => {
                      const gapColor = sg.flagged ? "#dc2626" : sg.gap >= 0 ? "#15803d" : "#d97706";
                      const trendSymbol = sg.trend === "closing" ? "↑ Closing gap" : sg.trend === "widening" ? "↓ Widening gap" : sg.trend === "holding" ? "→ Holding steady" : null;
                      const trendColor = sg.trend === "closing" ? "#15803d" : sg.trend === "widening" ? "#dc2626" : "#64748b";
                      return (
                        <div key={sg.name} style={{ border: `1px solid ${sg.flagged ? "#fca5a5" : "#e2e8f0"}`, borderLeft: `4px solid ${gapColor}`, borderRadius: 8, padding: "0.75rem 1rem", background: sg.flagged ? "#fef2f2" : "white" }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "0.5rem" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: "0.6rem" }}>
                              <span style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.9rem" }}>{sg.name}</span>
                              <span style={{ fontSize: "0.7rem", color: "#64748b" }}>n={sg.count}</span>
                              {sg.flagged && <span style={{ background: "#fee2e2", color: "#dc2626", borderRadius: 4, padding: "0.1rem 0.45rem", fontSize: "0.68rem", fontWeight: 800 }}>⚠️ GAP</span>}

                              <span style={{ fontSize: "0.85rem", color: gapColor, fontWeight: 700 }}>{sg.gap >= 0 ? "+" : ""}{sg.gap} pts vs class</span>
                              {trendSymbol && <span style={{ fontSize: "0.78rem", color: trendColor, fontWeight: 600 }}>{trendSymbol}</span>}
                            </div>
                          </div>
                          <div style={{ marginTop: "0.5rem", height: 6, background: "#e2e8f0", borderRadius: 3, overflow: "hidden", position: "relative" }}>
                            <div style={{ position: "absolute", left: Math.min(growthData.classAvg, 100) + "%", top: 0, bottom: 0, width: 2, background: "#94a3b8" }} />
                            <div style={{ width: Math.min(sg.avg, 100) + "%", height: "100%", background: gapColor, borderRadius: 3 }} />
                          </div>
                          <div style={{ fontSize: "0.65rem", color: "#94a3b8", marginTop: "0.3rem" }}>Class avg: {growthData.classAvg}%</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* ── STUDENT RISK TRACKING ── */}
              {growthData && (() => {
                const riskOrder = { "PERSISTENTLY_AT_RISK": 0, "AT_RISK": 1, "RECOVERING": 2, "OK": 3 };
                const byTeacher = {};
                growthData.enriched.forEach(s => {
                  const t = s.teacherName || s.teacherLabel || "Unknown";
                  if (!byTeacher[t]) byTeacher[t] = [];
                  byTeacher[t].push(s);
                });
                Object.keys(byTeacher).forEach(t => {
                  byTeacher[t].sort((a, b) => (riskOrder[a.riskStatus] ?? 3) - (riskOrder[b.riskStatus] ?? 3) || a.name.localeCompare(b.name));
                });
                const teacherKeys = Object.keys(byTeacher).sort();

                return (
                  <div style={{ marginBottom: "1.75rem" }}>
                    <h2 style={{ color: "#0f172a", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Lora', serif" }}>📈 Student Risk Tracking</h2>

                      <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 8, padding: "0.7rem 1rem", fontSize: "0.82rem", color: "#92400e", marginBottom: "0.75rem" }}>

                    ) : (
                      <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", marginBottom: "0.75rem", fontSize: "0.72rem" }}>
                        {[["PERSISTENTLY_AT_RISK","#dc2626","#fee2e2","Persistently At Risk"],["AT_RISK","#d97706","#fef9c3","At Risk"],["RECOVERING","#7c3aed","#f5f3ff","Recovering"]].map(([k,c,bg,lbl]) => (

                        <div key={teacherKey} style={{ marginBottom: "1.25rem" }}>
                          <div style={{ fontSize: "0.7rem", fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.06em", padding: "0.4rem 0", borderBottom: "1px solid #e2e8f0", marginBottom: "0.5rem" }}>
                            {teacherKey} · {flagged.length} flagged of {allStu.length} students
                          </div>
                          {flagged.length === 0
                            ? <p style={{ fontSize: "0.82rem", color: "#15803d", fontWeight: 600, margin: "0.25rem 0" }}>✓ All students proficient — no flags this assessment.</p>
                            : <div style={{ display: "flex", flexDirection: "column", gap: "0.4rem" }}>
                              {flagged.map(s => {
                                const riskColors = {
                                  "PERSISTENTLY_AT_RISK": { bg: "#fee2e2", border: "#fca5a5", badge: "#dc2626", badgeBg: "#fee2e2", label: "Persistently At Risk" },
                                  "AT_RISK": { bg: "#fef9c3", border: "#fde68a", badge: "#d97706", badgeBg: "#fef9c3", label: "At Risk" },
                                  "RECOVERING": { bg: "#f5f3ff", border: "#ddd6fe", badge: "#7c3aed", badgeBg: "#f5f3ff", label: "Recovering" },
                                  "OK": { bg: "white", border: "#e0e7ff", badge: "#15803d", badgeBg: "#dcfce7", label: "Proficient" },
                                };
                                const rc = riskColors[s.riskStatus] || riskColors["OK"];
                                return (
                                  <div key={s.name} style={{ border: `1px solid ${rc.border}`, borderLeft: `3px solid ${rc.badge}`, borderRadius: 7, padding: "0.6rem 0.85rem", background: rc.bg, display: "flex", alignItems: "center", flexWrap: "wrap", gap: "0.5rem" }}>
                                    <span style={{ fontWeight: 600, color: "#0f172a", fontSize: "0.85rem", flex: "1 1 120px" }}>{s.name}</span>
                                    <span style={{ background: rc.badgeBg, color: rc.badge, borderRadius: 4, padding: "0.1rem 0.45rem", fontSize: "0.68rem", fontWeight: 800 }}>{rc.label}</span>
                                    {s.subgroups.length > 0 && <span style={{ fontSize: "0.7rem", color: "#64748b" }}>{s.subgroups.join(", ")}</span>}
                                    <div style={{ display: "flex", gap: "0.25rem", flexWrap: "wrap", alignItems: "center" }}>
                                      {s.history.map((h, i) => {
                                        const hReassess = (s.reassessedAssessments || []).find(r => r.assessment === h.assessment);
                                        return (
                                          <span key={i} title={h.assessment + (hReassess ? ` (reassessed from ${hReassess.originalPct}%)` : "")}
                                            style={{ background: h.score >= 70 ? "#dcfce7" : "#fee2e2", color: h.score >= 70 ? "#15803d" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.35rem", fontSize: "0.68rem", fontWeight: 700, display: "inline-flex", alignItems: "center", gap: "0.15rem" }}>
                                            {hReassess && (
                                              <span style={{ color: hReassess.originalPct >= 70 ? "#15803d" : "#dc2626", opacity: 0.65, textDecoration: "line-through", fontSize: "0.62rem" }}>{hReassess.originalPct}%</span>
                                            )}
                                            {hReassess && <span style={{ opacity: 0.5, fontSize: "0.6rem" }}>↑</span>}
                                            {h.score}%
                                          </span>
                                        );
                                      })}
                                      {s.history.length > 0 && <span style={{ color: "#94a3b8", fontSize: "0.65rem" }}>→</span>}
                                      {(() => {
                                        const curReassess = (s.reassessedAssessments || []).find(r => r.assessment === currentAssessmentName);
                                        return (
                                          <span style={{ background: s.proficient ? "#dcfce7" : "#fee2e2", color: s.proficient ? "#15803d" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.35rem", fontSize: "0.68rem", fontWeight: 800, outline: "2px solid currentColor", outlineOffset: 1, display: "inline-flex", alignItems: "center", gap: "0.15rem" }}>
                                            {curReassess && (
                                              <span style={{ color: curReassess.originalPct >= 70 ? "#15803d" : "#dc2626", opacity: 0.65, textDecoration: "line-through", fontSize: "0.62rem" }}>{curReassess.originalPct}%</span>
                                            )}
                                            {curReassess && <span style={{ opacity: 0.5, fontSize: "0.6rem" }}>↑</span>}
                                            {s.pct}%
                                          </span>
                                        );
                                      })()}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          }
                        </div>
                      );
                    })}
                  </div>
                );
              })()}

              {/* ── SMALL SUBGROUP SPOTLIGHT ── */}
              {growthData && Object.values(growthData.subgroupStats).some(sg => !sg.large) && (() => {
                const smallSgs = Object.values(growthData.subgroupStats).filter(sg => !sg.large);
                const riskOrder = { "PERSISTENTLY_AT_RISK": 0, "AT_RISK": 1, "RECOVERING": 2, "OK": 3 };
                const riskLabels = {
                  "PERSISTENTLY_AT_RISK": { label: "Persistently At Risk", color: "#dc2626", bg: "#fee2e2" },
                  "AT_RISK": { label: "At Risk", color: "#d97706", bg: "#fef9c3" },
                  "RECOVERING": { label: "Recovering", color: "#7c3aed", bg: "#f5f3ff" },
                  "OK": { label: "Proficient", color: "#15803d", bg: "#dcfce7" },
                };
                const teacherKeys = [...new Set(growthData.enriched.map(s => s.teacherName || s.teacherLabel))].sort();
                return (
                  <div style={{ marginBottom: "1.75rem" }}>
                    <h2 style={{ color: "#0f172a", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Lora', serif" }}>🔦 Small Subgroup Spotlight</h2>
                    <p style={{ fontSize: "0.78rem", color: "#64748b", margin: "0 0 0.75rem", lineHeight: 1.5 }}>
                      These subgroups have 20 or fewer students — too small for reliable group comparisons. Each student is listed individually by teacher. Focus on growth conversation: what's working for students thriving, and what support might help those who are not?
                    </p>
                    {smallSgs.map(sg => {
                      const allRows = [];
                      teacherKeys.forEach(tk => {
                        const members = growthData.enriched.filter(s => (s.teacherName || s.teacherLabel) === tk && s.subgroups.includes(sg.name));
                        if (!members.length) return;
                        const sorted = [...members].sort((a, b) => (riskOrder[a.riskStatus] ?? 3) - (riskOrder[b.riskStatus] ?? 3) || a.name.localeCompare(b.name));
                        sorted.forEach((s, i) => allRows.push({ ...s, teacherKey: tk, firstInTeacher: i === 0, teacherCount: sorted.length }));
                      });
                      if (!allRows.length) return null;
                      const avgPct = Math.round(allRows.reduce((a, s) => a + s.pct, 0) / allRows.length);
                      const profCount2 = allRows.filter(s => s.proficient).length;
                      return (
                        <div key={sg.name} style={{ marginBottom: "1.25rem" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "0.5rem" }}>
                            <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.9rem" }}>{sg.name}</div>
                            <div style={{ fontSize: "0.7rem", color: "#64748b" }}>n={allRows.length} · avg {avgPct}% · {profCount2}/{allRows.length} proficient</div>
                          </div>
                          <div style={{ background: "white", borderRadius: 8, overflow: "hidden", border: "1px solid #e2e8f0" }}>
                            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.78rem" }}>
                              <thead>
                                <tr style={{ background: "#f8fafc" }}>
                                  {["Teacher","Student","Status","Score History → Current"].map(h => (
                                    <th key={h} style={{ padding: "0.45rem 0.7rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "2px solid #e2e8f0", fontSize: "0.72rem" }}>{h}</th>
                                  ))}
                                </tr>
                              </thead>
                              <tbody>
                                {allRows.map((s, i) => {
                                  const rl = riskLabels[s.riskStatus] || riskLabels["OK"];
                                  return (
                                    <tr key={i} style={{ borderBottom: "1px solid #f1f5f9", background: i % 2 === 0 ? "white" : "#fafafa" }}>
                                      <td style={{ padding: "0.4rem 0.7rem", fontWeight: 600, color: "#0f766e", verticalAlign: "top" }}>{s.firstInTeacher ? s.teacherKey : ""}</td>
                                      <td style={{ padding: "0.4rem 0.7rem", fontWeight: 500 }}>{s.name}</td>
                                      <td style={{ padding: "0.4rem 0.7rem" }}>
                                        <span style={{ background: rl.bg, color: rl.color, borderRadius: 4, padding: "0.1rem 0.4rem", fontSize: "0.68rem", fontWeight: 800 }}>{rl.label}</span>
                                      </td>
                                      <td style={{ padding: "0.4rem 0.7rem" }}>
                                        <div style={{ display: "flex", gap: "0.25rem", flexWrap: "wrap", alignItems: "center" }}>
                                          {s.history.map((h, j) => (
                                            (() => {
                                              const hReassess = (s.reassessedAssessments || []).find(r => r.assessment === h.assessment);
                                              return (
                                                <span key={j} title={h.assessment + (hReassess ? ` (reassessed from ${hReassess.originalPct}%)` : "")}
                                                  style={{ background: h.score >= 70 ? "#dcfce7" : "#fee2e2", color: h.score >= 70 ? "#15803d" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.3rem", fontSize: "0.68rem", fontWeight: 700, display: "inline-flex", alignItems: "center", gap: "0.15rem" }}>
                                                  {hReassess && <span style={{ color: hReassess.originalPct >= 70 ? "#15803d" : "#dc2626", opacity: 0.65, textDecoration: "line-through", fontSize: "0.6rem" }}>{hReassess.originalPct}%</span>}
                                                  {hReassess && <span style={{ opacity: 0.5, fontSize: "0.58rem" }}>↑</span>}
                                                  {h.score}%
                                                </span>
                                              );
                                            })()
                                          ))}
                                          {s.history.length > 0 && <span style={{ color: "#94a3b8", fontSize: "0.65rem" }}>→</span>}
                                          {(() => {
                                            const curReassess = (s.reassessedAssessments || []).find(r => r.assessment === currentAssessmentName);
                                            return (
                                              <span style={{ background: s.proficient ? "#dcfce7" : "#fee2e2", color: s.proficient ? "#15803d" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.3rem", fontSize: "0.68rem", fontWeight: 800, outline: "2px solid currentColor", outlineOffset: 1, display: "inline-flex", alignItems: "center", gap: "0.15rem" }}>
                                                {curReassess && <span style={{ color: curReassess.originalPct >= 70 ? "#15803d" : "#dc2626", opacity: 0.65, textDecoration: "line-through", fontSize: "0.6rem" }}>{curReassess.originalPct}%</span>}
                                                {curReassess && <span style={{ opacity: 0.5, fontSize: "0.58rem" }}>↑</span>}
                                                {s.pct}%
                                              </span>
                                            );
                                          })()}
                                        </div>
                                      </td>
                                    </tr>
                                  );
                                })}
                              </tbody>
                            </table>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}

              {/* ── REASSESSMENT TRACKER ── */}
              {growthData && growthData.reassessments.length > 0 && (() => {
                const items = growthData.reassessments;

                // Flatten all reassessed instances for summary counts
                const allInstances = items.flatMap(s => s.reassessedAssessments);
                const crossedCount = allInstances.filter(r => r.crossedProficiency).length;
                const alreadyProfCount = allInstances.filter(r => !r.crossedProficiency && r.originalPct >= 70).length;
                const stillBelowCount = allInstances.filter(r => !r.crossedProficiency && r.originalPct < 70).length;
                // Multi-assessment reassessors: reassessed on 2+ tests this session or had prior reassessments in history
                const multiReassessors = items.filter(s =>
                  s.reassessedAssessments.length > 1 ||
                  s.history.some(h => h.originalScore !== null && h.originalScore !== undefined)
                );

                const gradeLabel = (pct) => pct >= 90 ? "A" : pct >= 80 ? "B" : pct >= 70 ? "C" : pct >= 60 ? "D" : "F";
                const gradeColor = (pct) => pct >= 90 ? "#15803d" : pct >= 80 ? "#65a30d" : pct >= 70 ? "#d97706" : pct >= 60 ? "#ea580c" : "#dc2626";
                const gradeBg   = (pct) => pct >= 90 ? "#dcfce7" : pct >= 80 ? "#f0fdf4" : pct >= 70 ? "#fef9c3" : pct >= 60 ? "#fff7ed" : "#fee2e2";

                return (
                  <div style={{ marginBottom: "1.75rem" }}>
                    <h2 style={{ color: "#0f172a", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Lora', serif" }}>🔄 Reassessment Tracker</h2>
                    <p style={{ fontSize: "0.78rem", color: "#64748b", margin: "0 0 0.75rem", lineHeight: 1.5 }}>
                      Students whose scores changed since the last session, organized by teacher then by assessment. Key PLC question: are the students reassessing those who were already proficient, or those who needed additional support?
                    </p>

                    {/* Summary chips */}
                    <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", marginBottom: "1rem" }}>
                      <span style={{ background: "#f5f3ff", color: "#7c3aed", borderRadius: 20, padding: "0.2rem 0.7rem", fontSize: "0.72rem", fontWeight: 700 }}>{items.length} students · {allInstances.length} reassessment{allInstances.length !== 1 ? "s" : ""}</span>
                      {crossedCount > 0 && <span style={{ background: "#dcfce7", color: "#15803d", borderRadius: 20, padding: "0.2rem 0.7rem", fontSize: "0.72rem", fontWeight: 700 }}>✓ {crossedCount} crossed into proficiency</span>}
                      {alreadyProfCount > 0 && <span style={{ background: "#fef9c3", color: "#92400e", borderRadius: 20, padding: "0.2rem 0.7rem", fontSize: "0.72rem", fontWeight: 700 }}>⚠ {alreadyProfCount} already proficient</span>}
                      {stillBelowCount > 0 && <span style={{ background: "#fee2e2", color: "#dc2626", borderRadius: 20, padding: "0.2rem 0.7rem", fontSize: "0.72rem", fontWeight: 700 }}>✗ {stillBelowCount} still below proficiency</span>}
                      {multiReassessors.length > 0 && <span style={{ background: "#fff7ed", color: "#c2410c", borderRadius: 20, padding: "0.2rem 0.7rem", fontSize: "0.72rem", fontWeight: 700 }}>↻ {multiReassessors.length} reassessed on multiple assessments</span>}
                    </div>

                    <div style={{ background: "white", borderRadius: 10, overflow: "hidden", border: "1px solid #e2e8f0" }}>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.8rem" }}>
                        <thead>
                          <tr style={{ background: "#f8fafc" }}>
                            {["Student", "Assessment", "Original", "Reassessed", "Outcome"].map(h => (
                              <th key={h} style={{ padding: "0.5rem 0.75rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "2px solid #e2e8f0", fontSize: "0.72rem", whiteSpace: "nowrap" }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {(() => {
                            // Group: Teacher → Student (alpha) → Assessment (alpha)
                            const teacherNames = [...new Set(items.map(s => s.teacherName || s.teacherLabel))].sort();
                            const rows = [];
                            teacherNames.forEach((tName, ti) => {
                              const teacherItems = [...items.filter(s => (s.teacherName || s.teacherLabel) === tName)]
                                .sort((a, b) => a.name.localeCompare(b.name));

                              // Teacher header row
                              rows.push(
                                <tr key={"t-" + tName} style={{ background: "#e0f7f4" }}>
                                  <td colSpan={5} style={{ padding: "0.55rem 0.75rem", fontWeight: 800, color: "#0f766e", fontSize: "0.88rem", borderBottom: "2px solid #99f6e4", borderTop: ti > 0 ? "3px solid #0f766e" : "none", letterSpacing: "0.01em" }}>
                                    {tName} <span style={{ fontWeight: 500, fontSize: "0.72rem", color: "#0d9488", marginLeft: "0.4rem" }}>· {teacherItems.length} student{teacherItems.length !== 1 ? "s" : ""}</span>
                                  </td>
                                </tr>
                              );

                              // Each student, then their assessments sorted alphabetically
                              teacherItems.forEach((s, si) => {
                                const isMulti = s.reassessedAssessments.length > 1 ||
                                  s.history.some(h => h.originalScore !== null && h.originalScore !== undefined);
                                const sortedAssess = [...s.reassessedAssessments]
                                  .sort((a, b) => a.assessment.localeCompare(b.assessment));

                                sortedAssess.forEach((r, ri) => {
                                  const gain = r.newPct - r.originalPct;
                                  const origWasProf = r.originalPct >= 70;
                                  const isFirstRow = ri === 0;
                                  const isLastRow = ri === sortedAssess.length - 1;
                                  rows.push(
                                    <tr key={tName + "-" + s.name + "-" + r.assessment}
                                      style={{ borderBottom: isLastRow ? "2px solid #e8f5f2" : "1px solid #f1f5f9", background: si % 2 === 0 ? "white" : "#fafafa" }}>
                                      {/* Student name — only on first assessment row */}
                                      <td style={{ padding: "0.45rem 0.75rem", fontWeight: 600, color: "#0f172a", verticalAlign: "top" }}>
                                        {isFirstRow && (
                                          <div style={{ display: "flex", alignItems: "center", gap: "0.35rem" }}>
                                            {s.name}
                                            {isMulti && <span style={{ background: "#fff7ed", color: "#c2410c", borderRadius: 4, padding: "0.05rem 0.3rem", fontSize: "0.6rem", fontWeight: 800 }}>↻</span>}
                                          </div>
                                        )}
                                      </td>
                                      <td style={{ padding: "0.45rem 0.75rem", color: "#475569", fontSize: "0.75rem" }}>
                                        {r.assessment}
                                        {r.assessment === currentAssessmentName && <span style={{ marginLeft: "0.3rem", fontSize: "0.62rem", color: "#0f766e", fontWeight: 700 }}>current</span>}
                                      </td>
                                      <td style={{ padding: "0.45rem 0.75rem" }}>
                                        <div style={{ display: "flex", alignItems: "center", gap: "0.3rem" }}>
                                          <span style={{ background: gradeBg(r.originalPct), color: gradeColor(r.originalPct), borderRadius: 4, padding: "0.1rem 0.35rem", fontSize: "0.72rem", fontWeight: 800 }}>{gradeLabel(r.originalPct)}</span>
                                          <span style={{ fontWeight: 600 }}>{r.originalPct}%</span>
                                        </div>
                                      </td>
                                      <td style={{ padding: "0.45rem 0.75rem" }}>
                                        <div style={{ display: "flex", alignItems: "center", gap: "0.3rem" }}>
                                          <span style={{ background: gradeBg(r.newPct), color: gradeColor(r.newPct), borderRadius: 4, padding: "0.1rem 0.35rem", fontSize: "0.72rem", fontWeight: 800 }}>{gradeLabel(r.newPct)}</span>
                                          <span style={{ fontWeight: 600 }}>{r.newPct}%</span>
                                          <span style={{ color: "#15803d", fontSize: "0.7rem", fontWeight: 700 }}>(+{gain}%)</span>
                                        </div>
                                      </td>
                                      <td style={{ padding: "0.45rem 0.75rem" }}>
                                        {r.crossedProficiency
                                          ? <span style={{ background: "#dcfce7", color: "#15803d", borderRadius: 4, padding: "0.1rem 0.45rem", fontSize: "0.7rem", fontWeight: 700 }}>Not Prof → Proficient</span>
                                          : origWasProf
                                            ? <span style={{ background: "#fef9c3", color: "#92400e", borderRadius: 4, padding: "0.1rem 0.45rem", fontSize: "0.7rem", fontWeight: 700 }}>Already Proficient</span>
                                            : <span style={{ background: "#fee2e2", color: "#dc2626", borderRadius: 4, padding: "0.1rem 0.45rem", fontSize: "0.7rem", fontWeight: 700 }}>Still Not Proficient</span>
                                        }
                                      </td>
                                    </tr>
                                  );
                                });
                              });
                            });
                            return rows;
                          })()}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              })()}

              {/* ── EXPORT ACTIONS ── */}
              {!isSnapshot && (
              <div className="no-print" style={{ borderTop: "1px solid #e2e8f0", paddingTop: "1.5rem", marginTop: "0.5rem", display: "flex", flexDirection: "column", gap: "1rem" }}>
                {/* Analytics CSV Export */}
                {growthData && (
                  <div style={{ background: "#f0fdfa", border: "1px solid #99f6e4", borderRadius: 10, padding: "1rem 1.25rem" }}>
                    <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.9rem", marginBottom: "0.3rem" }}>📥 Save Analytics for Next Session</div>
                    <p style={{ fontSize: "0.78rem", color: "#475569", margin: "0 0 0.75rem" }}>
                      Saves your analytics to Google Drive. Next session, load this from the Upload tab to enable risk tracking, reassessment detection, and cross-assessment history.
                    </p>
                    <div style={{ display: "flex", gap: "0.75rem", flexWrap: "wrap", alignItems: "center" }}>
                    {/* Save to Drive button */}
                    <button
                      onClick={driveSaveAnalytics}
                      disabled={driveStatus === "saving"}
                      style={{ display: "flex", alignItems: "center", gap: "0.4rem", background: driveStatus === "saved" ? "#15803d" : "#1967d2", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.2rem", fontSize: "0.85rem", fontWeight: 700, cursor: driveStatus === "saving" ? "not-allowed" : "pointer", fontFamily: "inherit", opacity: driveStatus === "saving" ? 0.75 : 1 }}>
                      <svg width="15" height="15" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg" style={{ flexShrink: 0 }}><path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="rgba(255,255,255,0.9)"/><path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="rgba(255,255,255,0.9)"/><path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" fill="rgba(255,255,255,0.9)"/><path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="rgba(255,255,255,0.7)"/><path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="rgba(255,255,255,0.9)"/><path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 27h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="rgba(255,255,255,0.9)"/></svg>
                      {driveStatus === "saving" ? "Saving…" : driveStatus === "saved" ? "✓ Saved to Drive" : "Save to Google Drive"}
                    </button>
                    </div>

                    {/* Drive status message in export section */}
                    {driveMsg && driveStatus !== "idle" && (
                      <div style={{ marginTop: "0.5rem", fontSize: "0.75rem", color: driveStatus === "error" ? "#dc2626" : driveStatus === "saved" ? "#15803d" : "#475569", fontWeight: 500 }}>
                        {driveMsg}
                      </div>
                    )}
                  </div>
                )}

              </div>
              )} {/* end !isSnapshot export wrapper */}
            </div>
          );
        })()}


        </div>
      </div>
      </React.Fragment>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
