                                    </div>
                                  )}

                                  <div style={{ fontSize: "0.75rem", color: "#92400e", fontWeight: 600 }}>
                                    Confirm or edit the teacher and section name — Reach will remember this for next time.
                                  </div>

                                  <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", alignItems: "flex-end" }}>
                                    <div style={{ flex: 1, minWidth: 140 }}>
                                      <label style={{ display: "block", fontSize: "0.7rem", fontWeight: 700, color: "#78350f", marginBottom: "0.2rem", textTransform: "uppercase", letterSpacing: "0.05em" }}>Teacher Name</label>
                                      <input value={renaming.teacherName} onChange={e => setPendingRenames(prev => ({ ...prev, [s.teacherLabel]: { ...prev[s.teacherLabel], teacherName: e.target.value } }))}
                                        placeholder="e.g. Smith" style={{ width: "100%", border: "1px solid #fde68a", borderRadius: 6, padding: "0.35rem 0.6rem", fontSize: "0.82rem", fontFamily: "inherit", outline: "none", background: "white" }} />
                                    </div>
                                    <div style={{ flex: 1, minWidth: 140 }}>
                                      <label style={{ display: "block", fontSize: "0.7rem", fontWeight: 700, color: "#78350f", marginBottom: "0.2rem", textTransform: "uppercase", letterSpacing: "0.05em" }}>Section Label</label>
                                      <input value={renaming.label} onChange={e => setPendingRenames(prev => ({ ...prev, [s.teacherLabel]: { ...prev[s.teacherLabel], label: e.target.value } }))}
                                        placeholder="e.g. Smith Period 1" style={{ width: "100%", border: "1px solid #fde68a", borderRadius: 6, padding: "0.35rem 0.6rem", fontSize: "0.82rem", fontFamily: "inherit", outline: "none", background: "white" }} />
                                    </div>
                                    <button onClick={() => confirmRename(s.teacherLabel, renaming.teacherName.trim(), renaming.label.trim(), s._fingerprint)}
                                      disabled={!renaming.teacherName.trim()}
                                      style={{ background: renaming.teacherName.trim() ? "#0f766e" : "#e2e8f0", color: renaming.teacherName.trim() ? "white" : "#94a3b8", border: "none", borderRadius: 7, padding: "0.35rem 0.9rem", fontSize: "0.8rem", fontWeight: 700, cursor: renaming.teacherName.trim() ? "pointer" : "not-allowed", fontFamily: "inherit", whiteSpace: "nowrap" }}>
                                      Confirm & Remember
                                    </button>
                                    <button onClick={() => { setPendingRenames(prev => { const n = { ...prev }; delete n[s.teacherLabel]; return n; }); setSections(prev => prev.map(x => x.teacherLabel === s.teacherLabel ? { ...x, _needsRename: false } : x)); }}
                                      style={{ background: "none", border: "none", color: "#94a3b8", cursor: "pointer", fontFamily: "inherit", fontSize: "0.75rem", padding: 0 }}>
                                      Skip
                                    </button>
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {/* Column mapping UI */}
                    {pendingMapping && (
                      <ColumnMappingUI rows={pendingMapping.rows} fileName={pendingMapping.fileName} onConfirm={confirmMapping} onCancel={() => setPendingMapping(null)} />
                    )}

                    {/* Mismatch resolver */}
                    {pendingMismatches.length > 0 && (
                      <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 10, padding: "1rem 1.25rem", marginTop: "0.75rem" }}>
                        <div style={{ fontWeight: 700, color: "#92400e", fontSize: "0.88rem", marginBottom: "0.25rem" }}>⚠️ Assessment name mismatch detected</div>
                        <p style={{ fontSize: "0.78rem", color: "#78350f", margin: "0 0 0.75rem", lineHeight: 1.5 }}>Teachers are using different names for the same assessment. Set a canonical name for each — saved automatically so you only need to do this once.</p>
                        <div style={{ display: "flex", flexDirection: "column", gap: "0.75rem" }}>
                          {pendingMismatches.map((m, mi) => (
                            <div key={mi} style={{ background: "white", borderRadius: 8, padding: "0.75rem 1rem", border: "1px solid #fde68a" }}>
                              <div style={{ fontSize: "0.72rem", fontWeight: 700, color: "#92400e", marginBottom: "0.4rem", textTransform: "uppercase", letterSpacing: "0.04em" }}>Column {m.colIndex + 1}</div>
                              <div style={{ display: "flex", flexWrap: "wrap", gap: "0.35rem", marginBottom: "0.6rem" }}>
                                {Object.entries(m.names).map(([label, name]) => (
                                  <span key={label} style={{ background: "#fef9c3", borderRadius: 6, padding: "0.2rem 0.6rem", fontSize: "0.72rem" }}>
                                    <span style={{ fontWeight: 700, color: "#78350f" }}>{label}:</span>
                                    <span style={{ color: "#92400e", marginLeft: "0.3rem" }}>"{name}"</span>
                                  </span>
                                ))}
                              </div>
                              <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
                                <label style={{ fontSize: "0.75rem", fontWeight: 600, color: "#78350f", whiteSpace: "nowrap" }}>Canonical name:</label>
                                <input value={m.draft} onChange={e => setPendingMismatches(prev => prev.map((x, i) => i === mi ? { ...x, draft: e.target.value } : x))}
                                  style={{ flex: 1, border: "1px solid #fde68a", borderRadius: 6, padding: "0.35rem 0.6rem", fontSize: "0.82rem", fontFamily: "inherit", outline: "none", background: "#fffbeb" }} placeholder="e.g. Unit 7 Test" />
                                <button onClick={() => {
                                  const canonical = m.draft.trim(); if (!canonical) return;
                                  const newEntries = {}; Object.values(m.names).forEach(rawName => { newEntries[rawName] = canonical; });
                                  setNameMap(prev => {
                                    const updated = { ...prev, ...newEntries };
                                    driveSaveNameMap(updated);
                                    return updated;
                                  });
                                  setPendingMismatches(prev => prev.filter((_, i) => i !== mi));
                                }} style={{ background: "#0f766e", color: "white", border: "none", borderRadius: 6, padding: "0.35rem 0.8rem", fontSize: "0.78rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}>Confirm</button>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              );
            })()}

            {/* ── Continue button ── */}
            {sections.length > 0 && pendingMismatches.length === 0 && !pendingMapping && (
              <div style={{ display: "flex", justifyContent: "flex-end", alignItems: "center", gap: "0.75rem" }}>
                {Object.keys(pendingRenames).length > 0 && (
                  <span style={{ fontSize: "0.75rem", color: "#d97706", fontWeight: 600 }}>
                    ⚠️ {Object.keys(pendingRenames).length} section{Object.keys(pendingRenames).length !== 1 ? "s" : ""} need{Object.keys(pendingRenames).length === 1 ? "s" : ""} naming
                  </span>
                )}
                <button onClick={() => setActiveTab("data")}
                  style={{ background: "linear-gradient(135deg, #0f766e, #0d9488)", color: "white", border: "none", borderRadius: 8, padding: "0.65rem 1.75rem", fontSize: "0.92rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", boxShadow: "0 3px 12px rgba(15,118,110,0.3)" }}>
                  Continue to Data →
                </button>
              </div>
            )}
          </div>
        )}

        {/* ── DATA TAB ── */}
        {activeTab === "data" && sections.length === 0 && (
          <div style={{ textAlign: "center", padding: "3rem", color: "#64748b" }}>
            <div style={{ fontSize: "2.5rem", marginBottom: "0.75rem" }}>📭</div>
            <p>No data yet. Upload Gradebook CSV files to get started.</p>
            <button onClick={() => setActiveTab("upload")} style={{ background: "#0f766e", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.2rem", fontFamily: "inherit", fontWeight: 600, cursor: "pointer" }}>Upload Files →</button>
          </div>
        )}

        {activeTab === "data" && sections.length > 0 && (
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "1.25rem" }}>
              <div onClick={() => document.getElementById("fileIn2").click()}
                style={{ border: "2px dashed #99f6e4", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", background: "white", color: "#0f766e", gap: "0.4rem", padding: "0.6rem 1.1rem", fontSize: "0.82rem", fontWeight: 600 }}>
                <span style={{ fontSize: "1.1rem" }}>＋</span>
                <span>Add more sections</span>
                <input id="fileIn2" type="file" accept=".csv" multiple onChange={e => processFiles(e.target.files)} style={{ display: "none" }} />
              </div>
              <span style={{ fontSize: "0.75rem", color: "#64748b" }}>{sections.length} section{sections.length !== 1 ? "s" : ""} loaded</span>
            </div>

            <div style={{ textAlign: "center", marginBottom: "1.25rem" }}>
              <button onClick={generateReport}
                style={{ background: "linear-gradient(135deg, #0f766e, #0d9488)", color: "white", border: "none", borderRadius: 10, padding: "0.85rem 2.5rem", fontSize: "1rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", boxShadow: "0 4px 18px rgba(15,118,110,0.35)" }}>
                📊 Generate Report — {currentAssessmentName}
              </button>
            </div>

            {/* Student scores preview table — uses built-in pct */}
            {(() => {
              const allStudentRows = sections.flatMap(sec =>
                sec.students
                  .filter(s => s.pct !== null)
                  .map(s => ({ ...s, teacherLabel: sec.teacherLabel,
                    possible: sec.validCols[sec.validCols.length - 1]?.possible ?? 1 }))
              ).sort((a, b) => a.pct - b.pct);
              const totalProf = allStudentRows.filter(s => s.pct >= teamSettings.proficiencyThreshold).length;
              const totalProfPct = allStudentRows.length > 0 ? Math.round((totalProf / allStudentRows.length) * 100) : 0;

              return (
                <div style={{ background: "white", borderRadius: 10, overflow: "hidden", boxShadow: "0 2px 8px rgba(15,23,42,0.07)", marginBottom: "1.25rem" }}>
                  <div onClick={() => setStudentTableOpen(o => !o)} style={{ padding: "0.85rem 1.25rem", borderBottom: studentTableOpen ? "1px solid #e2e8f0" : "none", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: "0.5rem", cursor: "pointer", userSelect: "none" }}>
                    <h3 style={{ margin: 0, color: "#0f172a", fontFamily: "'Lora', serif", fontSize: "0.92rem" }}>Student Scores — {currentAssessmentName}</h3>
                    <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
                      <span style={{ fontSize: "0.72rem", color: "#64748b" }}>{allStudentRows.length} students</span>
                      <span style={{ background: totalProfPct >= 70 ? "#dcfce7" : "#fee2e2", color: totalProfPct >= 70 ? "#15803d" : "#dc2626", borderRadius: 20, padding: "0.15rem 0.55rem", fontSize: "0.72rem", fontWeight: 700 }}>{totalProfPct}% Proficient</span>
                      <span style={{ color: "#94a3b8", fontSize: "0.8rem", fontWeight: 700 }}>{studentTableOpen ? "▲" : "▼"}</span>
                    </div>
                  </div>
                  {studentTableOpen && (
                    <div style={{ overflowX: "auto" }}>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.8rem" }}>
                        <thead>
                          <tr style={{ background: "#f8fafc" }}>
                            {["Student", ...(sections.length > 1 ? ["Section"] : []), "% Score", "Grade", "Proficiency", "Prior Assessments"].map(h => (
                              <th key={h} style={{ padding: "0.5rem 0.65rem", textAlign: "left", color: "#374151", fontWeight: 700, borderBottom: "2px solid #e2e8f0", fontSize: "0.72rem" }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {allStudentRows.map((s, i) => {
                            const grade = s.pct >= 90 ? "A" : s.pct >= 80 ? "B" : s.pct >= 70 ? "C" : s.pct >= 60 ? "D" : "F";
                            const gc = GRADE_COLORS[grade];
                            const gb = GRADE_BGS[grade];
                            return (
                              <tr key={i} style={{ borderBottom: "1px solid #f1f5f9", background: i % 2 === 0 ? "white" : "#fafafa" }}>
                                <td style={{ padding: "0.45rem 0.65rem", fontWeight: 500 }}>{s.name}</td>
                                {sections.length > 1 && <td style={{ padding: "0.45rem 0.65rem" }}><span style={{ background: "#f0fdfa", color: "#0f766e", borderRadius: 20, padding: "0.1rem 0.4rem", fontSize: "0.68rem", fontWeight: 600 }}>{s.teacherLabel}</span></td>}
                                <td style={{ padding: "0.45rem 0.65rem" }}>
                                  <div style={{ display: "flex", alignItems: "center", gap: "0.35rem" }}>
                                    <div style={{ width: 50, height: 5, background: "#e2e8f0", borderRadius: 3, overflow: "hidden" }}>
                                      <div style={{ width: `${Math.min(s.pct,100)}%`, height: "100%", background: gc, borderRadius: 3 }} />
                                    </div>
                                    <span style={{ fontWeight: 600 }}>{s.pct}%</span>
                                  </div>
                                </td>
                                <td style={{ padding: "0.45rem 0.65rem" }}><span style={{ background: gb, color: gc, borderRadius: 20, padding: "0.1rem 0.45rem", fontSize: "0.75rem", fontWeight: 800 }}>{grade}</span></td>
                                <td style={{ padding: "0.45rem 0.65rem" }}><span style={{ background: s.pct >= 70 ? "#dcfce7" : "#fee2e2", color: s.pct >= 70 ? "#15803d" : "#dc2626", borderRadius: 20, padding: "0.1rem 0.45rem", fontSize: "0.7rem", fontWeight: 700 }}>{s.pct >= teamSettings.proficiencyThreshold ? "Proficient" : "Not Proficient"}</span></td>
                                <td style={{ padding: "0.45rem 0.65rem" }}>
                                  <div style={{ display: "flex", gap: "0.2rem", flexWrap: "wrap" }}>
                                    {s.history.map((h, j) => (
                                      <span key={j} title={h.assessment} style={{ background: h.score >= 70 ? "#dcfce7" : "#fee2e2", color: h.score >= 70 ? "#15803d" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.3rem", fontSize: "0.65rem", fontWeight: 700 }}>{h.score}%</span>
                                    ))}
                                    {s.history.length === 0 && <span style={{ color: "#94a3b8", fontSize: "0.65rem" }}>—</span>}
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>
              );
            })()}
          </div>
        )}

        {/* ── ANALYSIS TAB ── */}
        {activeTab === "analysis" && !report && (
          <div style={{ textAlign: "center", padding: "3rem", color: "#64748b" }}>
            <div style={{ fontSize: "2.5rem", marginBottom: "0.75rem" }}>📊</div>
            <p>Go to the <strong>Data tab</strong> and click <strong>Generate Report</strong>.</p>
            <button onClick={() => setActiveTab(sections.length ? "data" : "upload")} style={{ background: "#0f766e", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.2rem", fontFamily: "inherit", fontWeight: 600, cursor: "pointer" }}>
              {sections.length ? "Go to Data →" : "Upload Files →"}
            </button>
          </div>
        )}

        {activeTab === "analysis" && report && (() => {
          const { stats, dist, proficient, notProficient, proficiencyPct, totalStudents, reassessedCount, reassessedToProfCount } = report;
          // hasPrior = true when any student has in-file prior columns OR cross-trimester analytics
          const hasPrior = sections.some(sec => sec.historyCols.length > 0) || (priorMap && Object.keys(priorMap).length > 0);

          return (
            <div className="tab-analysis">
              {/* Report header */}

                </div>

                <div style={{ background: "white", borderRadius: 10, padding: "1rem 1.25rem", boxShadow: "0 1px 4px rgba(15,23,42,0.07)", marginBottom: "1rem" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.5rem" }}>

                  <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.85rem", marginBottom: "0.75rem" }}>Grade Distribution</div>
                  {(() => {
                    const maxBarH = 180;
                    // Which grade band does the threshold fall in?
                    // A=90-100, B=80-89, C=70-79, D=60-69, F=<60
                    // We'll show a dotted line across the chart at the threshold position
                    // Position = fraction of the threshold within its grade band
                    const thresh = teamSettings.proficiencyThreshold;
                    // Find which column the threshold sits in
                    const bands = [["F",0,59,"#dc2626","#fee2e2","<60%"],["D",60,69,"#ea580c","#fff7ed","60–69%"],["C",70,79,"#d97706","#fef9c3","70–79%"],["B",80,89,"#65a30d","#f0fdf4","80–89%"],["A",90,100,"#15803d","#dcfce7","90–100%"]];
                    const threshBandIdx = bands.findIndex(([,lo,hi]) => thresh >= lo && thresh <= hi + 1);
                    return (
                      <div style={{ display: "flex", gap: "0.6rem", alignItems: "flex-end", position: "relative" }}>

                          const count = dist[g];
                          const pct = totalStudents > 0 ? Math.round((count / totalStudents) * 100) : 0;
                          const barH = Math.max(pct * 1.8, count > 0 ? 4 : 0);
                          const isThreshBand = bi === threshBandIdx;
                          // Within the band, where does the threshold sit? (0=bottom, 1=top of band)
                          const bandRange = hi - lo + 1;
                          const posInBand = (thresh - lo) / bandRange; // 0–1 from bottom of band
                          return (
                            <div key={g} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: "0.2rem", position: "relative" }}>
                              <div style={{ fontSize: "0.7rem", fontWeight: 700, color }}>{count > 0 ? pct + "%" : ""}</div>
                              <div style={{ width: "100%", position: "relative" }}>
                                <div style={{ width: "100%", height: barH, background: color, borderRadius: "3px 3px 0 0", minHeight: count > 0 ? 4 : 0 }} />
                                {/* Threshold marker line — spans full column width at threshold boundary */}
                                {isThreshBand && (
                                  <div style={{ position: "absolute", left: -3, right: -3, bottom: 0, display: "flex", flexDirection: "column", alignItems: "center", pointerEvents: "none" }}>
                                    <div style={{ background: "#0f172a", color: "white", fontSize: "0.55rem", fontWeight: 800, borderRadius: 3, padding: "0.1rem 0.3rem", whiteSpace: "nowrap", marginBottom: 2 }}>{thresh}% ▼</div>
                                    <div style={{ width: "100%", height: 2, background: "#0f172a", borderRadius: 1 }} />
                                  </div>

                              </div>
                              <div style={{ width: "100%", height: 2, background: "#e2e8f0" }} />
                              <div style={{ fontWeight: 800, color, fontSize: "0.85rem" }}>{g}</div>
                              <div style={{ fontWeight: 700, color, fontSize: "0.72rem" }}>{count}</div>
                              <div style={{ fontSize: "0.6rem", color: "#94a3b8", textAlign: "center" }}>{range}</div>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })()}
                </div>

                {/* Per-teacher summary — combined + collapsible period breakdown */}
                {(() => {
                  const teacherNames = [...new Set(sections.map(s => s.teacherName || s.teacherLabel))].sort();
                  if (sections.length <= 1) return null;

                  // Mini grade distribution bar for a set of pcts

                          const count = d[g];
                          const pct = Math.round((count / total) * 100);

                            <div key={g} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "0.1rem", minWidth: 20 }}>

                              <div style={{ width: 18, height: barH, background: color, borderRadius: "2px 2px 0 0", minHeight: count > 0 ? 3 : 0 }} />

                            <TeacherBreakdownCard

              </div>

              {/* ── SUBGROUP PERFORMANCE ── */}
              {growthData && Object.values(growthData.subgroupStats).some(sg => sg.large) && (
                <div style={{ marginBottom: "1.75rem" }}>
                  <h2 style={{ color: "#0f172a", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Lora', serif" }}>👥 Subgroup Performance</h2>
                  <p style={{ fontSize: "0.78rem", color: "#64748b", margin: "0 0 0.75rem", lineHeight: 1.5 }}>
                    Subgroups with more than 20 students compared to class average ({growthData.classAvg}%). Groups flagged ⚠️ are more than 10 points below the class average.
                  </p>
                  <div style={{ display: "flex", flexDirection: "column", gap: "0.6rem" }}>
                    {Object.values(growthData.subgroupStats).filter(sg => sg.large).sort((a, b) => a.gap - b.gap).map(sg => {
                      const gapColor = sg.flagged ? "#dc2626" : sg.gap >= 0 ? "#15803d" : "#d97706";
                      const trendSymbol = sg.trend === "closing" ? "↑ Closing gap" : sg.trend === "widening" ? "↓ Widening gap" : sg.trend === "holding" ? "→ Holding steady" : null;

                        <div key={sg.name} style={{ border: `1px solid ${sg.flagged ? "#fca5a5" : "#e2e8f0"}`, borderLeft: `4px solid ${gapColor}`, borderRadius: 8, padding: "0.75rem 1rem", background: sg.flagged ? "#fef2f2" : "white" }}>

                      );

                const teacherKeys = Object.keys(byTeacher).sort();

                return (

                                  "AT_RISK": { bg: teamSettings.riskSettings.level1Color + "15", border: teamSettings.riskSettings.level1Color + "66", badge: teamSettings.riskSettings.level1Color, badgeBg: teamSettings.riskSettings.level1Color + "22", label: teamSettings.riskSettings.level1Label },
                                  "RECOVERING": { bg: teamSettings.riskSettings.recoveringColor + "15", border: teamSettings.riskSettings.recoveringColor + "66", badge: teamSettings.riskSettings.recoveringColor, badgeBg: teamSettings.riskSettings.recoveringColor + "22", label: teamSettings.riskSettings.recoveringLabel },
                                  "OK": { bg: "white", border: "#e2e8f0", badge: "#15803d", badgeBg: "#dcfce7", label: "Reassessed ↑" },

                const smallSgs = Object.values(growthData.subgroupStats).filter(sg => !sg.large);

                  "PERSISTENTLY_AT_RISK": { label: teamSettings.riskSettings.level2Label, color: teamSettings.riskSettings.level2Color, bg: teamSettings.riskSettings.level2Color + "22" },
                  "AT_RISK": { label: teamSettings.riskSettings.level1Label, color: teamSettings.riskSettings.level1Color, bg: teamSettings.riskSettings.level1Color + "22" },
                  "RECOVERING": { label: teamSettings.riskSettings.recoveringLabel, color: teamSettings.riskSettings.recoveringColor, bg: teamSettings.riskSettings.recoveringColor + "22" },
                  "OK": { label: "Proficient", color: "#15803d", bg: "#dcfce7" },

                const teacherKeys = [...new Set(growthData.enriched.map(s => s.teacherName || s.teacherLabel))].sort();
                return (
                  <div style={{ marginBottom: "1.75rem" }}>
                    <h2 style={{ color: "#0f172a", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Lora', serif" }}>🔦 Small Subgroup Spotlight</h2>

                    </p>
                    {smallSgs.map(sg => {
                      const allRows = [];
                      teacherKeys.forEach(tk => {
                        const members = growthData.enriched.filter(s => (s.teacherName || s.teacherLabel) === tk && s.subgroups.includes(sg.name));
                        if (!members.length) return;
                        const sorted = [...members].sort((a, b) => (riskOrder[a.riskStatus] ?? 3) - (riskOrder[b.riskStatus] ?? 3) || a.name.localeCompare(b.name));
                        sorted.forEach((s, i) => allRows.push({ ...s, teacherKey: tk, firstInTeacher: i === 0, teacherCount: sorted.length }));
                      });
                      if (!allRows.length) return null;
                      const avgPct = Math.round(allRows.reduce((a, s) => a + s.pct, 0) / allRows.length);
                      const profCount2 = allRows.filter(s => s.proficient).length;
                      return (
                        <div key={sg.name} style={{ marginBottom: "1.25rem" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "0.5rem" }}>
                            <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.9rem" }}>{sg.name}</div>
                            <div style={{ fontSize: "0.7rem", color: "#64748b" }}>n={allRows.length} · avg {avgPct}% · {profCount2}/{allRows.length} proficient</div>
                          </div>
                          <div style={{ background: "white", borderRadius: 8, overflow: "hidden", border: "1px solid #e2e8f0" }}>
                            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.78rem" }}>
                              <thead>
                                <tr style={{ background: "#f8fafc" }}>
                                  {["Teacher","Student","Status","Score History → Current"].map(h => (
                                    <th key={h} style={{ padding: "0.45rem 0.7rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "2px solid #e2e8f0", fontSize: "0.72rem" }}>{h}</th>
                                  ))}
                                </tr>
                              </thead>
                              <tbody>
                                {allRows.map((s, i) => {
                                  const rl = riskLabels[s.riskStatus] || riskLabels["OK"];
                                  return (
                                    <tr key={i} style={{ borderBottom: "1px solid #f1f5f9", background: i % 2 === 0 ? "white" : "#fafafa" }}>
                                      <td style={{ padding: "0.4rem 0.7rem", fontWeight: 600, color: "#0f766e", verticalAlign: "top" }}>{s.firstInTeacher ? s.teacherKey : ""}</td>
                                      <td style={{ padding: "0.4rem 0.7rem", fontWeight: 500 }}>{s.name}</td>
                                      <td style={{ padding: "0.4rem 0.7rem" }}>
                                        <span style={{ background: rl.bg, color: rl.color, borderRadius: 4, padding: "0.1rem 0.4rem", fontSize: "0.68rem", fontWeight: 800 }}>{rl.label}</span>
                                      </td>
                                      <td style={{ padding: "0.4rem 0.7rem" }}>
                                        <div style={{ display: "flex", gap: "0.25rem", flexWrap: "wrap", alignItems: "center" }}>
                                          {s.history.map((h, j) => (
                                            (() => {
                                              const hReassess = (s.reassessedAssessments || []).find(r => r.assessment === h.assessment);
                                              const origPct = hReassess ? hReassess.originalPct
                                                : (h.originalScore !== null && h.originalScore !== undefined ? h.originalScore : null);
                                              return (
                                                <span key={j} title={h.assessment + (origPct !== null ? ` (reassessed from ${origPct}%)` : "")}
                                                  style={{ background: h.score >= 70 ? "#dcfce7" : "#fee2e2", color: h.score >= 70 ? "#15803d" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.3rem", fontSize: "0.68rem", fontWeight: 700, display: "inline-flex", alignItems: "center", gap: "0.15rem" }}>
                                                  {origPct !== null && <span style={{ color: origPct >= 70 ? "#15803d" : "#dc2626", opacity: 0.65, textDecoration: "line-through", fontSize: "0.6rem" }}>{origPct}%</span>}
                                                  {origPct !== null && <span style={{ opacity: 0.5, fontSize: "0.58rem" }}>↑</span>}
                                                  {h.score}%
                                                </span>
                                              );
                                            })()
                                          ))}
                                          {s.history.length > 0 && <span style={{ color: "#94a3b8", fontSize: "0.65rem" }}>→</span>}
                                          {(() => {
                                            const origPct = s.reassessedFrom != null ? s.reassessedFrom
                                              : (s.reassessedAssessments || []).find(r => r.assessment === currentAssessmentName)?.originalPct ?? null;
                                            return (
                                              <span style={{ background: s.proficient ? "#dcfce7" : "#fee2e2", color: s.proficient ? "#15803d" : "#dc2626", borderRadius: 3, padding: "0.1rem 0.3rem", fontSize: "0.68rem", fontWeight: 800, outline: "2px solid currentColor", outlineOffset: 1, display: "inline-flex", alignItems: "center", gap: "0.15rem" }}>
                                                {origPct !== null && <span style={{ color: origPct >= 70 ? "#15803d" : "#dc2626", opacity: 0.65, textDecoration: "line-through", fontSize: "0.6rem" }}>{origPct}%</span>}
                                                {origPct !== null && <span style={{ opacity: 0.5, fontSize: "0.58rem" }}>↑</span>}
                                                {s.pct}%
                                              </span>
                                            );
                                          })()}
                                        </div>
                                      </td>
                                    </tr>
                                  );
                                })}
                              </tbody>
                            </table>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}

              {/* ── REASSESSMENT TRACKER ── */}
              {growthData && growthData.reassessments.length > 0 && (() => {
                const items = growthData.reassessments;

                // Flatten all reassessed instances for summary counts
                const allInstances = items.flatMap(s => s.reassessedAssessments);
                const crossedCount = allInstances.filter(r => r.crossedProficiency).length;
                const alreadyProfCount = allInstances.filter(r => !r.crossedProficiency && r.originalPct >= teamSettings.proficiencyThreshold).length;
                const stillBelowCount = allInstances.filter(r => !r.crossedProficiency && r.originalPct < teamSettings.proficiencyThreshold).length;
                // Multi-assessment reassessors: reassessed on 2+ tests this session or had prior reassessments in history
                const multiReassessors = items.filter(s =>
                  s.reassessedAssessments.length > 1 ||
                  s.history.some(h => h.originalScore !== null && h.originalScore !== undefined)
                );

                const gradeLabel = (pct) => pct >= 90 ? "A" : pct >= 80 ? "B" : pct >= 70 ? "C" : pct >= 60 ? "D" : "F";
                const gradeColor = (pct) => pct >= 90 ? "#15803d" : pct >= 80 ? "#65a30d" : pct >= 70 ? "#d97706" : pct >= 60 ? "#ea580c" : "#dc2626";
                const gradeBg   = (pct) => pct >= 90 ? "#dcfce7" : pct >= 80 ? "#f0fdf4" : pct >= 70 ? "#fef9c3" : pct >= 60 ? "#fff7ed" : "#fee2e2";

                return (
                  <div style={{ marginBottom: "1.75rem" }}>
                    <h2 style={{ color: "#0f172a", fontSize: "1rem", fontWeight: 700, margin: "0 0 0.25rem", fontFamily: "'Lora', serif" }}>🔄 Reassessment Tracker</h2>
                    <p style={{ fontSize: "0.78rem", color: "#64748b", margin: "0 0 0.75rem", lineHeight: 1.5 }}>
                      Students whose scores changed since the last session, organized by teacher then by assessment. Key PLC question: are the students reassessing those who were already proficient, or those who needed additional support?
                    </p>

                    {/* Summary chips */}
                    <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", marginBottom: "1rem" }}>
                      <span style={{ background: "#f5f3ff", color: "#7c3aed", borderRadius: 20, padding: "0.2rem 0.7rem", fontSize: "0.72rem", fontWeight: 700 }}>{items.length} students · {allInstances.length} reassessment{allInstances.length !== 1 ? "s" : ""}</span>
                      {crossedCount > 0 && <span style={{ background: "#dcfce7", color: "#15803d", borderRadius: 20, padding: "0.2rem 0.7rem", fontSize: "0.72rem", fontWeight: 700 }}>✓ {crossedCount} crossed into proficiency</span>}
                      {alreadyProfCount > 0 && <span style={{ background: "#fef9c3", color: "#92400e", borderRadius: 20, padding: "0.2rem 0.7rem", fontSize: "0.72rem", fontWeight: 700 }}>⚠ {alreadyProfCount} already proficient</span>}
                      {stillBelowCount > 0 && <span style={{ background: "#fee2e2", color: "#dc2626", borderRadius: 20, padding: "0.2rem 0.7rem", fontSize: "0.72rem", fontWeight: 700 }}>✗ {stillBelowCount} still below proficiency</span>}
                      {multiReassessors.length > 0 && <span style={{ background: "#fff7ed", color: "#c2410c", borderRadius: 20, padding: "0.2rem 0.7rem", fontSize: "0.72rem", fontWeight: 700 }}>↻ {multiReassessors.length} reassessed on multiple assessments</span>}
                    </div>

                    <div style={{ background: "white", borderRadius: 10, overflow: "hidden", border: "1px solid #e2e8f0" }}>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.8rem" }}>
                        <thead>
                          <tr style={{ background: "#f8fafc" }}>
                            {["Student", "Assessment", "Original", "Reassessed", "Outcome"].map(h => (
                              <th key={h} style={{ padding: "0.5rem 0.75rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "2px solid #e2e8f0", fontSize: "0.72rem", whiteSpace: "nowrap" }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {(() => {
                            // Group: Teacher → Student (alpha) → Assessment (alpha)
                            const teacherNames = [...new Set(items.map(s => s.teacherName || s.teacherLabel))].sort();
                            const rows = [];
                            teacherNames.forEach((tName, ti) => {
                              const teacherItems = [...items.filter(s => (s.teacherName || s.teacherLabel) === tName)]
                                .sort((a, b) => a.name.localeCompare(b.name));

                              // Teacher header row
                              rows.push(
                                <tr key={"t-" + tName} style={{ background: "#e0f7f4" }}>
                                  <td colSpan={5} style={{ padding: "0.55rem 0.75rem", fontWeight: 800, color: "#0f766e", fontSize: "0.88rem", borderBottom: "2px solid #99f6e4", borderTop: ti > 0 ? "3px solid #0f766e" : "none", letterSpacing: "0.01em" }}>
                                    {tName} <span style={{ fontWeight: 500, fontSize: "0.72rem", color: "#0d9488", marginLeft: "0.4rem" }}>· {teacherItems.length} student{teacherItems.length !== 1 ? "s" : ""}</span>
                                  </td>
                                </tr>
                              );

                              // Each student, then their assessments sorted alphabetically
                              teacherItems.forEach((s, si) => {
                                const isMulti = s.reassessedAssessments.length > 1 ||
                                  s.history.some(h => h.originalScore !== null && h.originalScore !== undefined);
                                const sortedAssess = [...s.reassessedAssessments]
                                  .sort((a, b) => a.assessment.localeCompare(b.assessment));

                                sortedAssess.forEach((r, ri) => {
                                  const gain = r.newPct - r.originalPct;
                                  const origWasProf = r.originalPct >= teamSettings.proficiencyThreshold;
                                  const isFirstRow = ri === 0;
                                  const isLastRow = ri === sortedAssess.length - 1;
                                  rows.push(
                                    <tr key={tName + "-" + s.name + "-" + r.assessment}
                                      style={{ borderBottom: isLastRow ? "2px solid #e8f5f2" : "1px solid #f1f5f9", background: si % 2 === 0 ? "white" : "#fafafa" }}>
                                      {/* Student name — only on first assessment row */}
                                      <td style={{ padding: "0.45rem 0.75rem", fontWeight: 600, color: "#0f172a", verticalAlign: "top" }}>
                                        {isFirstRow && (
                                          <div style={{ display: "flex", alignItems: "center", gap: "0.35rem" }}>
                                            {s.name}
                                            {isMulti && <span style={{ background: "#fff7ed", color: "#c2410c", borderRadius: 4, padding: "0.05rem 0.3rem", fontSize: "0.6rem", fontWeight: 800 }}>↻</span>}
                                          </div>
                                        )}
                                      </td>
                                      <td style={{ padding: "0.45rem 0.75rem", color: "#475569", fontSize: "0.75rem" }}>
                                        {r.assessment}
                                        {r.assessment === currentAssessmentName && <span style={{ marginLeft: "0.3rem", fontSize: "0.62rem", color: "#0f766e", fontWeight: 700 }}>current</span>}
                                      </td>
                                      <td style={{ padding: "0.45rem 0.75rem" }}>
                                        <div style={{ display: "flex", alignItems: "center", gap: "0.3rem" }}>
                                          <span style={{ background: gradeBg(r.originalPct), color: gradeColor(r.originalPct), borderRadius: 4, padding: "0.1rem 0.35rem", fontSize: "0.72rem", fontWeight: 800 }}>{gradeLabel(r.originalPct)}</span>
                                          <span style={{ fontWeight: 600 }}>{r.originalPct}%</span>
                                        </div>
                                      </td>
                                      <td style={{ padding: "0.45rem 0.75rem" }}>
                                        <div style={{ display: "flex", alignItems: "center", gap: "0.3rem" }}>
                                          <span style={{ background: gradeBg(r.newPct), color: gradeColor(r.newPct), borderRadius: 4, padding: "0.1rem 0.35rem", fontSize: "0.72rem", fontWeight: 800 }}>{gradeLabel(r.newPct)}</span>
                                          <span style={{ fontWeight: 600 }}>{r.newPct}%</span>
                                          <span style={{ color: "#15803d", fontSize: "0.7rem", fontWeight: 700 }}>(+{gain}%)</span>
                                        </div>
                                      </td>
                                      <td style={{ padding: "0.45rem 0.75rem" }}>
                                        {r.crossedProficiency
                                          ? <span style={{ background: "#dcfce7", color: "#15803d", borderRadius: 4, padding: "0.1rem 0.45rem", fontSize: "0.7rem", fontWeight: 700 }}>Not Prof → Proficient</span>
                                          : origWasProf
                                            ? <span style={{ background: "#fef9c3", color: "#92400e", borderRadius: 4, padding: "0.1rem 0.45rem", fontSize: "0.7rem", fontWeight: 700 }}>Already Proficient</span>
                                            : <span style={{ background: "#fee2e2", color: "#dc2626", borderRadius: 4, padding: "0.1rem 0.45rem", fontSize: "0.7rem", fontWeight: 700 }}>Still Not Proficient</span>
                                        }
                                      </td>
                                    </tr>
                                  );
                                });
                              });
                            });
                            return rows;
                          })()}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              })()}

              {/* ── EXPORT ACTIONS ── */}
              {!isSnapshot && (
              <div className="no-print" style={{ borderTop: "1px solid #e2e8f0", paddingTop: "1.5rem", marginTop: "0.5rem", display: "flex", flexDirection: "column", gap: "1rem" }}>
                {/* Analytics CSV Export */}
                {growthData && (
                  <div style={{ background: "#f0fdfa", border: "1px solid #99f6e4", borderRadius: 10, padding: "1rem 1.25rem" }}>
                    <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.9rem", marginBottom: "0.3rem" }}>📥 Save Analytics for Next Session</div>
                    <p style={{ fontSize: "0.78rem", color: "#475569", margin: "0 0 0.75rem" }}>
                      Saves your analytics to Google Drive. Next session, load this from the Upload tab to enable risk tracking, reassessment detection, and cross-assessment history.
                    </p>
                    <div style={{ display: "flex", gap: "0.75rem", flexWrap: "wrap", alignItems: "center" }}>
                    {/* Save to Drive button */}
                    <button
                      onClick={driveSaveAnalytics}
                      disabled={driveStatus === "saving"}
                      style={{ display: "flex", alignItems: "center", gap: "0.4rem", background: driveStatus === "saved" ? "#15803d" : "#1967d2", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.2rem", fontSize: "0.85rem", fontWeight: 700, cursor: driveStatus === "saving" ? "not-allowed" : "pointer", fontFamily: "inherit", opacity: driveStatus === "saving" ? 0.75 : 1 }}>
                      <svg width="15" height="15" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg" style={{ flexShrink: 0 }}><path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="rgba(255,255,255,0.9)"/><path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="rgba(255,255,255,0.9)"/><path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" fill="rgba(255,255,255,0.9)"/><path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="rgba(255,255,255,0.7)"/><path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="rgba(255,255,255,0.9)"/><path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 27h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="rgba(255,255,255,0.9)"/></svg>
                      {driveStatus === "saving" ? "Saving…" : driveStatus === "saved" ? "✓ Saved to Drive" : "Save to Google Drive"}
                    </button>
                    </div>

                    {/* Drive status message in export section */}
                    {driveMsg && driveStatus !== "idle" && (
                      <div style={{ marginTop: "0.5rem", fontSize: "0.75rem", color: driveStatus === "error" ? "#dc2626" : driveStatus === "saved" ? "#15803d" : "#475569", fontWeight: 500 }}>
                        {driveMsg}
                      </div>
                    )}

                    {/* Return to teams after saving */}
                    {driveStatus === "saved" && (
                      <div style={{ marginTop: "0.75rem", paddingTop: "0.75rem", borderTop: "1px solid #99f6e4", display: "flex", alignItems: "center", gap: "0.75rem" }}>
                        <span style={{ fontSize: "0.75rem", color: "#0d9488" }}>Ready for your next session?</span>
                        <button onClick={goHome}
                          style={{ background: "white", color: "#0f766e", border: "1px solid #0f766e", borderRadius: 7, padding: "0.4rem 1rem", fontSize: "0.8rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: "0.35rem" }}>
                          ← Return to Teams
                        </button>
                      </div>
                    )}
                  </div>
                )}

              </div>
              )} {/* end !isSnapshot export wrapper */}
            </div>
          );
        })()}


        </div>
      </div>
      </React.Fragment>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
