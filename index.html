  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useRef, useEffect } = React;

// ─── Snapshot loader ──────────────────────────────────────────────────────────
// Reads snapshot data from the #snapshot-data div's data attribute (base64-encoded).
// Returns null if this is a fresh (non-snapshot) load.
function loadSnapshot() {
  try {
    const el = document.getElementById("snapshot-data");
    if (!el) return null;
    const b64 = el.getAttribute("content");
    if (!b64) return null;
    return JSON.parse(decodeURIComponent(escape(atob(b64))));
  } catch(e) {
    return null;
  }
}
const SNAPSHOT = loadSnapshot();

// ─── CSV Parsing ──────────────────────────────────────────────────────────────

function parseCSVFull(text) {
  const rows = [];
  let cur = [], cell = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQ && text[i + 1] === '"') { cell += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      cur.push(cell); cell = "";
    } else if ((ch === '\n' || ch === '\r') && !inQ) {
      if (ch === '\r' && text[i + 1] === '\n') i++;
      cur.push(cell); cell = "";
      if (cur.some(c => c.trim())) rows.push(cur);
      cur = [];
    } else {
      cell += ch;
    }
  }
  if (cell || cur.length) { cur.push(cell); if (cur.some(c => c.trim())) rows.push(cur); }
  return rows;
}

// Parse IC Gradebook Export CSV
// Row 0: Assignment Name, [Assess1], [Assess2], ...  (last column = most recent)
// Row 1: Task/Standard Name, Grade, Grade, ...
// Row 2: (blank), [pts1], [pts2], ...
// Row 3+: "LastName, First MI #ID", score1, score2, ...
//
// Returns sections with:
//   currentAssessment  — name of the rightmost assessment
//   students[].history — all prior assessments as [{ assessment, score }]
//   students[].pct     — score % on the current (most recent) assessment
function parseICGradebook(rows, teacherLabel, teacherName) {
  if (rows.length < 4) return null;

  // Build validCols: each column that has a non-blank name AND a valid points-possible
  const rawNames = rows[0].slice(1);
  const rawPossible = rows[2].slice(1);
  const validCols = [];
  rawNames.forEach((n, i) => {
    const name = n.trim();
    const possible = parseFloat((rawPossible[i] || "").trim());
    if (name && !isNaN(possible) && possible > 0) {
      validCols.push({ name, possible, colIndex: i + 1 });
    }
  });

  if (validCols.length === 0) return null;

  // Most recent = last valid column
  const currentCol = validCols[validCols.length - 1];
  const historyCols = validCols.slice(0, -1);

  const students = [];
  for (let r = 3; r < rows.length; r++) {
    const row = rows[r];
    const raw = (row[0] || "").trim();
    if (!raw) continue;

    // Parse "LastName, FirstName MI #StudentID"
    const idMatch = raw.match(/#(\d+)/);
    const studentId = idMatch ? idMatch[1] : "";
    const namePart = raw.replace(/#\d+/, "").trim().replace(/,\s*$/, "").trim();

    // Convert "Last, First MI" → "First MI Last"
    const commaIdx = namePart.indexOf(",");
    let name;
    if (commaIdx !== -1) {
      const last = namePart.slice(0, commaIdx).trim();
      const first = namePart.slice(commaIdx + 1).trim();
      name = first ? `${first} ${last}` : last;
    } else {
      name = namePart;
    }

    // Current score → pct
    const rawScore = parseFloat((row[currentCol.colIndex] || "").trim());
    const pct = isNaN(rawScore) ? null : Math.round((rawScore / currentCol.possible) * 100);

    // Prior scores → history array (in order, oldest first)
    const history = historyCols.map(col => {
      const val = parseFloat((row[col.colIndex] || "").trim());
      if (isNaN(val)) return null;
      return { assessment: col.name, score: Math.round((val / col.possible) * 100) };
    }).filter(Boolean);

    students.push({ name, studentId, pct, history });
  }

  return {
    teacherLabel,
    teacherName: teacherName || teacherLabel,
    students,
    validCols,
    currentAssessment: currentCol.name,
    historyCols,
  };
}

// Parse subgroup CSV — new format:
// Col 0: Student Name
// Col 1: Student ID (with or without # prefix)
// Col 2+: Category columns (e.g. "Program", "Language") where cell value = subgroup label
//         Any non-blank cell value = student belongs to that subgroup with that label
//         e.g. row: "Ahmed, Aseel, 888206511, IEP, ELL" → subgroups: ["IEP", "ELL"]
// Parse IC subgroup CSV.
// Expected format (IC export):
//   Col 0 "Student"  — "LastName, First MI #StudentID"  (same format as gradebook)
//   Col 1 "Sub Group" — subgroup label e.g. "IEP", "ELL"
// One row per membership; a student in two subgroups appears on two rows.
//
// Also handles a wide column-per-subgroup format as a fallback:
//   Col 0: name/combined, Col 1: ID, Col 2+: subgroup category columns
function parseSubgroupCSV(rows) {
  if (!rows.length) return {};
  const headers = rows[0].map(h => h.trim());

  // Helper: parse an IC-style combined student cell "Last, First MI #ID"
  const parseStudentCell = (raw) => {
    const idMatch = raw.match(/#(\d+)/);
    const studentId = idMatch ? idMatch[1] : "";
    const namePart = raw.replace(/#\d+/, "").trim().replace(/,\s*$/, "").trim();
    const ci = namePart.indexOf(",");
    let name;
    if (ci !== -1) {
      const last  = namePart.slice(0, ci).trim();
      const first = namePart.slice(ci + 1).trim();
      name = first ? `${first} ${last}` : last;
    } else {
      name = namePart;
    }
    return { name, studentId };
  };

  // Detect format:
  // IC format: header col 0 matches "student", col 1 matches "sub group"
  const h0 = headers[0] || "";
  const h1 = headers[1] || "";
  const isICFormat = /^student$/i.test(h0) && /sub\s*group/i.test(h1);

  const map = {};

  if (isICFormat) {
    // One row per membership — col 0 = combined student cell, col 1 = subgroup label
    rows.slice(1).forEach(row => {
      const raw = (row[0] || "").trim();
      const sg  = (row[1] || "").trim();
      if (!raw || !sg) return;
      const { name, studentId } = parseStudentCell(raw);
      const key = studentId || name;
      if (!map[key]) map[key] = { name, id: studentId, subgroups: [] };
      if (!map[key].subgroups.includes(sg)) map[key].subgroups.push(sg);
    });
    return map;
  }

  // Fallback: wide format — separate name/ID columns + subgroup value columns
  const nameIdx = (() => {
    const i = headers.findIndex(h => /student\s*name|^name$|^student$/i.test(h));
    return i !== -1 ? i : 0;
  })();
  const idIdx = (() => {
    const i = headers.findIndex(h => /student\s*id|^id$|^#/i.test(h));
    return i !== -1 ? i : -1;
  })();
  const sgColIdxs = headers.map((_, i) => i).filter(i => i !== nameIdx && i !== idIdx);

  rows.slice(1).forEach(row => {
    const rawCell = (row[nameIdx] || "").trim();
    if (!rawCell) return;
    // If the cell contains a # it's likely an IC combined cell
    let name, studentId;
    if (rawCell.includes("#")) {
      ({ name, studentId } = parseStudentCell(rawCell));
    } else {
      name = rawCell;
      studentId = idIdx !== -1 ? (row[idIdx] || "").trim().replace(/^#/, "") : "";
    }
    const subgroups = sgColIdxs.map(i => (row[i] || "").trim()).filter(Boolean);
    const key = studentId || name;
    if (!map[key]) map[key] = { name, id: studentId, subgroups: [] };
    subgroups.forEach(sg => {
      if (!map[key].subgroups.includes(sg)) map[key].subgroups.push(sg);
    });
  });
  return map;
}

// Parse prior analytics CSV.
// Rows starting with [NameMap] are name mapping entries: [NameMap], rawName, canonicalName
// Remaining rows: StudentID, StudentName, Subgroups,
//   then per assessment: AssessName|Date, AssessName|Score, AssessName|Reassessed (optional)
function parsePriorAnalyticsCSV(rows) {
  if (!rows.length) return {};

  // Read [NameMap] rows first — they appear before the student header row
  const nameMap = {}; // rawName -> canonicalName
  let dataStartIdx = 0;
  for (let i = 0; i < rows.length; i++) {
    if ((rows[i][0] || "").trim() === "[NameMap]") {
      const raw = (rows[i][1] || "").trim();
      const canonical = (rows[i][2] || "").trim();
      if (raw && canonical) nameMap[raw] = canonical;
      dataStartIdx = i + 1;
    } else {
      break; // first non-[NameMap] row is the student header
    }
  }

  const headers = rows[dataStartIdx].map(h => h.trim());
  const fixedCols = 3;

  // Detect assessments — columns after the fixed 3 come in groups of 2 or 3:
  //   AssessName|Date, AssessName|Score, [AssessName|Reassessed]
  const assessments = [];
  let i = fixedCols;
  while (i < headers.length) {
    const h = headers[i];
    if (h.endsWith("|Date")) {
      const name = h.replace(/\|Date$/, "").trim();
      const scoreIdx = i + 1 < headers.length && headers[i + 1] === name + "|Score" ? i + 1 : -1;
      const reassessIdx = i + 2 < headers.length && headers[i + 2] === name + "|Reassessed" ? i + 2 : -1;
      assessments.push({ name, dateColIdx: i, scoreColIdx: scoreIdx, reassessColIdx: reassessIdx });
      i += reassessIdx !== -1 ? 3 : 2;
    } else {
      i++;
    }
  }

  const map = {};
  rows.slice(dataStartIdx + 1).forEach(row => {
    const id = (row[0] || "").trim();
    const name = (row[1] || "").trim();
    if (!id && !name) return;
    const key = id || name;
    const subgroups = (row[2] || "").split(";").map(s => s.trim()).filter(Boolean);
    const history = [];
    assessments.forEach(a => {
      const date = (row[a.dateColIdx] || "").trim();
      const score = a.scoreColIdx !== -1 ? parseFloat(row[a.scoreColIdx]) : NaN;
      // Accept entries with a score even if the date is blank —
      // prior assessments in the analytics CSV often have no date recorded
      if (isNaN(score)) return;
      const reassessedRaw = a.reassessColIdx !== -1 ? (row[a.reassessColIdx] || "").trim() : "";
      const originalScore = reassessedRaw !== "" ? parseFloat(reassessedRaw) : null;
      history.push({ assessment: a.name, date, score, originalScore });
    });
    map[key] = { name, id, subgroups, history };
  });
  return { students: map, nameMap };
}

// ─── Stats Helpers ────────────────────────────────────────────────────────────

function computeStats(scores) {
  const valid = scores.filter(s => s !== null && !isNaN(s));
  if (!valid.length) return { mean: 0, median: 0, high: 0, low: 0, stdDev: 0 };
  const mean = valid.reduce((a, b) => a + b, 0) / valid.length;
  const sorted = [...valid].sort((a, b) => a - b);
  const mid = Math.floor(sorted.length / 2);
  const median = sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
  const variance = valid.reduce((a, b) => a + (b - mean) ** 2, 0) / valid.length;
  const stdDev = Math.sqrt(variance);
  return {
    mean: Math.round(mean * 10) / 10,
    median: Math.round(median * 10) / 10,
    high: Math.max(...valid),
    low: Math.min(...valid),
    stdDev: Math.round(stdDev * 10) / 10
  };
}

function gradeDist(pcts) {
  return {
    A: pcts.filter(p => p >= 90).length,
    B: pcts.filter(p => p >= 80 && p < 90).length,
    C: pcts.filter(p => p >= 70 && p < 80).length,
    D: pcts.filter(p => p >= 60 && p < 70).length,
    F: pcts.filter(p => p < 60).length,
  };
}

// ─── Growth & Risk Logic ──────────────────────────────────────────────────────

// History comes from two sources (merged, de-duped by assessment name):
//   1. In-file prior columns (students[].history built during CSV parse) — primary
//   2. priorMap (uploaded Analytics CSV) — supplementary for cross-trimester scores
//      that predate what's in the current gradebook file
//
// assessmentName = the current (most recent) assessment being analyzed

function buildGrowthData(sections, assessmentName, subgroupMap, priorMap, nameMap, settings) {
  const thresh = settings?.proficiencyThreshold ?? 70;
  const rs     = settings?.riskSettings ?? {};
  const resolve = (n) => (nameMap && nameMap[n]) ? nameMap[n] : n;
  const resolvedAssessmentName = resolve(assessmentName);
  // Collect all students with their current pct and in-file history
  const allStudents = [];
  sections.forEach(sec => {
    sec.students.forEach(stu => {
      if (stu.pct === null) return;
      // Store the student's own section assessment name so reassessment detection
      // uses the correct name per section (e.g. "Unit 4 Test" vs "Chapter 4 Test")
      allStudents.push({ ...stu,
        teacherLabel: sec.teacherLabel,
        teacherName: sec.teacherName || sec.teacherLabel,
        _sectionAssessment: sec.currentAssessment,
        _sectionHistoryCols: sec.historyCols || [],
        _sectionValidCols: sec.validCols || [],
      });
    });
  });

  const totalStudents = allStudents.length;
  const classAvg = totalStudents > 0
    ? Math.round(allStudents.reduce((a, s) => a + s.pct, 0) / totalStudents)
    : 0;

  const getSubgroupInfo = (stu) => {
    if (!subgroupMap) return null;
    if (stu.studentId && subgroupMap[stu.studentId]) return subgroupMap[stu.studentId];
    if (subgroupMap[stu.name]) return subgroupMap[stu.name];
    return Object.values(subgroupMap).find(v => v.id === stu.studentId || v.name === stu.name) || null;
  };

  const getPriorInfo = (stu) => {
    if (!priorMap) return null;
    if (stu.studentId && priorMap[stu.studentId]) return priorMap[stu.studentId];
    if (priorMap[stu.name]) return priorMap[stu.name];
    return Object.values(priorMap).find(v => v.id === stu.studentId || v.name === stu.name) || null;
  };

  // Normalize an assessment name to a number-only key for fuzzy matching
  // "Unit 4 Test" → "4", "Chapter 4 Test" → "4", "Unit 4 Quiz" → "4"
  const normalizeAsmName = (n) => {
    if (!n) return "";
    const m = n.match(/\d+/);
    return m ? m[0] : n.toLowerCase().replace(/\s+/g, "");
  };

  // Find a history entry by assessment name, with fuzzy number fallback
  const findPriorEntry = (prHistory, asmName) => {
    if (!prHistory) return null;
    // Exact match first
    const exact = prHistory.find(p => p.assessment === asmName);
    if (exact) return exact;
    // Fuzzy: match by the number in the name (e.g. "Unit 4 Test" matches "Chapter 4 Test")
    const norm = normalizeAsmName(asmName);
    if (!norm) return null;
    return prHistory.find(p => normalizeAsmName(p.assessment) === norm) || null;
  };

  // Derive risk status by replaying the full score sequence oldest → newest.
  //
  // Step-down chain when a student scores proficient after struggling:
  //   PERSISTENTLY_AT_RISK → proficient → AT_RISK
  //   AT_RISK              → proficient → RECOVERING
  //   RECOVERING           → proficient → OK (cleared)
  //
  // Short-circuit: two consecutive proficient scores always clears immediately,
  // regardless of prior status (e.g. F F F P P → OK, not Recovering).
  const computeRiskStatus = (allScores, rs, thresh) => {
    // rs = riskSettings, thresh = proficiencyThreshold
    const t = thresh ?? 70;
    const level2Count    = rs?.level2Count    ?? 2;
    const level1Count    = rs?.level1Count    ?? 1;
    const recoveringCount = rs?.recoveringCount ?? 1;
    const clearCount     = rs?.clearCount     ?? 2;

    if (allScores.length === 0) return "OK";

    let status = "OK";
    let consecutiveBelow = 0;
    let consecutiveAbove = 0;

    for (let i = 0; i < allScores.length; i++) {
      const prof = allScores[i] >= t;
      if (!prof) {
        consecutiveBelow++;
        consecutiveAbove = 0;
        // Escalate based on consecutive below counts
        if (consecutiveBelow >= level2Count) {
          status = "PERSISTENTLY_AT_RISK";
        } else if (consecutiveBelow >= level1Count) {
          if (status !== "PERSISTENTLY_AT_RISK") status = "AT_RISK";
        }
      } else {
        consecutiveAbove++;
        consecutiveBelow = 0;
        if (consecutiveAbove >= clearCount) {
          status = "OK";
        } else if (consecutiveAbove >= recoveringCount) {
          // Step down one level per proficient score
          if (status === "PERSISTENTLY_AT_RISK") status = "AT_RISK";
          else if (status === "AT_RISK") status = "RECOVERING";
          else if (status === "RECOVERING") status = "OK";
        }
      }
    }
    return status;
  };

  const enriched = allStudents.map(stu => {
    const sg = getSubgroupInfo(stu);
    const pr = getPriorInfo(stu);

    // Each student uses their own section's assessment name, not the global one.
    // This is critical when sections have different assessment naming conventions
    // e.g. Johnson uses "Unit 4 Test", Martinez uses "Chapter 4 Test"
    const stuResolvedName = resolve(stu._sectionAssessment || assessmentName);

    // Subgroups: from subgroup CSV, fall back to analytics CSV
    const subgroups = sg ? sg.subgroups : (pr ? pr.subgroups : []);

    // Build merged history — resolve all assessment names through the map first.
    const resolvedInFileHistory = stu.history.map(h => ({ ...h, assessment: resolve(h.assessment) }));

    const inFileNames = new Set([
      ...resolvedInFileHistory.map(h => h.assessment),
      stuResolvedName,
    ]);
    // Also exclude by normalized number to prevent duplicates when name conventions differ
    const inFileNorms = new Set([...inFileNames].map(normalizeAsmName));
    const crossTermHistory = pr
      ? pr.history.filter(h => !inFileNames.has(h.assessment) && !inFileNorms.has(normalizeAsmName(h.assessment)))
      : [];

    // Full ordered history: cross-term (oldest) + in-file (newest prior columns)
    const history = [...crossTermHistory, ...resolvedInFileHistory];

    // ── Reassessment detection ──────────────────────────────────────────────
    const reassessedAssessments = [];

    // _originalPct set when reassessment file was merged into the section
    if (stu._originalPct !== undefined && stu._originalPct !== null) {
      reassessedAssessments.push({
        assessment: stuResolvedName,
        originalPct: stu._originalPct,
        newPct: stu.pct,
        crossedProficiency: stu._originalPct < thresh && stu.pct >= thresh,
      });
    }

    if (pr) {
      // Check all history columns (prior assessments in this IC file) — use resolved names
      resolvedInFileHistory.forEach(h => {
        const priorEntry = findPriorEntry(pr.history, h.assessment);
        if (priorEntry) {
          const baselineScore = (priorEntry.originalScore !== null && priorEntry.originalScore !== undefined)
            ? priorEntry.originalScore
            : priorEntry.score;
          if (h.score > baselineScore) {
            reassessedAssessments.push({
              assessment: h.assessment,
              originalPct: baselineScore,
              newPct: h.score,
              crossedProficiency: baselineScore < thresh && h.score >= thresh,
            });
          }
        }
      });
      // Check current (most recent) assessment against prior analytics
      const priorCurrent = findPriorEntry(pr.history, stuResolvedName);
      if (priorCurrent && !(stu._originalPct !== undefined)) {
        const baselineScore = (priorCurrent.originalScore !== null && priorCurrent.originalScore !== undefined)
          ? priorCurrent.originalScore
          : priorCurrent.score;
        if (stu.pct > baselineScore) {
          reassessedAssessments.push({
            assessment: stuResolvedName,
            originalPct: baselineScore,
            newPct: stu.pct,
            crossedProficiency: baselineScore < thresh && stu.pct >= thresh,
          });
        }
      }
    }

    // For backward compat with proficiency display
    const currentReassess = reassessedAssessments.find(r => r.assessment === stuResolvedName);
    const reassessedFrom = currentReassess ? currentReassess.originalPct : null;
    const crossedProficiency = currentReassess ? currentReassess.crossedProficiency : false;

    const currentEntry = { assessment: stuResolvedName, score: stu.pct, originalScore: reassessedFrom };
    const proficient = stu.pct >= thresh;

    // Build the full score sequence (history scores + current) for risk calculation
    const allScores = [...history.map(h => h.score), stu.pct];
    const riskStatus = computeRiskStatus(allScores, rs, thresh);

    return { ...stu, subgroups, history, currentEntry, riskStatus, proficient,
             reassessedFrom, crossedProficiency, reassessedAssessments };
  });

  // ── Subgroup stats ────────────────────────────────────────────────────────
  const subgroupStats = {};
  if (subgroupMap || priorMap) {
    const allSgs = new Set();
    enriched.forEach(s => s.subgroups.forEach(sg => allSgs.add(sg)));
    allSgs.forEach(sgName => {
      const members = enriched.filter(s => s.subgroups.includes(sgName));
      if (!members.length) return;
      const avg = Math.round(members.reduce((a, s) => a + s.pct, 0) / members.length);
      const gap = avg - classAvg;
      const flagged = gap < -10;

      let priorAvg = null;
      const withHist = members.filter(s => s.history.length > 0);
      if (withHist.length > 0) {
        const lastScores = withHist.map(s => s.history[s.history.length - 1].score);
        priorAvg = Math.round(lastScores.reduce((a, b) => a + b, 0) / lastScores.length);
      }
      let priorClassAvg = null;
      const allWithHist = enriched.filter(s => s.history.length > 0);
      if (allWithHist.length > 0) {
        const last = allWithHist.map(s => s.history[s.history.length - 1].score);
        priorClassAvg = Math.round(last.reduce((a, b) => a + b, 0) / last.length);
      }
      let trend = null;
      if (priorAvg !== null && priorClassAvg !== null) {
        const priorGap = priorAvg - priorClassAvg;
        if (gap > priorGap + 2) trend = "closing";
        else if (gap < priorGap - 2) trend = "widening";
        else trend = "holding";
      }
      subgroupStats[sgName] = { name: sgName, count: members.length, avg, gap, flagged, trend, priorAvg, large: members.length > 20 };
    });
  }

  // ── Reassessment list ────────────────────────────────────────────────────
  // One row per student who reassessed on at least one assessment.
  // Each entry includes all the assessments they reassessed on, sorted by
  // their lowest original score (most struggling students first within each grade band).
  // Top-level sort: by original score on the LOWEST-scoring reassessed assessment desc
  // so the table groups A→B→C→D→F reassessors naturally.
  const reassessments = enriched
    .filter(s => s.reassessedAssessments.length > 0)
    .sort((a, b) => {
      // Sort by the highest original score among their reassessed assessments (desc)
      // so students who were already proficient sort first, then C, D, F
      const aMax = Math.max(...a.reassessedAssessments.map(r => r.originalPct));
      const bMax = Math.max(...b.reassessedAssessments.map(r => r.originalPct));
      return bMax - aMax;
    });

  // ── Analytics CSV export ────────────────────────────────────────────────────
  const buildAnalyticsCSV = () => {
    // Collect all unique assessment names in chronological order
    // Each student may have a different current assessment name (e.g. "Unit 4 Test" vs "Chapter 4 Test")
    const allAssessmentNames = [];
    const seen = new Set();
    enriched.forEach(s => {
      s.history.forEach(h => {
        if (!seen.has(h.assessment)) { seen.add(h.assessment); allAssessmentNames.push(h.assessment); }
      });
      // Use the student's own current assessment name
      const stuName = s.currentEntry?.assessment || resolve(s._sectionAssessment || assessmentName);
      if (!seen.has(stuName)) { seen.add(stuName); allAssessmentNames.push(stuName); }
    });

    // Build [NameMap] rows — one per entry in the nameMap
    const namemapRows = Object.entries(nameMap || {}).map(([raw, canonical]) =>
      ["[NameMap]", raw, canonical]
    );

    const headerRow = ["StudentID", "StudentName", "Subgroups",
      ...allAssessmentNames.flatMap(a => [`${a}|Date`, `${a}|Score`, `${a}|Reassessed`])];
    const today = new Date().toISOString().split("T")[0];

    const dataRows = enriched.map(s => {
      const subStr = s.subgroups.join(";");
      // This student's own current assessment name
      const stuCurrentName = s.currentEntry?.assessment || resolve(s._sectionAssessment || assessmentName);
      const assessCols = allAssessmentNames.flatMap(a => {
        if (a === stuCurrentName) {
          // Current assessment: store original score in |Reassessed if it changed
          const r = s.reassessedAssessments.find(r => r.assessment === a);
          return [today, s.pct.toString(), r ? r.originalPct.toString() : ""];
        }
        // Prior assessment: get from history, carry forward any reassessment original
        const h = s.history.find(h => h.assessment === a);
        if (!h) return ["", "", ""];
        const r = s.reassessedAssessments.find(r => r.assessment === a);
        const originalScore = r
          ? r.originalPct.toString()
          : (h.originalScore !== null && h.originalScore !== undefined ? h.originalScore.toString() : "");
        return [(h.date || ""), h.score.toString(), originalScore];
      });
      return [s.studentId || "", s.name, subStr, ...assessCols];
    });

    const escape = (v) => {
      const sv = String(v);
      return sv.includes(",") || sv.includes('"') || sv.includes("\n") ? `"${sv.replace(/"/g, '""')}"` : sv;
    };
    return [...namemapRows, headerRow, ...dataRows].map(row => row.map(escape).join(",")).join("\n");
  };

  return { enriched, subgroupStats, classAvg, totalStudents, reassessments, buildAnalyticsCSV };
}

// ─── Canvas Quiz Student Parser ───────────────────────────────────────────────
//
// Detects Canvas "Quiz Student Analysis" CSV exports. These have:
//   Col 0: Name
//   Col 1: ID
//   Col 3: SectionNames  (e.g. "Am Studies-9SST400-Aitken-Period 2")
//   Second-to-last col: PointsPossible
//   Last col: OverallScore
//   Middle cols: per-item detail (ItemID, ItemType, question text, EarnedPoints, Status — repeating)
//
// Each file is one teacher's section. The teacher name is extracted from the
// filename (e.g. "Brendon_U8Test_Student" → teacher = "Brendon",
// assessment = "U8Test").
//
// Returns a section object in the same shape as parseICGradebook, or null.

function isCanvasQuizStudentCSV(rows) {
  if (!rows.length) return false;
  const h = rows[0];
  return (
    (h[0] || "").trim() === "Name" &&
    (h[1] || "").trim() === "ID" &&
    h.includes("OverallScore") &&
    h.includes("PointsPossible") &&
    h.includes("EarnedPoints")
  );
}

function parseCanvasQuizStudent(rows, teacherLabel) {
  if (!rows.length) return null;
  const headers = rows[0];

  const nameIdx   = 0;
  const idIdx     = 1;
  const attemptIdx = 6; // Canvas always puts Attempt in col 6
  const scoreIdx  = headers.lastIndexOf("OverallScore");
  const ppIdx     = headers.lastIndexOf("PointsPossible");

  if (scoreIdx === -1 || ppIdx === -1) return null;

  // Extract teacher name and assessment name from the file label
  // e.g. "Carter_U3Q1_Student"      → teacher="Carter", assessment="U3Q1"
  // e.g. "Carter_U3Q1_Reassessment" → teacher="Carter", assessment="U3Q1" (strip reassessment suffix)
  const isReassessmentFile = /[_\-]?re(assessment)?$/i.test(teacherLabel);
  const cleanLabel = teacherLabel
    .replace(/_?reassessment$/i, "")
    .replace(/_?student$/i, "")
    .trim();
  const parts = cleanLabel.split(/[_\-]/);
  const teacherName    = parts[0] || teacherLabel;
  const assessmentName = parts.slice(1).join(" ").trim() || cleanLabel;

  const students = rows.slice(1).map(row => {
    const rawName = (row[nameIdx] || "").trim();
    if (!rawName || rawName.toLowerCase() === "name") return null;

    // Convert "Last, First" → "First Last"
    let name;
    const ci = rawName.indexOf(",");
    if (ci !== -1) {
      const last  = rawName.slice(0, ci).trim();
      const first = rawName.slice(ci + 1).trim();
      name = first ? `${first} ${last}` : last;
    } else {
      name = rawName;
    }

    const studentId = (row[idIdx] || "").trim();
    const rawScore  = parseFloat(row[scoreIdx]);
    const rawPP     = parseFloat(row[ppIdx]);

    if (isNaN(rawScore) || isNaN(rawPP) || rawPP === 0) return null;
    const pct = Math.min(Math.round((rawScore / rawPP) * 100), 100);

    // Read attempt number — reassessment files have Attempt = 2+
    const attempt = parseInt((row[attemptIdx] || "1").trim()) || 1;

    return { name, studentId, pct, history: [], _attempt: attempt };
  }).filter(Boolean);

  if (!students.length) return null;

  return {
    teacherLabel: teacherName,
    teacherName,
    students,
    validCols: [{ name: assessmentName, possible: 100, colIndex: scoreIdx }],
    currentAssessment: assessmentName,
    historyCols: [],
    _source: "canvas_quiz",
    _isReassessment: isReassessmentFile,
    _needsRename: false,
  };
}

// ─── Generic Gradebook Parser ─────────────────────────────────────────────────

// Create a stable fingerprint from a header row — used to recognise the same
// file format across uploads without relying on the filename.
function headerFingerprint(headers) {
  // Normalize: lowercase, strip punctuation/extra spaces, sort-stable join
  // This makes the fingerprint tolerant of minor header variations
  return headers
    .map(h => h.trim().toLowerCase().replace(/[^a-z0-9]/g, ""))
    .join("|");
}

// A looser fingerprint based only on the count and rough types of columns —
// used as a fallback when exact fingerprint doesn't match
function headerFingerprintLoose(headers) {
  const normalized = headers.map(h => h.trim().toLowerCase().replace(/[^a-z0-9]/g, ""));
  const hasName    = normalized.some(h => /^(studentname|name|student)$/.test(h));
  const hasId      = normalized.some(h => /^(studentid|id|sis|number)$/.test(h));
  const numCols    = normalized.filter(h => /^(score|grade|points|pct|percent|result|mark)/.test(h) || /\d/.test(h)).length;
  return `loose:name${hasName?1:0}:id${hasId?1:0}:numcols${Math.min(numCols, 20)}:total${headers.length}`;
}

// Convert a raw cell value to a 0-100 percentage given the score type declared
// in the mapping: "pct" | "points" | "letter"
function cellToPct(raw, scoreType, pointsPossible) {
  const v = (raw || "").trim();
  if (!v || v === "-" || v === "N/A" || v === "") return null;

  if (scoreType === "pct") {
    const n = parseFloat(v.replace("%", ""));
    return isNaN(n) ? null : Math.min(Math.round(n), 100);
  }
  if (scoreType === "points") {
    const n = parseFloat(v);
    const pp = parseFloat(pointsPossible);
    if (isNaN(n) || isNaN(pp) || pp === 0) return null;
    return Math.min(Math.round((n / pp) * 100), 100);
  }
  if (scoreType === "letter") {
    const map = { A: 95, "A+": 100, "A-": 92, B: 85, "B+": 89, "B-": 82,
                  C: 75, "C+": 79, "C-": 72, D: 65, "D+": 69, "D-": 62, F: 50 };
    return map[v.toUpperCase()] ?? null;
  }
  // Auto — try pct then points
  const n = parseFloat(v.replace("%", ""));
  if (!isNaN(n)) return Math.min(Math.round(n), 100);
  return null;
}

// Apply a saved column mapping to a parsed CSV rows array.
// Returns an array of section objects in the same shape as parseICGradebook.
function parseGenericGradebook(rows, mapping, fileName) {
  // mapping = {
  //   nameCol: int,
  //   idCol: int | null,
  //   sectionCol: int | null,      // if present, auto-split by this column
  //   assessmentCols: [{colIndex, name, scoreType, pointsPossible}],
  //   dataStartRow: int,           // first row with student data (0-based)
  // }
  const { nameCol, idCol, sectionCol, assessmentCols, dataStartRow } = mapping;
  if (!assessmentCols || assessmentCols.length === 0) return [];

  const currentAsmCol  = assessmentCols[assessmentCols.length - 1];
  const historyAsmCols = assessmentCols.slice(0, -1);

  // Collect student rows
  const studentRows = rows.slice(dataStartRow).filter(r => (r[nameCol] || "").trim());

  // Group by section if sectionCol is set
  const sectionGroups = {};
  studentRows.forEach(row => {
    const rawName = (row[nameCol] || "").trim();
    if (!rawName) return;

    // Parse name — handle "Last, First" or "First Last"
    let name;
    if (rawName.includes(",")) {
      const ci = rawName.indexOf(",");
      const last  = rawName.slice(0, ci).trim();
      const first = rawName.slice(ci + 1).trim();
      name = first ? `${first} ${last}` : last;
    } else {
      name = rawName;
    }

    const studentId = idCol !== null ? (row[idCol] || "").trim().replace(/^#/, "") : "";
    const sectionKey = sectionCol !== null
      ? (row[sectionCol] || "Unknown Section").trim()
      : (fileName || "Section 1");

    if (!sectionGroups[sectionKey]) sectionGroups[sectionKey] = [];
    sectionGroups[sectionKey].push({ name, studentId, row });
  });

  // Build one section object per group
  return Object.entries(sectionGroups).map(([sectionLabel, students]) => {
    // Extract teacher name from section label by stripping period/section suffixes
    const teacherName = sectionLabel
      .replace(/[\s\-_]+(?:period|per|pd|section|sec|p)[\s\-_]*\d+\s*$/i, "")
      .replace(/[\s\-_]+\d+\s*$/, "")
      .trim() || sectionLabel;

    const parsedStudents = students.map(({ name, studentId, row }) => {
      const pct = cellToPct(row[currentAsmCol.colIndex], currentAsmCol.scoreType, currentAsmCol.pointsPossible);
      const history = historyAsmCols.map(col => {
        const score = cellToPct(row[col.colIndex], col.scoreType, col.pointsPossible);
        return score !== null ? { assessment: col.name, score } : null;
      }).filter(Boolean);
      return { name, studentId, pct, history };
    });

    // Build validCols in IC format for compatibility
    const validCols = assessmentCols.map((c, i) => ({ name: c.name, possible: 100, colIndex: i }));

    return {
      teacherLabel: sectionLabel,
      teacherName,
      students: parsedStudents,
      validCols,
      currentAssessment: currentAsmCol.name,
      historyCols: historyAsmCols,
      _mappingApplied: true,
    };
  });
}

// ─── Column Mapping UI ────────────────────────────────────────────────────────

function ColumnMappingUI({ rows, fileName, onConfirm, onCancel }) {
  const { useState: useLocalState } = React;
  const headers = rows[0] || [];

  // Auto-detect score type from a sample of values in a column
  const guessScoreType = (colIdx) => {
    const samples = rows.slice(1, 6).map(r => (r[colIdx] || "").trim()).filter(Boolean);
    if (samples.some(v => /[A-F][+-]?$/.test(v) && v.length <= 2)) return "letter";
    if (samples.some(v => v.includes("%"))) return "pct";
    const nums = samples.map(v => parseFloat(v)).filter(n => !isNaN(n));
    if (nums.length && nums.every(n => n <= 100)) return "pct";
    return "points";
  };

  // Auto-detect likely column roles from header names
  const guessCol = (patterns) => {
    const idx = headers.findIndex(h => patterns.some(p => p.test(h.trim().toLowerCase())));
    return idx !== -1 ? idx : null;
  };

  const [nameCol,    setNameCol]    = useLocalState(() => guessCol([/^student\s*name$/,/^name$/,/^student$/]) ?? 0);
  const [idCol,      setIdCol]      = useLocalState(() => guessCol([/student\s*id/,/^id$/,/^sis/,/number/]));
  const [sectionCol, setSectionCol] = useLocalState(() => guessCol([/section/,/period/,/course/,/class/,/teacher/]));
  const [dataStart,  setDataStart]  = useLocalState(1);

  // Assessment columns — start with everything that looks numeric after the known cols
  const initAsmCols = () => {
    const skip = new Set([nameCol, idCol, sectionCol].filter(x => x !== null));
    return headers.map((h, i) => {
      if (skip.has(i)) return null;
      const st = guessScoreType(i);
      const hasData = rows.slice(1, 5).some(r => {
        const v = (r[i] || "").trim();
        return v && v !== "-" && !isNaN(parseFloat(v));
      });
      return hasData ? { colIndex: i, name: h.trim() || `Column ${i+1}`, scoreType: st, pointsPossible: "100", selected: true } : null;
    }).filter(Boolean);
  };

  const [asmCols, setAsmCols] = useLocalState(initAsmCols);

  const toggleAsm = (idx) => setAsmCols(prev => prev.map((c, i) => i === idx ? { ...c, selected: !c.selected } : c));
  const updateAsm = (idx, field, val) => setAsmCols(prev => prev.map((c, i) => i === idx ? { ...c, [field]: val } : c));

  const colOpts = headers.map((h, i) => ({ value: i, label: h.trim() || `Col ${i+1}` }));
  const selectedAsm = asmCols.filter(c => c.selected);

  const confirm = () => {
    if (!selectedAsm.length) return;
    const mapping = {
      nameCol, idCol, sectionCol,
      assessmentCols: selectedAsm.map(c => ({ colIndex: c.colIndex, name: c.name, scoreType: c.scoreType, pointsPossible: c.pointsPossible })),
      dataStartRow: dataStart,
    };
    onConfirm(mapping);
  };

  // Preview rows
  const previewRows = rows.slice(0, Math.min(4, rows.length));

  const selStyle = { border: "1px solid #e2e8f0", borderRadius: 6, padding: "0.3rem 0.5rem", fontSize: "0.78rem", fontFamily: "inherit", background: "white", color: "#0f172a", width: "100%" };
  const labelStyle = { fontSize: "0.72rem", fontWeight: 700, color: "#475569", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "0.2rem", display: "block" };

  return (
    <div style={{ background: "white", border: "1px solid #e2e8f0", borderRadius: 12, padding: "1.25rem 1.5rem", marginBottom: "1.25rem", boxShadow: "0 2px 8px rgba(15,23,42,0.07)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "0.75rem" }}>
        <div>
          <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.95rem" }}>📋 Map columns for: <span style={{ color: "#0f766e" }}>{fileName}</span></div>
          <div style={{ fontSize: "0.75rem", color: "#64748b", marginTop: "0.15rem" }}>Reach doesn't recognise this format. Map the columns once — it'll remember for next time.</div>

function SectionCard({ section, onRemove, profThresh }) {
  const { teacherLabel, students, validCols, currentAssessment, historyCols } = section;

  const pcts = students.map(s => s.pct).filter(v => v !== null);
  const profCount = pcts.filter(p => p >= (profThresh ?? 70)).length;
  const profPct = pcts.length > 0 ? Math.round((profCount / pcts.length) * 100) : 0;
  const dist = gradeDist(pcts);

  return (
    <div style={{ background: "white", borderRadius: 10, padding: "1rem 1.1rem", boxShadow: "0 2px 8px rgba(15,23,42,0.08)", borderTop: "4px solid #0f766e" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.92rem" }}>{teacherLabel}</div>
        <button onClick={() => onRemove(teacherLabel)} style={{ background: "none", border: "none", color: "#94a3b8", cursor: "pointer", fontSize: "1rem", padding: 0 }}>✕</button>
      </div>
      <div style={{ fontSize: "0.7rem", color: "#64748b", marginTop: "0.2rem" }}>
        {students.length} students · analyzing: <strong style={{ color: "#0f766e" }}>{currentAssessment}</strong>
        {historyCols.length > 0 && <span> · {historyCols.length} prior assessment{historyCols.length !== 1 ? "s" : ""}</span>}
      </div>

      {pcts.length > 0 && (
        <div style={{ marginTop: "0.75rem" }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: "0.7rem", fontWeight: 700, marginBottom: "0.2rem" }}>
            <span style={{ color: "#0f172a" }}>% Proficient (≥70%)</span>
            <span style={{ color: profPct >= 70 ? "#15803d" : "#dc2626" }}>{profPct}%</span>
          </div>
          <div style={{ height: 7, background: "#e2e8f0", borderRadius: 4, overflow: "hidden" }}>
            <div style={{ width: profPct + "%", height: "100%", background: profPct >= 70 ? "#15803d" : profPct >= 50 ? "#d97706" : "#dc2626", borderRadius: 4, transition: "width 0.4s" }} />
          </div>
          <div style={{ fontSize: "0.65rem", color: "#64748b", marginTop: "0.15rem" }}>{profCount} proficient · {pcts.length - profCount} not proficient</div>

          <div style={{ marginTop: "0.6rem" }}>
            <div style={{ fontSize: "0.62rem", fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: "0.25rem" }}>Distribution</div>
            {(() => {
              const maxCount = Math.max(...Object.values(dist), 1);
              const chartH = maxCount * 3.5 + 16;
              return (
                <div style={{ display: "flex", alignItems: "flex-end", gap: "0.2rem", height: chartH }}>
                  {[["A","#15803d"],["B","#65a30d"],["C","#d97706"],["D","#ea580c"],["F","#dc2626"]].map(([g, color]) => {
                    const count = dist[g];
                    return (
                      <div key={g} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end", gap: "0.1rem" }}>
                        {count > 0 && <div style={{ fontSize: "0.58rem", fontWeight: 700, color }}>{count}</div>}
                        <div style={{ width: "100%", height: count * 3.5, background: color, borderRadius: "2px 2px 0 0", minHeight: count > 0 ? 2 : 0 }} />
                        <div style={{ fontSize: "0.58rem", fontWeight: 700, color }}>{g}</div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Name Mismatch Detection ────────────────────────────────────────────────

// Compares assessment column names across all sections by position.
// Returns an array of mismatches: columns where names differ AND aren't all
// resolved to the same canonical name by the current nameMap.
function detectMismatches(sections, nameMap) {
  if (sections.length < 2) return [];
  const resolve = (n) => nameMap[n] || n;

  // Find the max number of assessment columns across all sections
  const maxCols = Math.max(...sections.map(s => s.validCols.length));
  const mismatches = [];

  for (let col = 0; col < maxCols; col++) {
    // Gather {teacherLabel -> rawName} for this column position
    const namesByLabel = {};
    sections.forEach(sec => {
      if (col < sec.validCols.length) {
        namesByLabel[sec.teacherLabel] = sec.validCols[col].name;
      }
    });

    // Resolve all names through the map
    const resolved = Object.values(namesByLabel).map(n => resolve(n));
    const uniqueResolved = new Set(resolved);

    // If all resolve to the same canonical name, no conflict
    if (uniqueResolved.size <= 1) continue;

    // Otherwise it's a mismatch — pick the most common raw name as the default draft
    const rawNames = Object.values(namesByLabel);
    const freq = {};
    rawNames.forEach(n => freq[n] = (freq[n] || 0) + 1);
    const defaultName = Object.entries(freq).sort((a,b) => b[1]-a[1])[0][0];

    mismatches.push({
      colIndex: col,
      names: namesByLabel,  // { teacherLabel: rawName }
      draft: resolve(defaultName),  // pre-fill with most common (or its canonical)
    });
  }
  return mismatches;
}

  const GAPI_CLIENT_ID = "881323077562-olnslcvmhkdaqkckikv6nnkbsqrn1oje.apps.googleusercontent.com";

  // ── Token management ─────────────────────────────────────────────────────────

  // Returns a valid access token, refreshing silently if within 5 minutes of expiry.
  // All Drive calls should go through this instead of reading driveUser.accessToken directly.
  const getValidToken = () => new Promise((resolve, reject) => {
    const user = driveUser;
    if (!user) { reject(new Error("not_signed_in")); return; }

    const fiveMin = 5 * 60 * 1000;
    const needsRefresh = !user.expiresAt || Date.now() >= user.expiresAt - fiveMin;

    if (!needsRefresh) { resolve(user.accessToken); return; }

    // Queue this call — if refresh already in progress, wait for it
    refreshQueueRef.current.push({ resolve, reject });
    if (refreshingRef.current) return;

    refreshingRef.current = true;
    if (!tokenClientRef.current) {
      const err = new Error("token_client_unavailable");
      refreshQueueRef.current.forEach(cb => cb.reject(err));
      refreshQueueRef.current = [];
      refreshingRef.current = false;
      reject(err); return;
    }

    // Silent refresh — no prompt shown to user
    const prevCallback = tokenClientRef.current.callback;
    tokenClientRef.current.callback = (resp) => {
      tokenClientRef.current.callback = prevCallback;
      refreshingRef.current = false;
      if (resp.error) {
        setTokenExpired(true);
        setDriveStatus("error");
        setDriveMsg("Your session has expired. Please re-authenticate to continue saving to Drive.");

        refreshQueueRef.current.forEach(cb => cb.reject(err));
        refreshQueueRef.current = [];

      const expiresAt = Date.now() + (resp.expires_in || 3600) * 1000;
      setTokenExpired(false);
      setDriveUser(prev => prev ? { ...prev, accessToken: resp.access_token, expiresAt } : prev);

      refreshQueueRef.current = [];
    };

  const withToken = async (fn) => {
    try {
      const token = await getValidToken();
      return await fn(token);

      if (e.message === "not_signed_in") return;

  // Helper to upsert a single JSON file to appDataFolder — used by all save functions

      const listResp = await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name)&q=name='${fileName}'`, {
        headers: { Authorization: "Bearer " + token }
      });
      const existing = ((await listResp.json()).files || [])[0];
      let url, method, body, headers;
      if (existing) {
        url = `https://www.googleapis.com/upload/drive/v3/files/${existing.id}?uploadType=media`;
        method = "PATCH"; body = json;
        headers = { Authorization: "Bearer " + token, "Content-Type": "application/json" };
      } else {
        const boundary = "boundary_reach_report";
        const metadata = JSON.stringify({ name: fileName, parents: ["appDataFolder"] });
        url = "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
        method = "POST";
        body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${metadata}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${json}\r\n--${boundary}--`;
        headers = { Authorization: "Bearer " + token, "Content-Type": `multipart/related; boundary=${boundary}` };
      }

  };

  const openTeamReport = (team) => {
    const fileName = team.id + "_report.json";

    setActiveTab("analysis");

    withToken(async (token) => {

      const r = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {

      setSubgroupMap(state.subgroupMap || null);
      setPriorMap(state.priorMap || null);

  // ── Team management ─────────────────────────────────────────────────────────

  const teamsFileName = "reach_teams.json";
  const teamsBackupFileName = "reach_teams_backup.json";

  const driveLoadTeams = (token) => {
    // Helper to write teams from a file id
    const loadFromFile = (fileId, isBackup) => {
      fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
        headers: { Authorization: "Bearer " + token }
      }).then(r => r.json()).then(parsed => {
        if (Array.isArray(parsed) && parsed.length > 0) {
          setTeams(parsed);
          setTeamsLoaded(true);
          if (isBackup) console.info("Reach: restored teams from backup file.");
        } else {
          setTeams([]); setTeamsLoaded(true);
        }
      }).catch(() => { setTeams([]); setTeamsLoaded(true); });
    };

    // Fetch all app files and find both teams files
    fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name)&q=(name='reach_teams.json'+or+name='reach_teams_backup.json')", {
      headers: { Authorization: "Bearer " + token }
    }).then(r => r.json()).then(data => {
      const files = data.files || [];
      const main   = files.find(f => f.name === teamsFileName);
      const backup = files.find(f => f.name === teamsBackupFileName);

      if (main) {
        // Try main file first — fall back to backup if it fails or is empty
        fetch(`https://www.googleapis.com/drive/v3/files/${main.id}?alt=media`, {
          headers: { Authorization: "Bearer " + token }
        }).then(r => r.json()).then(parsed => {
          if (Array.isArray(parsed) && parsed.length > 0) {
            setTeams(parsed); setTeamsLoaded(true);
          } else if (backup) {
            loadFromFile(backup.id, true);
          } else {
            setTeams([]); setTeamsLoaded(true);
          }
        }).catch(() => {
          if (backup) loadFromFile(backup.id, true);
          else { setTeams([]); setTeamsLoaded(true); }
        });
      } else if (backup) {
        loadFromFile(backup.id, true);
      } else {
        setTeams([]); setTeamsLoaded(true);
      }
    }).catch(() => { setTeams([]); setTeamsLoaded(true); });
  };

  const driveSaveTeams = async (updatedTeams) => {
    await withToken(async (token) => {
      const json = JSON.stringify(updatedTeams);
      // Write main file then backup in parallel
      await Promise.all([
        driveUpsertJSON(token, teamsFileName, json),
        driveUpsertJSON(token, teamsBackupFileName, json),
      ]);

  const createTeam = () => {
    const name = newTeamName.trim();
    if (!name) return;
    const id = "team_" + Date.now();
    const team = { id, name, lastAssessment: null, lastDate: null };

    setNewTeamName("");
    driveSaveTeams(updated);

  const openTeam = (team) => {
    // Reset workspace state
    setSections([]); setSubgroupMap(null); setPriorMap(null);
    setPendingMismatches([]); setReport(null);
    setGrowthData(null); setError(""); setActiveTab("upload");
    setSubgroupFromDrive(false); setDriveSubgroupFile(null);
    setActiveTeam(team);
    setView("workspace");
    // Load team settings if saved, otherwise use defaults

      ? { ...DEFAULT_TEAM_SETTINGS, ...team.settings,
          riskSettings: { ...DEFAULT_TEAM_SETTINGS.riskSettings, ...(team.settings.riskSettings || {}) }
        }
      : DEFAULT_TEAM_SETTINGS);
    // Re-load name map from Drive

    if (!tok) { setNameMap({}); return; }
    fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name)&q=name='reach_namemap.json'`, {
      headers: { Authorization: "Bearer " + tok }
    }).then(r => r.json()).then(data => {
      const file = (data.files || [])[0];
      if (file) {
        fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
          headers: { Authorization: "Bearer " + tok }
        }).then(r => r.json()).then(parsed => {
          setNameMap(typeof parsed === "object" ? parsed : {});
        }).catch(() => setNameMap({}));
      } else {
        setNameMap({});
      }
    }).catch(() => setNameMap({}));
    // Load team files
    const teamId = team.id;
    fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name)", {
      headers: { Authorization: "Bearer " + tok }
    }).then(r => r.json()).then(data => {
      const allFiles = data.files || [];
      const analyticsFiles = allFiles.filter(f => f.name.startsWith(teamId + "_") && f.name.includes("_Analytics")).sort((a, b) => a.name.localeCompare(b.name));
      setDriveFiles(analyticsFiles);
      const sgFile = allFiles.find(f => f.name === teamId + "_subgroups.csv") || null;
      setDriveSubgroupFile(sgFile);
    }).catch(() => {});
  };

  const goHome = () => {
    setView("home");
    setActiveTeam(null);
    setSections([]); setSubgroupMap(null); setPriorMap(null);
    setNameMap({}); setPendingMismatches([]); setReport(null);
    setGrowthData(null); setError("");
    setSubgroupFromDrive(false); setDriveSubgroupFile(null); setDriveFiles([]);
  };

  // Save teamSettings into the team object and persist to Drive
  const saveTeamSettings = (newSettings) => {
    setTeamSettings(newSettings);
    if (!activeTeam) return;
    const updated = teams.map(t => t.id === activeTeam.id ? { ...t, settings: newSettings } : t);
    setTeams(updated);
    setActiveTeam(prev => ({ ...prev, settings: newSettings }));
    driveSaveTeams(updated);
  };

  // When analytics are saved, update the team's lastAssessment + lastDate (preserve settings)
  const updateTeamMeta = (assessmentName) => {
    if (!activeTeam) return;
    const updated = teams.map(t => t.id === activeTeam.id
      ? { ...t, lastAssessment: assessmentName, lastDate: new Date().toISOString().slice(0, 10), settings: teamSettings }
      : t);
    setTeams(updated);
    setActiveTeam(prev => ({ ...prev, lastAssessment: assessmentName, lastDate: new Date().toISOString().slice(0, 10), settings: teamSettings }));
    driveSaveTeams(updated);
  };

  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const [showOlderAnalytics, setShowOlderAnalytics] = useState(false);

  const deleteTeam = async (teamId) => {
    const updated = teams.filter(t => t.id !== teamId);
    setTeams(updated);
    setConfirmDeleteId(null);
    driveSaveTeams(updated);
    // Delete all Drive files belonging to this team
    const tok = driveUser?.accessToken;
    if (!tok) return;
    try {
      const listResp = await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name)`, {
        headers: { Authorization: "Bearer " + tok }
      });
      const allFiles = ((await listResp.json()).files || []);
      const teamFiles = allFiles.filter(f => f.name.startsWith(teamId + "_"));
      await Promise.all(teamFiles.map(f =>
        fetch(`https://www.googleapis.com/drive/v3/files/${f.id}`, {
          method: "DELETE",
          headers: { Authorization: "Bearer " + tok }
        })
      ));
    } catch(e) { console.warn("Could not delete team files from Drive:", e.message); }
  };
  // ── end team management ──────────────────────────────────────────────────────

  // Derive the assessment name to analyze: the currentAssessment from the first loaded section
  const currentAssessmentName = sections.length > 0 ? sections[0].currentAssessment : "";

  // Resolve a raw assessment name through the nameMap to its canonical form
  const resolve = (rawName) => nameMap[rawName] || rawName;

  const processFiles = (files) => {
    setError("");
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const text = e.target.result;
          const rows = parseCSVFull(text);
          if (!rows.length) return;

          const name = file.name.replace(/\.csv$/i, "").trim();
          const lname = name.toLowerCase();

          // Subgroup file — detect by filename OR by IC header format ("Student" + "Sub Group")
          const h0 = (rows[0]?.[0] || "").trim();
          const h1 = (rows[0]?.[1] || "").trim();
          const isSubgroupByContent = /^student$/i.test(h0) && /sub\s*group/i.test(h1);
          if (lname.includes("subgroup") || isSubgroupByContent) {
            const newEntries = parseSubgroupCSV(rows);
            setSubgroupMap(newEntries);
            if (driveUser?.accessToken) {
              setSubgroupFromDrive(true);
              driveSaveSubgroups(text).then(saved => {
                if (saved) setDriveSubgroupFile(saved);
              });
            } else {
              setSubgroupFromDrive(false);
            }
            return;
          }
          // Prior analytics (optional, cross-trimester only)
          if (lname.includes("analytics") || lname.includes("prior")) {
            const parsed = parsePriorAnalyticsCSV(rows);
            setPriorMap(parsed.students);
            // Merge stored name map into the app's name map state
            setNameMap(prev => ({ ...prev, ...parsed.nameMap }));
            return;
          }

          // Detect IC gradebook by checking row 0 col 0 (fast path — no mapping needed)
          const firstCell = (rows[0]?.[0] || "").trim().toLowerCase();
          if (firstCell === "assignment name") {
            // IC files have reliable teacher/period info in the filename — never use fileLabels
            // (IC files from different periods share identical fingerprints, causing collisions)
            const isICReassessment = /[_\-]reassessment$/i.test(name);

            // Strip export suffixes and assessment info to get clean teacher+period label
            // e.g. "Johnson_P1_Unit4_Original" → "Johnson_P1"
            //      "Martinez_P3_Chapter4_Reassessment" → "Martinez_P3"
            //      "Johnson P1" → "Johnson P1" (traditional naming, already clean)
            const strippedName = name
              .replace(/[_\-](?:original|reassessment|cumulative)$/i, "")
              .replace(/[_\-](?:unit|chapter|ch|u)[_\-]?\d+[_\-]?(?:test|quiz|exam|assessment)?$/i, "")
              .replace(/[_\-](?:test|quiz|exam|assessment)[_\-]?\d*$/i, "")
              .trim();

            const resolvedLabel = strippedName || name;
            const teacherName = resolvedLabel
              .replace(/[\s\-\u2013_]+(?:period|per|pd|section|sec|p)[\s\-\u2013_]*\d+\s*$/i, "")
              .replace(/[\s\-\u2013_]+\d+\s*$/, "")
              .trim() || resolvedLabel;

            // Only flag for rename if the label still looks like a raw export
            // (i.e. didn't contain any teacher/period info we could extract)
            const needsRename = filenameNeedsLabel(resolvedLabel) && resolvedLabel === name;
            const fp = headerFingerprint(rows[0] || []);

            const parsed = parseICGradebook(rows, resolvedLabel, teacherName);
            if (!parsed || parsed.students.length === 0) {
              setError(`Could not parse "${file.name}" — no student data found.`);
              return;
            }
            parsed._needsRename = needsRename;
            parsed._fingerprint = fp;

            // IC reassessment file: merge higher scores into the existing matching section
            // Same logic as Canvas — detect score increases, store _originalPct
            if (isICReassessment) {
              setSections(prev => {
                const existing = prev.find(s =>
                  s.teacherLabel === resolvedLabel &&
                  s.currentAssessment === parsed.currentAssessment
                );
                if (!existing) {
                  // No matching section loaded yet — add normally
                  return [...prev, parsed];
                }
                const updatedStudents = existing.students.map(origStu => {
                  const reStu = parsed.students.find(r =>
                    (r.studentId && r.studentId === origStu.studentId) || r.name === origStu.name
                  );
                  if (!reStu || reStu.pct <= origStu.pct) return origStu;
                  return { ...origStu, pct: reStu.pct, _originalPct: origStu.pct };
                });
                return prev.map(s =>
                  s.teacherLabel === resolvedLabel && s.currentAssessment === parsed.currentAssessment
                    ? { ...s, students: updatedStudents }
                    : s
                );
              });
              return;
            }

            setSections(prev => {
              const filtered = prev.filter(s => s.teacherLabel !== resolvedLabel);
              const next = [...filtered, parsed];
              setTimeout(() => {
                setNameMap(currentMap => {
                  setPendingMismatches(() => detectMismatches(next, currentMap));
                  return currentMap;
                });
              }, 0);
              return next;
            });
            if (needsRename) {
              const guess = guessLabelsFromRows(rows, parsed, name);
              setPendingRenames(prev => ({ ...prev, [resolvedLabel]: { teacherName: guess.teacherName, label: guess.teacherLabel, previewStudents: guess.previewStudents, source: guess.source } }));
            }
            return;
          }

          // Canvas Quiz Student Analysis fast-path
          if (isCanvasQuizStudentCSV(rows)) {
            const fp = headerFingerprint(rows[0] || []);
            const savedLabel = fileLabels[fp];
            const parsed = parseCanvasQuizStudent(rows, name);
            if (!parsed || parsed.students.length === 0) {
              setError(`Could not parse "${file.name}" — no student data found.`);
              return;
            }

            // Step 1: saved label from a previous rename — most reliable
            if (savedLabel) {
              parsed.teacherName = savedLabel.teacherName;
              parsed.teacherLabel = savedLabel.teacherLabel;
              parsed._needsRename = false;
            } else {
              // Step 2: filename first part (e.g. "Jones_TQ1_Student" → "Jones")
              // A good teacher name: 2+ letters, not a generic word, not all digits
              const GENERIC_WORDS = /^(data|export|quiz|test|grade|class|course|section|student|gradebook|scores?|results?|report|canvas|unit|assessment)$/i;
              const looksLikeName = parsed.teacherName &&
                parsed.teacherName.length >= 2 &&
                !/^\d+$/.test(parsed.teacherName) &&
                !GENERIC_WORDS.test(parsed.teacherName);

              if (looksLikeName) {
                // Filename gave us a good name — use it, no prompt
                parsed._needsRename = false;
              } else {
                // Step 3: try SectionNames column for a teacher-looking word
                // but skip course names (typically all-caps abbreviations or short codes)
                let foundFromSection = false;
                if (rows.length > 1) {
                  const sectionName = (rows[1]?.[3] || "").trim();
                  if (sectionName) {
                    const parts = sectionName.split(/[-–]/);
                    // Only accept parts that look like a proper last name:
                    // starts with capital, rest lowercase, 3+ chars, not a course code
                    const teacherPart = parts.find(p => {
                      const t = p.trim();
                      return /^[A-Z][a-z]{2,}$/.test(t) && !GENERIC_WORDS.test(t);
                    });
                    if (teacherPart) {
                      parsed.teacherName = teacherPart.trim();
                      parsed.teacherLabel = teacherPart.trim();
                      foundFromSection = true;
                      parsed._needsRename = false;
                    }
                  }
                }
                // Step 4: still no good name — prompt the facilitator
                if (!foundFromSection) {
                  parsed._needsRename = true;
                }
              }
            }

            parsed._fingerprint = fp;

            // If this is a reassessment file, merge scores into the existing section
            // rather than creating a new one — this makes Reach's reassessment detection fire
            if (parsed._isReassessment) {
              setSections(prev => {
                const existing = prev.find(s => s.teacherLabel === parsed.teacherLabel &&
                                               s.currentAssessment === parsed.currentAssessment);
                if (!existing) {
                  // No matching original section loaded yet — add as normal so it's visible
                  return [...prev, parsed];
                }
                // Merge: update any student whose reassessment score is higher than their original
                const updatedStudents = existing.students.map(origStu => {
                  const reStu = parsed.students.find(r =>
                    (r.studentId && r.studentId === origStu.studentId) ||
                    r.name === origStu.name
                  );
                  if (!reStu || reStu.pct <= origStu.pct) return origStu;
                  // Score went up — store original in history for reassessment detection
                  // by injecting it as a prior entry under the same assessment name
                  // The analytics CSV already handles this via the |Reassessed column,
                  // but we need priorMap to detect it. Instead, we directly flag it:
                  return { ...origStu, pct: reStu.pct, _originalPct: origStu.pct };
                });
                const merged = { ...existing, students: updatedStudents };
                return prev.map(s => s.teacherLabel === merged.teacherLabel &&
                                     s.currentAssessment === merged.currentAssessment ? merged : s);
              });
              return;
            }

            setSections(prev => {
              const filtered = prev.filter(s => s.teacherLabel !== parsed.teacherLabel);
              const next = [...filtered, parsed];
              setTimeout(() => { setNameMap(cm => { setPendingMismatches(() => detectMismatches(next, cm)); return cm; }); }, 0);
              return next;
            });
            if (parsed._needsRename) {
              const guess = guessLabelsFromRows(rows, parsed, name);
              setPendingRenames(prev => ({ ...prev, [parsed.teacherLabel]: { teacherName: guess.teacherName, label: guess.teacherLabel, previewStudents: guess.previewStudents, source: guess.source } }));
            }
            return;
          }

          // Generic path — check saved mappings: exact match first, loose fallback second
          const fp = headerFingerprint(rows[0] || []);
          const fpLoose = headerFingerprintLoose(rows[0] || []);

          // Try exact fingerprint first, then loose fingerprint
          const savedMapping = columnMappings[fp] ||
            Object.entries(columnMappings).find(([k, v]) =>
              k.startsWith("loose:") && k === fpLoose
            )?.[1];

          if (savedMapping) {
            // Known format — apply silently
            const newSections = parseGenericGradebook(rows, savedMapping, name);
            if (!newSections.length) { setError(`Could not parse "${file.name}" with the saved mapping.`); return; }
            setSections(prev => {
              const filtered = prev.filter(s => !newSections.find(ns => ns.teacherLabel === s.teacherLabel));
              const next = [...filtered, ...newSections];
              setTimeout(() => { setNameMap(cm => { setPendingMismatches(() => detectMismatches(next, cm)); return cm; }); }, 0);
              return next;
            });
            return;
          }

          // Unknown format — show mapping UI
          setPendingMapping({ rows, fileName: file.name, name });
        } catch (err) {
          setError("Error reading file: " + err.message);
        }
      };
      reader.readAsText(file);
    });
  };

  const onDrop = useCallback((e) => {
    e.preventDefault();
    setDragOver(false);
    processFiles(e.dataTransfer.files);
  }, []);

  const removeSection = (label) => {
    setSections(prev => prev.filter(s => s.teacherLabel !== label));
  };

  // Called when facilitator confirms a column mapping from the UI
  const confirmMapping = (mapping) => {
    if (!pendingMapping) return;
    const { rows, fileName, name } = pendingMapping;
    const fp = headerFingerprint(rows[0] || []);
    const fpLoose = headerFingerprintLoose(rows[0] || []);
    // Store the source filename so it's recognizable in the saved mappings list
    const mappingWithMeta = { ...mapping, _sourceName: fileName, _savedAt: new Date().toISOString().slice(0, 10) };
    const updated = { ...columnMappings, [fp]: mappingWithMeta, [fpLoose]: mappingWithMeta };
    setColumnMappings(updated);
    if (driveUser?.accessToken) driveSaveMappings(updated);
    const newSections = parseGenericGradebook(rows, mapping, name);
    if (!newSections.length) { setError(`Could not parse "${fileName}" with this mapping.`); setPendingMapping(null); return; }
    setSections(prev => {
      const filtered = prev.filter(s => !newSections.find(ns => ns.teacherLabel === s.teacherLabel));
      const next = [...filtered, ...newSections];
      setTimeout(() => { setNameMap(cm => { setPendingMismatches(() => detectMismatches(next, cm)); return cm; }); }, 0);
      return next;
    });
    setPendingMapping(null);
  };

  // Attempt to guess teacher name and section label from file content.
  // Returns { teacherName, teacherLabel, previewStudents }
  const guessLabelsFromRows = (rows, parsedSection, fileName) => {
    const previewStudents = (parsedSection?.students || []).slice(0, 5).map(s => s.name);

    // For Canvas files: SectionNames column (col 3) has "CourseName-Teacher-Period"
    if (parsedSection?._source === "canvas_quiz" && rows.length > 1) {
      const sectionName = (rows[1]?.[3] || "").trim();
      if (sectionName) {
        // e.g. "Am Studies-9SST400-Aitken-Period 2" → teacher=Aitken, label=Aitken Period 2
        const parts = sectionName.split(/[-–]/);
        // Teacher name is usually the second-to-last part before "Period N"
        const periodPart = parts.find(p => /period\s*\d+/i.test(p.trim()));
        const teacherPart = parts.find(p => /^[A-Z][a-z]+$/.test(p.trim()) && !periodPart?.includes(p));
        if (teacherPart && periodPart) {
          const tName = teacherPart.trim();
          return { teacherName: tName, teacherLabel: `${tName} ${periodPart.trim()}`, previewStudents, source: sectionName };
        }
        if (teacherPart) {
          return { teacherName: teacherPart.trim(), teacherLabel: sectionName, previewStudents, source: sectionName };
        }
        return { teacherName: sectionName, teacherLabel: sectionName, previewStudents, source: sectionName };
      }
    }

    // For IC files: no internal teacher info — try to extract from filename more aggressively
    // e.g. "gradebook_Smith_export" → try each word as potential teacher name
    const words = fileName.replace(/[_\-\.]/g, " ").split(/\s+/).filter(w => w.length > 2 && !/^\d+$/.test(w) && !/^(gradebook|export|data|report|csv|class|roster|scores?|test|quiz|unit|period|per|pd|sec|section|assessment|student)$/i.test(w));
    const likelyTeacher = words[0] || "";

    return { teacherName: likelyTeacher, teacherLabel: likelyTeacher, previewStudents, source: null };
  };

  // Returns true if the filename looks like a raw export with no teacher/period info
  const filenameNeedsLabel = (name) => {
    if (/[\s\-\u2013_]+(?:period|per|pd|section|sec|p)[\s\-\u2013_]*\d+/i.test(name)) return false;
    if (/_student$/i.test(name)) return false;
    if (/[\s_\-]\d+$/.test(name)) return false;
    return true;
  };

  // Confirm a rename: update the section in state and save to Drive
  const confirmRename = (teacherLabel, newTeacherName, newLabel, fingerprint) => {
    setSections(prev => prev.map(s => {
      if (s.teacherLabel !== teacherLabel) return s;
      return { ...s, teacherName: newTeacherName, teacherLabel: newLabel || teacherLabel, _needsRename: false };
    }));
    setPendingRenames(prev => { const n = { ...prev }; delete n[teacherLabel]; return n; });
    // Save to Drive so same file auto-labeled next time
    if (fingerprint) {
      const updated = { ...fileLabels, [fingerprint]: { teacherName: newTeacherName, teacherLabel: newLabel || teacherLabel } };
      setFileLabels(updated);
      if (driveUser?.accessToken) driveSaveFileLabels(updated);
    }
    // Re-run mismatch detection with updated labels
    setTimeout(() => {
      setSections(current => {
        setNameMap(cm => { setPendingMismatches(() => detectMismatches(current, cm)); return cm; });
        return current;
      });
    }, 0);
  };

  // Open editor: seed from existing subgroupMap or blank, merge in any students from loaded sections
  const openSgEditor = () => {
    // Build base student list from subgroupMap if it exists
    const existing = subgroupMap ? Object.values(subgroupMap).map(v => ({
      name: v.name, id: v.id || "", subgroups: [...(v.subgroups || [])]
    })) : [];

    // Merge in any students from loaded sections not already in the list
    const ids = new Set(existing.map(s => s.id || s.name));
    sections.forEach(sec => {
      sec.students.forEach(stu => {
        const key = stu.studentId || stu.name;
        if (!ids.has(key)) {
          existing.push({ name: stu.name, id: stu.studentId || "", subgroups: [], isNew: true });
          ids.add(key);
        }
      });
    });

    // Derive columns from existing subgroupMap data
    const allSgs = new Set(DEFAULT_SUBGROUPS);
    existing.forEach(s => s.subgroups.forEach(sg => allSgs.add(sg)));
    setSgColumns([...allSgs]);
    setSgStudents(existing.sort((a, b) => a.name.localeCompare(b.name)));
    setSgEditorMode("edit");
    setSgEditorOpen(true);
  };

  // Parse pasted class list — handles "First Last", "Last, First", optionally with ID
  const parsePastedRoster = () => {
    const lines = sgPasteText.split("\n").map(l => l.trim()).filter(Boolean);
    const parsed = lines.map(line => {
      // Try to extract an ID — any sequence of 5+ digits
      const idMatch = line.match(/\b(\d{5,})\b/);
      const id = idMatch ? idMatch[1] : "";
      const namePart = line.replace(/\b\d{5,}\b/, "").replace(/\t/g, " ").trim().replace(/,\s*$/, "").trim();
      let name;
      if (namePart.includes(",")) {
        const ci = namePart.indexOf(",");
        const last = namePart.slice(0, ci).trim();
        const first = namePart.slice(ci + 1).trim();
        name = first ? `${first} ${last}` : last;
      } else {
        name = namePart;
      }
      return name ? { name, id, subgroups: [], isNew: true } : null;
    }).filter(Boolean);

    // Merge with existing
    setSgStudents(prev => {
      const ids = new Set(prev.map(s => s.id || s.name));
      const toAdd = parsed.filter(s => !ids.has(s.id || s.name));
      return [...prev, ...toAdd].sort((a, b) => a.name.localeCompare(b.name));
    });
    setSgPasteText("");
    setSgEditorMode("edit");
  };

  const toggleSgStudentGroup = (studentIdx, group) => {
    setSgStudents(prev => prev.map((s, i) => {
      if (i !== studentIdx) return s;
      const has = s.subgroups.includes(group);
      return { ...s, subgroups: has ? s.subgroups.filter(g => g !== group) : [...s.subgroups, group] };
    }));
  };

  const addSgColumn = () => {
    const col = sgNewCol.trim();
    if (!col || sgColumns.includes(col)) return;
    setSgColumns(prev => [...prev, col]);
    setSgNewCol("");
  };

  const removeSgColumn = (col) => {
    setSgColumns(prev => prev.filter(c => c !== col));
    setSgStudents(prev => prev.map(s => ({ ...s, subgroups: s.subgroups.filter(g => g !== col) })));
  };

  // Build subgroupMap object from editor state and save
  const commitSgEditor = () => {
    const map = {};
    sgStudents.forEach(s => {
      const key = s.id || s.name;
      map[key] = { name: s.name, id: s.id, subgroups: s.subgroups };
    });
    setSubgroupMap(map);
    setSubgroupFromDrive(false);
    setSgEditorOpen(false);
    // Save to Drive
    if (driveUser?.accessToken) {
      // Build CSV text in IC format: Student, Sub Group (one row per membership)
      const rows = [["Student", "Sub Group"]];
      sgStudents.forEach(s => {
        const cell = s.id ? `${s.name} #${s.id}` : s.name;
        if (s.subgroups.length === 0) {
          // No subgroups — still include so student is known
        } else {
          s.subgroups.forEach(sg => rows.push([cell, sg]));
        }
      });
      const csv = rows.map(r => r.map(v => v.includes(",") ? `"${v}"` : v).join(",")).join("\n");
      driveSaveSubgroups(csv).then(saved => {
        if (saved) { setDriveSubgroupFile(saved); setSubgroupFromDrive(true); }
      });
    }
  };

  // ── end subgroup editor helpers ───────────────────────────────────────────────

  const generateReport = () => {
    if (!sections.length) { setError("No gradebook files loaded."); return; }

    // Compute combined stats using each section's built-in current pct
    const allPcts = sections.flatMap(sec => sec.students.map(s => s.pct).filter(v => v !== null));

    const stats = computeStats(allPcts);
    const dist = gradeDist(allPcts);
    const proficient = allPcts.filter(p => p >= teamSettings.proficiencyThreshold).length;
    const notProficient = allPcts.length - proficient;
    const proficiencyPct = allPcts.length > 0 ? Math.round((proficient / allPcts.length) * 100) : 0;

    const gd = buildGrowthData(sections, currentAssessmentName, subgroupMap, priorMap, nameMap, teamSettings);
    // Count students whose score changed (reassessed) and who crossed into proficiency via reassessment
    const reassessedCount = gd.reassessments.length;
    // Count how many individual assessment instances crossed into proficiency
    const reassessedToProfCount = gd.reassessments
      .flatMap(s => s.reassessedAssessments)
      .filter(r => r.crossedProficiency).length;

    setReport({ stats, dist, proficient, notProficient, proficiencyPct, totalStudents: allPcts.length, reassessedCount, reassessedToProfCount });
    setGrowthData(gd);
    setActiveTab("analysis");
  };

  const GRADE_COLORS = { A:"#15803d", B:"#65a30d", C:"#d97706", D:"#ea580c", F:"#dc2626" };
  const GRADE_BGS = { A:"#dcfce7", B:"#f0fdf4", C:"#fef9c3", D:"#fff7ed", F:"#fee2e2" };

  const downloadSnapshot = () => {
    try {
      const state = {
        sections, subgroupMap, priorMap, nameMap, report,
        growthData: growthData ? {
          enriched:      growthData.enriched,
          subgroupStats: growthData.subgroupStats,
          classAvg:      growthData.classAvg,
          totalStudents: growthData.totalStudents,
          reassessments: growthData.reassessments,
        } : null,
      };

      // Base64-encode so the JSON is safe in any HTML attribute
      const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(state))));

      // Read the app source from the embedded __APP_SOURCE__ variable
      // (a verbatim copy of the file baked in at the bottom of the HTML).
      // Falls back to outerHTML only if the source var isn't available.
      const html = (typeof __APP_SOURCE__ !== "undefined")
        ? __APP_SOURCE__
        : document.documentElement.outerHTML;

      const emptyMeta  = '<meta id="snapshot-data" name="snapshot-data" content="">';
      const filledMeta = '<meta id="snapshot-data" name="snapshot-data" content="' + b64 + '">';
      const snapshot   = html.replace(emptyMeta, filledMeta);

      const blob = new Blob([snapshot], { type: "text/html;charset=utf-8;" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = (currentAssessmentName || "Assessment") + "_Report.html";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch(e) {
      alert("Snapshot failed: " + e.message);
    }

            </div>
            {activeTeam

        <div style={{ display: "flex", alignItems: "center", gap: "1rem" }}>
