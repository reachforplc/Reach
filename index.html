    const fpLoose = headerFingerprintLoose(rows[0] || []);
    // Store the source filename so it's recognizable in the saved mappings list
    const mappingWithMeta = { ...mapping, _sourceName: fileName, _savedAt: new Date().toISOString().slice(0, 10) };
    const updated = { ...columnMappings, [fp]: mappingWithMeta, [fpLoose]: mappingWithMeta };
    setColumnMappings(updated);
    if (driveUser?.accessToken) driveSaveMappings(updated);
    const newSections = parseGenericGradebook(rows, mapping, name);
    if (!newSections.length) { setError(`Could not parse "${fileName}" with this mapping.`); setPendingMapping(null); return; }
    setSections(prev => {
      const filtered = prev.filter(s => !newSections.find(ns => ns.teacherLabel === s.teacherLabel));
      const next = [...filtered, ...newSections];
      setTimeout(() => { setNameMap(cm => { setPendingMismatches(() => detectMismatches(next, cm)); return cm; }); }, 0);
      return next;
    });
    setPendingMapping(null);
  };

  // Attempt to guess teacher name and section label from file content.
  // Returns { teacherName, teacherLabel, previewStudents }
  const guessLabelsFromRows = (rows, parsedSection, fileName) => {
    const previewStudents = (parsedSection?.students || []).slice(0, 5).map(s => s.name);

    // For Canvas files: SectionNames column (col 3) has "CourseName-Teacher-Period"
    if (parsedSection?._source === "canvas_quiz" && rows.length > 1) {
      const sectionName = (rows[1]?.[3] || "").trim();
      if (sectionName) {
        // e.g. "Am Studies-9SST400-Aitken-Period 2" → teacher=Aitken, label=Aitken Period 2
        const parts = sectionName.split(/[-–]/);
        // Teacher name is usually the second-to-last part before "Period N"
        const periodPart = parts.find(p => /period\s*\d+/i.test(p.trim()));
        const teacherPart = parts.find(p => /^[A-Z][a-z]+$/.test(p.trim()) && !periodPart?.includes(p));
        if (teacherPart && periodPart) {
          const tName = teacherPart.trim();
          return { teacherName: tName, teacherLabel: `${tName} ${periodPart.trim()}`, previewStudents, source: sectionName };
        }
        if (teacherPart) {
          return { teacherName: teacherPart.trim(), teacherLabel: sectionName, previewStudents, source: sectionName };
        }
        return { teacherName: sectionName, teacherLabel: sectionName, previewStudents, source: sectionName };
      }
    }

    // For IC files: no internal teacher info — try to extract from filename more aggressively
    // e.g. "gradebook_Smith_export" → try each word as potential teacher name
    const words = fileName.replace(/[_\-\.]/g, " ").split(/\s+/).filter(w => w.length > 2 && !/^\d+$/.test(w) && !/^(gradebook|export|data|report|csv|class|roster|scores?|test|quiz|unit|period|per|pd|sec|section|assessment|student)$/i.test(w));
    const likelyTeacher = words[0] || "";

    return { teacherName: likelyTeacher, teacherLabel: likelyTeacher, previewStudents, source: null };
  };

  // Returns true if the filename looks like a raw export with no teacher/period info
  const filenameNeedsLabel = (name) => {
    if (/[\s\-\u2013_]+(?:period|per|pd|section|sec|p)[\s\-\u2013_]*\d+/i.test(name)) return false;
    if (/_student$/i.test(name)) return false;
    if (/[\s_\-]\d+$/.test(name)) return false;
    return true;
  };

  // Confirm a rename: update the section in state and save to Drive
  const confirmRename = (teacherLabel, newTeacherName, newLabel, fingerprint) => {
    setSections(prev => prev.map(s => {
      if (s.teacherLabel !== teacherLabel) return s;
      return { ...s, teacherName: newTeacherName, teacherLabel: newLabel || teacherLabel, _needsRename: false };
    }));
    setPendingRenames(prev => { const n = { ...prev }; delete n[teacherLabel]; return n; });
    // Save to Drive so same file auto-labeled next time
    if (fingerprint) {
      const updated = { ...fileLabels, [fingerprint]: { teacherName: newTeacherName, teacherLabel: newLabel || teacherLabel } };
      setFileLabels(updated);
      if (driveUser?.accessToken) driveSaveFileLabels(updated);
    }
    // Re-run mismatch detection with updated labels
    setTimeout(() => {
      setSections(current => {
        setNameMap(cm => { setPendingMismatches(() => detectMismatches(current, cm)); return cm; });
        return current;
      });
    }, 0);
  };

  // Open editor: seed from existing subgroupMap or blank, merge in any students from loaded sections
  const openSgEditor = () => {
    // Build base student list from subgroupMap if it exists
    const existing = subgroupMap ? Object.values(subgroupMap).map(v => ({
      name: v.name, id: v.id || "", subgroups: [...(v.subgroups || [])]
    })) : [];

    // Merge in any students from loaded sections not already in the list
    const ids = new Set(existing.map(s => s.id || s.name));
    sections.forEach(sec => {
      sec.students.forEach(stu => {
        const key = stu.studentId || stu.name;
        if (!ids.has(key)) {
          existing.push({ name: stu.name, id: stu.studentId || "", subgroups: [], isNew: true });
          ids.add(key);
        }
      });
    });

    // Derive columns from existing subgroupMap data
    const allSgs = new Set(DEFAULT_SUBGROUPS);
    existing.forEach(s => s.subgroups.forEach(sg => allSgs.add(sg)));
    setSgColumns([...allSgs]);
    setSgStudents(existing.sort((a, b) => a.name.localeCompare(b.name)));
    setSgEditorMode("edit");
    setSgEditorOpen(true);
  };

  // Parse pasted class list — handles "First Last", "Last, First", optionally with ID
  const parsePastedRoster = () => {
    const lines = sgPasteText.split("\n").map(l => l.trim()).filter(Boolean);
    const parsed = lines.map(line => {
      // Try to extract an ID — any sequence of 5+ digits
      const idMatch = line.match(/\b(\d{5,})\b/);
      const id = idMatch ? idMatch[1] : "";
      const namePart = line.replace(/\b\d{5,}\b/, "").replace(/\t/g, " ").trim().replace(/,\s*$/, "").trim();
      let name;
      if (namePart.includes(",")) {
        const ci = namePart.indexOf(",");
        const last = namePart.slice(0, ci).trim();
        const first = namePart.slice(ci + 1).trim();
        name = first ? `${first} ${last}` : last;
      } else {
        name = namePart;
      }
      return name ? { name, id, subgroups: [], isNew: true } : null;
    }).filter(Boolean);

    // Merge with existing
    setSgStudents(prev => {
      const ids = new Set(prev.map(s => s.id || s.name));
      const toAdd = parsed.filter(s => !ids.has(s.id || s.name));
      return [...prev, ...toAdd].sort((a, b) => a.name.localeCompare(b.name));
    });
    setSgPasteText("");
    setSgEditorMode("edit");
  };

  const toggleSgStudentGroup = (studentIdx, group) => {
    setSgStudents(prev => prev.map((s, i) => {
      if (i !== studentIdx) return s;
      const has = s.subgroups.includes(group);
      return { ...s, subgroups: has ? s.subgroups.filter(g => g !== group) : [...s.subgroups, group] };
    }));
  };

  const addSgColumn = () => {
    const col = sgNewCol.trim();
    if (!col || sgColumns.includes(col)) return;
    setSgColumns(prev => [...prev, col]);
    setSgNewCol("");
  };

  const removeSgColumn = (col) => {
    setSgColumns(prev => prev.filter(c => c !== col));
    setSgStudents(prev => prev.map(s => ({ ...s, subgroups: s.subgroups.filter(g => g !== col) })));
  };

  // Build subgroupMap object from editor state and save
  const commitSgEditor = () => {
    const map = {};
    sgStudents.forEach(s => {
      const key = s.id || s.name;
      map[key] = { name: s.name, id: s.id, subgroups: s.subgroups };
    });
    setSubgroupMap(map);
    setSubgroupFromDrive(false);
    setSgEditorOpen(false);
    // Save to Drive
    if (driveUser?.accessToken) {
      // Build CSV text in IC format: Student, Sub Group (one row per membership)
      const rows = [["Student", "Sub Group"]];
      sgStudents.forEach(s => {
        const cell = s.id ? `${s.name} #${s.id}` : s.name;
        if (s.subgroups.length === 0) {
          // No subgroups — still include so student is known
        } else {
          s.subgroups.forEach(sg => rows.push([cell, sg]));
        }
      });
      const csv = rows.map(r => r.map(v => v.includes(",") ? `"${v}"` : v).join(",")).join("\n");
      driveSaveSubgroups(csv).then(saved => {
        if (saved) { setDriveSubgroupFile(saved); setSubgroupFromDrive(true); }
      });
    }
  };

  // ── end subgroup editor helpers ───────────────────────────────────────────────

  const generateReport = () => {
    if (!sections.length) { setError("No gradebook files loaded."); return; }

    // Compute combined stats using each section's built-in current pct
    const allPcts = sections.flatMap(sec => sec.students.map(s => s.pct).filter(v => v !== null));

    const stats = computeStats(allPcts);
    const dist = gradeDist(allPcts);
    const proficient = allPcts.filter(p => p >= teamSettings.proficiencyThreshold).length;
    const notProficient = allPcts.length - proficient;
    const proficiencyPct = allPcts.length > 0 ? Math.round((proficient / allPcts.length) * 100) : 0;

    const gd = buildGrowthData(sections, currentAssessmentName, subgroupMap, priorMap, nameMap, teamSettings);
    // Count students whose score changed (reassessed) and who crossed into proficiency via reassessment
    const reassessedCount = gd.reassessments.length;
    // Count how many individual assessment instances crossed into proficiency
    const reassessedToProfCount = gd.reassessments
      .flatMap(s => s.reassessedAssessments)
      .filter(r => r.crossedProficiency).length;

    setReport({ stats, dist, proficient, notProficient, proficiencyPct, totalStudents: allPcts.length, reassessedCount, reassessedToProfCount });
    setGrowthData(gd);
    setActiveTab("analysis");
  };

  const GRADE_COLORS = { A:"#15803d", B:"#65a30d", C:"#d97706", D:"#ea580c", F:"#dc2626" };
  const GRADE_BGS = { A:"#dcfce7", B:"#f0fdf4", C:"#fef9c3", D:"#fff7ed", F:"#fee2e2" };

  const downloadSnapshot = () => {
    try {
      const state = {
        sections,
        growthData: growthData ? {
          enriched:      growthData.enriched,
          subgroupStats: growthData.subgroupStats,
          classAvg:      growthData.classAvg,
          totalStudents: growthData.totalStudents,
          reassessments: growthData.reassessments,
        } : null,
        report,
        teamSettings,
        assessmentName: currentAssessmentName,
        teamName: activeTeam ? activeTeam.name : null,
      };
      const json = JSON.stringify(state);
      const bytes = new TextEncoder().encode(json);
      let bin = "";
      for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      const b64 = btoa(bin);
      const viewerEl = document.getElementById("viewer-template-b64");
      const viewerB64 = viewerEl ? viewerEl.textContent.trim() : "";
      const viewerBytes = Uint8Array.from(atob(viewerB64), c => c.charCodeAt(0));
      const viewerTemplate = new TextDecoder("utf-8").decode(viewerBytes);
      const snapshot = viewerTemplate.replace('content=""', 'content="' + b64 + '"');
      const blob = new Blob([snapshot], { type: "text/html;charset=utf-8;" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href = url;
      a.download = (currentAssessmentName || "Assessment") + "_Report.html";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch(e) { alert("Download failed: " + e.message); }
  };

  return (

      <div style={{ background: "linear-gradient(135deg, #0f172a 0%, #1a2d4a 60%, #0f2d3d 100%)", padding: "0 1.5rem", flexShrink: 0, borderBottom: "1px solid rgba(20,184,166,0.2)" }}>

            </button>

            <path d="M28 14 L31 8 L34 14" stroke="#f0fdf4" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
            <line x1="31" y1="8" x2="31" y2="20" stroke="#f0fdf4" strokeWidth="1.8" strokeLinecap="round"/>
          </svg>
          <div>
            <div style={{ display: "flex", alignItems: "baseline", gap: "0.35rem" }}>
              <span style={{ fontFamily: "'DM Serif Display', serif", fontWeight: 400, color: "white", fontSize: "1.45rem", letterSpacing: "-0.01em", lineHeight: 1 }}>Reach</span>
              <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#2dd4bf", display: "inline-block", marginBottom: 2, flexShrink: 0 }}></span>
            </div>
            {activeTeam
              ? <div style={{ fontSize: "0.65rem", color: "#2dd4bf", letterSpacing: "0.06em", textTransform: "uppercase", marginTop: "0.05rem", fontWeight: 700 }}>{activeTeam.name}</div>
              : <div style={{ fontSize: "0.62rem", color: "#5eead4", letterSpacing: "0.1em", textTransform: "uppercase", marginTop: "0.05rem", fontWeight: 600 }}>Student Intervention Tracker</div>
            }
          </div>
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: "1rem" }}>
        {currentAssessmentName && view === "workspace" && (
          <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
            <span style={{ fontSize: "0.65rem", color: "#475569", textTransform: "uppercase", letterSpacing: "0.07em", fontWeight: 600 }}>Analyzing:</span>
            <span style={{ background: "rgba(20,184,166,0.18)", color: "#5eead4", borderRadius: 6, padding: "0.22rem 0.65rem", fontSize: "0.78rem", fontWeight: 700, border: "1px solid rgba(20,184,166,0.3)" }}>{currentAssessmentName}</span>
          </div>
        )}
        {/* Gear settings button — only in workspace */}
        {view === "workspace" && !isSnapshot && (
          <button onClick={() => setSettingsOpen(v => !v)}
            title="Team Settings"
            style={{ background: settingsOpen ? "rgba(20,184,166,0.2)" : "rgba(255,255,255,0.08)", border: `1px solid ${settingsOpen ? "rgba(20,184,166,0.5)" : "rgba(255,255,255,0.15)"}`, borderRadius: 7, color: settingsOpen ? "#2dd4bf" : "#94a3b8", padding: "0.3rem 0.55rem", fontSize: "0.9rem", cursor: "pointer", fontFamily: "inherit", lineHeight: 1 }}>
            ⚙
          </button>
        )}
        {/* Help button — always visible */}
        {!isSnapshot && (
          <button onClick={() => setHelpOpen(v => !v)}
            title="Help & Guide"
            style={{ background: helpOpen ? "rgba(20,184,166,0.2)" : "rgba(255,255,255,0.08)", border: `1px solid ${helpOpen ? "rgba(20,184,166,0.5)" : "rgba(255,255,255,0.15)"}`, borderRadius: 7, color: helpOpen ? "#2dd4bf" : "#94a3b8", padding: "0.3rem 0.6rem", fontSize: "0.85rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", lineHeight: 1 }}>
            ?
          </button>

        {/* Report a problem — always visible */}
        {!isSnapshot && (
          <a href={(() => {
            const subject = encodeURIComponent("Reach — Problem Report");
            const body = encodeURIComponent(
              "Describe what happened:\n\n\n\n--- Auto-filled context ---\n" +
              `Team: ${activeTeam ? activeTeam.name : "None"}\n` +
              `Assessment: ${currentAssessmentName || "None"}\n` +
              `Browser: ${navigator.userAgent.match(/(Chrome|Firefox|Safari|Edge)\/[\d.]+/)?.[0] || "Unknown"}\n` +
              `Page: ${window.location.href}`
            );
            return `mailto:reachplcapp@gmail.com?subject=${subject}&body=${body}`;
          })()}
            style={{ fontSize: "0.7rem", color: "#64748b", textDecoration: "none", whiteSpace: "nowrap", padding: "0.3rem 0.1rem", cursor: "pointer" }}
            onMouseEnter={e => e.target.style.color = "#94a3b8"}
            onMouseLeave={e => e.target.style.color = "#64748b"}>
            Report a problem
          </a>
        )}
        {/* Google Drive auth */}
        {!isSnapshot && (
          driveUser
            ? <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
                {driveUser.picture && <img src={driveUser.picture} alt="" style={{ width: 26, height: 26, borderRadius: "50%", border: "2px solid rgba(20,184,166,0.5)" }} />}
                <div style={{ fontSize: "0.72rem", lineHeight: 1.3 }}>
                  <div style={{ color: "#e2e8f0", fontWeight: 600 }}>{driveUser.name}</div>
                  <div style={{ color: "#64748b" }}>Drive connected</div>
                </div>
                <button onClick={driveSignOut} style={{ background: "rgba(255,255,255,0.08)", color: "#94a3b8", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 6, padding: "0.25rem 0.6rem", fontSize: "0.7rem", cursor: "pointer", fontFamily: "inherit" }}>Sign out</button>
              </div>
            : <button onClick={driveSignIn} disabled={driveStatus === "signing-in"}
                style={{ display: "flex", alignItems: "center", gap: "0.4rem", background: "white", color: "#374151", border: "none", borderRadius: 7, padding: "0.38rem 0.85rem", fontSize: "0.75rem", fontWeight: 600, cursor: "pointer", fontFamily: "inherit", boxShadow: "0 1px 4px rgba(0,0,0,0.25)" }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                {driveStatus === "signing-in" ? "Signing in…" : "Sign in with Google"}
              </button>
        )}
        </div>

        </div>
      </div>

      {/* ── HELP PANEL ── */}
      {helpOpen && (
        <HelpPanel onClose={() => setHelpOpen(false)} />
      )}

      {/* ── HOMEPAGE ── */}
      {view === "home" && (
        <div style={{ flex: 1, overflowY: "auto" }}>
          <div style={{ maxWidth: 900, margin: "0 auto", padding: "2.5rem 1.5rem" }}>

            {/* Welcome */}
            <div style={{ marginBottom: "2rem" }}>
              <h1 style={{ fontFamily: "'DM Serif Display', serif", fontWeight: 400, color: "#0f172a", fontSize: "1.75rem", margin: "0 0 0.4rem", letterSpacing: "-0.01em" }}>
                {driveUser && teams.length > 0
                  ? `Welcome back${driveUser.name ? ", " + driveUser.name.split(" ")[0] : ""}.`
                  : driveUser && teamsLoaded && teams.length === 0
                  ? `Welcome to Reach${driveUser.name ? ", " + driveUser.name.split(" ")[0] : ""}!`
                  : "Welcome to Reach."}
              </h1>
              <p style={{ color: "#64748b", fontSize: "0.9rem", margin: 0 }}>
                {driveUser && teams.length > 0
                  ? "Select a team to continue, or create a new one."
                  : driveUser && teamsLoaded && teams.length === 0
                  ? "Let's set up your first team."
                  : "Sign in with Google to get started."}
              </p>
            </div>

            {/* First-run onboarding — signed in, no teams yet */}
            {driveUser && teamsLoaded && teams.length === 0 && (
              <div style={{ background: "linear-gradient(135deg, #f0fdfa 0%, #f0f9ff 100%)", border: "1px solid #99f6e4", borderRadius: 14, padding: "1.75rem 2rem", marginBottom: "2rem" }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "1.5rem", marginBottom: "1.75rem" }}>
                  {[
                    { step: "1", icon: "👥", title: "Create a team", body: "A team is a group of teachers who teach the same course or grade level. Name it something like '8th Grade Math' or '9th Grade Science PLC'." },
                    { step: "2", icon: "📂", title: "Upload gradebook files", body: "Export gradebook CSVs from Infinite Campus, Canvas, PowerSchool, or any other system. Drop them in — Reach figures out the format." },
                    { step: "3", icon: "📊", title: "Generate your report", body: "Reach builds a PLC report with proficiency rates, at-risk students, subgroup gaps, and reassessment tracking — ready in seconds." },
                  ].map(({ step, icon, title, body }) => (
                    <div key={step} style={{ display: "flex", flexDirection: "column", gap: "0.5rem" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", marginBottom: "0.25rem" }}>
                        <div style={{ width: 24, height: 24, borderRadius: "50%", background: "#0f766e", color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "0.72rem", fontWeight: 800, flexShrink: 0 }}>{step}</div>
                        <span style={{ fontSize: "1.1rem" }}>{icon}</span>
                        <span style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.88rem" }}>{title}</span>
                      </div>
                      <p style={{ margin: 0, fontSize: "0.78rem", color: "#475569", lineHeight: 1.6 }}>{body}</p>
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", paddingTop: "1.25rem", borderTop: "1px solid #99f6e4" }}>
                  <span style={{ fontSize: "0.82rem", color: "#0f766e", fontWeight: 600 }}>Create your first team to get started:</span>
                  <input value={newTeamName} onChange={e => setNewTeamName(e.target.value)} onKeyDown={e => e.key === "Enter" && createTeam()}
                    placeholder="e.g. 8th Grade Math" autoFocus
                    style={{ flex: 1, border: "1px solid #99f6e4", borderRadius: 8, padding: "0.5rem 0.75rem", fontSize: "0.88rem", fontFamily: "inherit", outline: "none", background: "white" }} />
                  <button onClick={createTeam} disabled={!newTeamName.trim()}
                    style={{ background: newTeamName.trim() ? "linear-gradient(135deg, #0f766e, #0d9488)" : "#e2e8f0", color: newTeamName.trim() ? "white" : "#94a3b8", border: "none", borderRadius: 8, padding: "0.5rem 1.25rem", fontSize: "0.88rem", fontWeight: 700, cursor: newTeamName.trim() ? "pointer" : "not-allowed", fontFamily: "inherit", whiteSpace: "nowrap" }}>
                    Create Team →
                  </button>
                </div>
              </div>
            )}

            {/* Teams section — only show when there are teams */}
            {teams.length > 0 && (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "1rem" }}>
              <h2 style={{ fontFamily: "'Lora', serif", fontWeight: 700, color: "#0f172a", fontSize: "1rem", margin: 0 }}>
                Your Teams
              </h2>
            </div>

                <div style={{ background: "#f0fdfa", border: "1px solid #99f6e4", borderRadius: 8, padding: "0.35rem 0.75rem", fontWeight: 800, color: "#0f766e", fontSize: "1rem", minWidth: 56, textAlign: "center" }}>
                  {teamSettings.proficiencyThreshold}%

                { key: "level1", labelKey: "level1Label", countKey: "level1Count", colorKey: "level1Color", desc: "Initial at-risk flag", defaultLabel: "At Risk" },
                { key: "recovering", labelKey: "recoveringLabel", countKey: "recoveringCount", colorKey: "recoveringColor", desc: "Above threshold but previously at risk", defaultLabel: "Recovering" },

                      <button key={c} onClick={() => saveTeamSettings({ ...teamSettings, riskSettings: { ...teamSettings.riskSettings, [colorKey]: c } })}

            {key === "data" && <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="2" rx="0.5" fill="currentColor" opacity="0.6"/><rect x="1" y="7" width="14" height="2" rx="0.5" fill="currentColor" opacity="0.8"/><rect x="1" y="11" width="14" height="2" rx="0.5" fill="currentColor"/></svg>}
            {key === "analysis" && <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M1 12l4-4 3 2 4-5 3 2" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>}

          </button>

          </div>

                <button onClick={() => setActiveTab("analysis")} style={{ marginLeft: "auto", background: "linear-gradient(135deg, #0f766e, #0d9488)", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.1rem", fontSize: "0.82rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}>View Report →</button>
              </div>
            )}

            {/* ── STEP 1: PRIOR ANALYTICS ── */}
            {(() => {
              const stepDone = !!priorMap;
              const hasFiles = driveFiles.length > 0;

              // Sort files — most recently saved first
              // Files named {teamId}_{assessmentName}_Analytics.csv
              // activeTeam.lastAssessment tells us which assessment was most recently saved
              const sorted = [...driveFiles].sort((a, b) => {
                const lastName = activeTeam?.lastAssessment;
                const prefix = activeTeam ? activeTeam.id + "_" : "";

                const bIsLatest = lastName && b.name === `${prefix}${lastName}_Analytics.csv`;

                if (bIsLatest) return 1;

              const mostRecent = sorted[0];
              const older = sorted.slice(1);
              const showOlder = showOlderAnalytics;

              // Strip team prefix and _Analytics suffix for display
              const displayName = (f) => {

                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.92rem" }}>Prior Analytics <span style={{ fontWeight: 400, color: "#94a3b8", fontSize: "0.78rem" }}>— optional</span></div>

                                    </button>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>

                      </div>

                      </div>

                    {driveStatus === "loading" && <div style={{ marginTop: "0.5rem", fontSize: "0.75rem", color: "#0369a1" }}>⏳ {driveMsg}</div>}
                  </div>
                </div>

            })()}

            {/* ── STEP 2: SUBGROUPS ── */}
            {(() => {
              const stepDone = !!subgroupMap && Object.keys(subgroupMap).length > 0;
              return (
                <div style={{ background: "white", border: `1px solid ${stepDone ? "#86efac" : "#e2e8f0"}`, borderRadius: 12, marginBottom: "1rem", overflow: "hidden" }}>
                  <div style={{ padding: "1rem 1.25rem", borderBottom: "1px solid #f1f5f9", display: "flex", alignItems: "center", gap: "0.75rem" }}>
                    <div style={{ width: 28, height: 28, borderRadius: "50%", background: stepDone ? "#dcfce7" : "#f8fafc", border: `2px solid ${stepDone ? "#15803d" : "#cbd5e1"}`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: "0.8rem", color: stepDone ? "#15803d" : "#94a3b8", flexShrink: 0 }}>

                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.92rem" }}>Subgroup Data <span style={{ fontWeight: 400, color: "#94a3b8", fontSize: "0.78rem" }}>— optional</span></div>

                              placeholder={"Alexandra Ortega\nMohamed Ali #60131\nAsh Peterson"}
                              style={{ width: "100%", minHeight: 120, border: "1px solid #e2e8f0", borderRadius: 8, padding: "0.6rem 0.75rem", fontSize: "0.82rem", fontFamily: "inherit", resize: "vertical", outline: "none" }} />
                            <div style={{ display: "flex", gap: "0.5rem", marginTop: "0.5rem" }}>
                              <button onClick={parsePastedRoster} disabled={!sgPasteText.trim()}
                                style={{ background: sgPasteText.trim() ? "#0f766e" : "#e2e8f0", color: sgPasteText.trim() ? "white" : "#94a3b8", border: "none", borderRadius: 7, padding: "0.45rem 1rem", fontSize: "0.82rem", fontWeight: 700, cursor: sgPasteText.trim() ? "pointer" : "not-allowed", fontFamily: "inherit" }}>
                                Add Students →
                              </button>
                              <button onClick={() => setSgEditorMode("edit")} style={{ background: "none", border: "1px solid #e2e8f0", borderRadius: 7, padding: "0.45rem 0.75rem", fontSize: "0.78rem", fontWeight: 600, cursor: "pointer", fontFamily: "inherit", color: "#64748b" }}>Cancel</button>
                            </div>
                          </div>
                        )}

                        {/* Edit mode — student table */}
                        {sgEditorMode === "edit" && (
                          <div>
                            {/* Column manager */}
                            <div style={{ display: "flex", flexWrap: "wrap", gap: "0.4rem", alignItems: "center", marginBottom: "0.75rem" }}>
                              <span style={{ fontSize: "0.72rem", fontWeight: 700, color: "#475569", textTransform: "uppercase", letterSpacing: "0.05em" }}>Subgroups:</span>
                              {sgColumns.map(col => (
                                <span key={col} style={{ display: "flex", alignItems: "center", gap: "0.25rem", background: "#f0fdfa", border: "1px solid #99f6e4", borderRadius: 20, padding: "0.15rem 0.5rem", fontSize: "0.72rem", fontWeight: 600, color: "#0f766e" }}>
                                  {col}
                                  <button onClick={() => removeSgColumn(col)} style={{ background: "none", border: "none", color: "#94a3b8", cursor: "pointer", padding: 0, fontSize: "0.7rem", lineHeight: 1 }}>✕</button>
                                </span>
                              ))}
                              <div style={{ display: "flex", alignItems: "center", gap: "0.3rem" }}>
                                <input value={sgNewCol} onChange={e => setSgNewCol(e.target.value)} onKeyDown={e => e.key === "Enter" && addSgColumn()}
                                  placeholder="+ Add subgroup" style={{ border: "1px dashed #cbd5e1", borderRadius: 20, padding: "0.15rem 0.6rem", fontSize: "0.72rem", fontFamily: "inherit", outline: "none", width: 130 }} />
                                {sgNewCol.trim() && <button onClick={addSgColumn} style={{ background: "#0f766e", color: "white", border: "none", borderRadius: 20, padding: "0.15rem 0.55rem", fontSize: "0.7rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>Add</button>}
                              </div>
                            </div>

                            {/* Student table */}
                            {sgStudents.length === 0 ? (
                              <div style={{ textAlign: "center", padding: "1.5rem", color: "#94a3b8", fontSize: "0.82rem" }}>
                                No students yet.
                                <button onClick={() => setSgEditorMode("paste")} style={{ background: "none", border: "none", color: "#0f766e", cursor: "pointer", fontFamily: "inherit", fontWeight: 600, fontSize: "0.82rem", marginLeft: "0.25rem" }}>Paste a class roster →</button>
                              </div>
                            ) : (
                              <div style={{ border: "1px solid #e2e8f0", borderRadius: 8, overflow: "hidden", marginBottom: "0.75rem" }}>
                                <div style={{ overflowX: "auto", maxHeight: 380, overflowY: "auto" }}>
                                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.78rem" }}>
                                    <thead style={{ position: "sticky", top: 0, zIndex: 1 }}>
                                      <tr style={{ background: "#f8fafc" }}>
                                        <th style={{ padding: "0.5rem 0.75rem", textAlign: "left", fontWeight: 700, color: "#374151", borderBottom: "2px solid #e2e8f0", whiteSpace: "nowrap" }}>Student</th>
                                        {sgColumns.map(col => (
                                          <th key={col} style={{ padding: "0.5rem 0.5rem", textAlign: "center", fontWeight: 700, color: "#374151", borderBottom: "2px solid #e2e8f0", whiteSpace: "nowrap", fontSize: "0.7rem" }}>{col}</th>
                                        ))}
                                        <th style={{ padding: "0.5rem 0.5rem", borderBottom: "2px solid #e2e8f0", width: 28 }}></th>
                                      </tr>
                                    </thead>
                                    <tbody>
                                      {sgStudents.map((s, si) => (
                                        <tr key={si} style={{ borderBottom: "1px solid #f1f5f9", background: s.isNew ? "#fefce8" : si % 2 === 0 ? "white" : "#fafafa" }}>
                                          <td style={{ padding: "0.4rem 0.75rem", fontWeight: 500, whiteSpace: "nowrap" }}>
                                            {s.name}
                                            {s.isNew && <span style={{ marginLeft: "0.4rem", fontSize: "0.62rem", background: "#fef9c3", color: "#92400e", borderRadius: 4, padding: "0.05rem 0.3rem", fontWeight: 700 }}>new</span>}
                                          </td>
                                          {sgColumns.map(col => (
                                            <td key={col} style={{ padding: "0.4rem 0.5rem", textAlign: "center" }}>
                                              <input type="checkbox" checked={s.subgroups.includes(col)} onChange={() => toggleSgStudentGroup(si, col)} style={{ cursor: "pointer", width: 15, height: 15 }} />
                                            </td>
                                          ))}
                                          <td style={{ padding: "0.4rem 0.5rem", textAlign: "center" }}>
                                            <button onClick={() => setSgStudents(prev => prev.filter((_, i) => i !== si))} style={{ background: "none", border: "none", color: "#cbd5e1", cursor: "pointer", fontSize: "0.8rem", padding: 0, lineHeight: 1 }}
                                              onMouseEnter={e => e.currentTarget.style.color = "#dc2626"} onMouseLeave={e => e.currentTarget.style.color = "#cbd5e1"}>✕</button>
                                          </td>
                                        </tr>
                                      ))}
                                    </tbody>
                                  </table>
                                </div>
                              </div>
                            )}

                            <div style={{ display: "flex", gap: "0.5rem", alignItems: "center", flexWrap: "wrap" }}>
                              <button onClick={commitSgEditor}
                                style={{ background: "linear-gradient(135deg, #0f766e, #0d9488)", color: "white", border: "none", borderRadius: 8, padding: "0.5rem 1.2rem", fontSize: "0.85rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                                {subgroupMap ? "Save Changes" : "Save Subgroups"}
                                {driveUser && <span style={{ opacity: 0.85, marginLeft: "0.3rem", fontSize: "0.75rem" }}>· syncs to Drive</span>}
                              </button>
                              <button onClick={() => setSgEditorMode("paste")}
                                style={{ background: "white", border: "1px solid #e2e8f0", borderRadius: 8, padding: "0.5rem 0.9rem", fontSize: "0.8rem", fontWeight: 600, cursor: "pointer", fontFamily: "inherit", color: "#475569" }}>
                                + Paste more students
                              </button>
                              <button onClick={() => setSgEditorOpen(false)}
                                style={{ background: "none", border: "none", color: "#94a3b8", cursor: "pointer", fontFamily: "inherit", fontSize: "0.78rem", padding: 0 }}>
                                Cancel
                              </button>
                            </div>
                          </div>
                        )}
                      </div>
                    ) : (
                      /* Editor closed — show status + actions */
                      <div>
                        {stepDone ? (
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "#f0fdf4", borderRadius: 8, padding: "0.65rem 1rem", border: "1px solid #86efac", flexWrap: "wrap", gap: "0.5rem" }}>
                            <div>
                              <span style={{ fontWeight: 600, color: "#15803d", fontSize: "0.82rem" }}>✓ {Object.keys(subgroupMap).length} students · {[...new Set(Object.values(subgroupMap).flatMap(s => s.subgroups))].join(", ") || "no subgroups assigned"}</span>
                              {subgroupFromDrive && <span style={{ fontSize: "0.7rem", color: "#64748b", marginLeft: "0.5rem" }}>loaded from Drive</span>}
                            </div>
                            <div style={{ display: "flex", gap: "0.5rem" }}>
                              <button onClick={openSgEditor} style={{ background: "white", border: "1px solid #86efac", borderRadius: 6, padding: "0.3rem 0.75rem", fontSize: "0.75rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", color: "#15803d" }}>Edit</button>
                              <button onClick={() => { setSubgroupMap(null); setSubgroupFromDrive(false); }} style={{ background: "white", border: "1px solid #e2e8f0", borderRadius: 6, padding: "0.3rem 0.75rem", fontSize: "0.75rem", fontWeight: 600, cursor: "pointer", fontFamily: "inherit", color: "#64748b" }}>Remove</button>
                            </div>
                          </div>
                        ) : (
                          <div style={{ display: "flex", gap: "0.75rem", flexWrap: "wrap" }}>
                            {/* Drop zone for CSV */}
                            <div style={{ flex: 1, minWidth: 200, border: "2px dashed #cbd5e1", borderRadius: 10, padding: "1rem", textAlign: "center", cursor: "pointer", background: "#f8fafc" }}
                              onClick={() => document.getElementById("sgFileIn").click()}
                              onDragOver={e => e.preventDefault()}
                              onDrop={e => { e.preventDefault(); processFiles(e.dataTransfer.files); }}>
                              <div style={{ fontSize: "1.25rem", marginBottom: "0.25rem" }}>📄</div>
                              <div style={{ fontWeight: 600, color: "#374151", fontSize: "0.8rem", marginBottom: "0.15rem" }}>Upload subgroup CSV</div>
                              <div style={{ fontSize: "0.7rem", color: "#94a3b8" }}>IC format or wide column format</div>
                              <input id="sgFileIn" type="file" accept=".csv" onChange={e => processFiles(e.target.files)} style={{ display: "none" }} />
                            </div>
                            {/* Divider */}
                            <div style={{ display: "flex", alignItems: "center", color: "#94a3b8", fontSize: "0.75rem", fontWeight: 600 }}>or</div>
                            {/* Build in app */}
                            <div style={{ flex: 1, minWidth: 200, border: "2px dashed #99f6e4", borderRadius: 10, padding: "1rem", textAlign: "center", cursor: "pointer", background: "#f0fdfa" }}
                              onClick={() => { setSgStudents([]); setSgColumns([...DEFAULT_SUBGROUPS]); setSgEditorMode("paste"); setSgEditorOpen(true); }}>
                              <div style={{ fontSize: "1.25rem", marginBottom: "0.25rem" }}>✏️</div>
                              <div style={{ fontWeight: 600, color: "#0f766e", fontSize: "0.8rem", marginBottom: "0.15rem" }}>Build subgroup list</div>
                              <div style={{ fontSize: "0.7rem", color: "#64748b" }}>Paste a class roster and assign subgroups</div>
                            </div>
                          </div>
                        )}

                        {/* Drive subgroup file available but not loaded */}
                        {driveSubgroupFile && !stepDone && (
                          <div style={{ marginTop: "0.75rem", display: "flex", alignItems: "center", justifyContent: "space-between", background: "#f0f9ff", borderRadius: 8, padding: "0.6rem 0.9rem", border: "1px solid #bae6fd" }}>
                            <span style={{ fontSize: "0.78rem", color: "#0c4a6e" }}>📄 Saved subgroup file found in Drive</span>
                            <button onClick={driveLoadSubgroups} disabled={driveStatus === "loading"}
                              style={{ background: "#0369a1", color: "white", border: "none", borderRadius: 6, padding: "0.3rem 0.75rem", fontSize: "0.75rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                              Load
                            </button>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              );
            })()}

            {/* ── STEP 3: GRADEBOOK DATA ── */}
            {(() => {
              const stepDone = sections.length > 0 && pendingMismatches.length === 0 && !pendingMapping;
              return (
                <div style={{ background: "white", border: `1px solid ${stepDone ? "#86efac" : "#e2e8f0"}`, borderRadius: 12, marginBottom: "1rem", overflow: "hidden" }}>
                  {/* Step header */}
                  <div style={{ padding: "1rem 1.25rem", borderBottom: "1px solid #f1f5f9", display: "flex", alignItems: "center", gap: "0.75rem" }}>
                    <div style={{ width: 28, height: 28, borderRadius: "50%", background: stepDone ? "#dcfce7" : "#f0fdfa", border: `2px solid ${stepDone ? "#15803d" : "#0f766e"}`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: "0.8rem", color: stepDone ? "#15803d" : "#0f766e", flexShrink: 0 }}>
                      {stepDone ? "✓" : "3"}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, color: "#0f172a", fontSize: "0.92rem" }}>Gradebook Data</div>
                      <div style={{ fontSize: "0.72rem", color: "#64748b", display: "flex", alignItems: "center", gap: "0.5rem", flexWrap: "wrap" }}>
                        Upload gradebook exports — IC, Canvas, PowerSchool, or any CSV format
                        {Object.keys(fileLabels).length > 0 && (
                          <button onClick={() => {
                            setFileLabels({});
                            setNameMap({});
                            withToken(async (token) => {
                              await Promise.all([
                                driveUpsertJSON(token, "reach_file_labels.json", "{}"),
                                driveUpsertJSON(token, "reach_namemap.json", "{}"),
                              ]);
                            });
                          }} style={{ background: "none", border: "none", color: "#94a3b8", cursor: "pointer", fontFamily: "inherit", fontSize: "0.68rem", padding: 0, textDecoration: "underline", whiteSpace: "nowrap" }}>
                            Reset saved labels
                          </button>
                        )}
                        {Object.keys(columnMappings).filter(k => !k.startsWith("loose:")).length > 0 && (
                          <button onClick={() => setSavedMappingsOpen(v => !v)}
                            style={{ background: "none", border: "none", color: "#94a3b8", cursor: "pointer", fontFamily: "inherit", fontSize: "0.68rem", padding: 0, textDecoration: "underline", whiteSpace: "nowrap" }}>
                            {savedMappingsOpen ? "Hide" : "Manage"} saved formats ({Object.keys(columnMappings).filter(k => !k.startsWith("loose:")).length})
                          </button>
                        )}
                      </div>

                      {/* Saved mappings manager */}
                      {savedMappingsOpen && (
                        <div style={{ marginTop: "0.5rem", background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 8, padding: "0.75rem 1rem" }}>
                          <div style={{ fontSize: "0.72rem", fontWeight: 700, color: "#475569", marginBottom: "0.5rem", textTransform: "uppercase", letterSpacing: "0.05em" }}>Saved CSV Formats</div>
                          <div style={{ display: "flex", flexDirection: "column", gap: "0.35rem" }}>
                            {Object.entries(columnMappings).filter(([k]) => !k.startsWith("loose:")).map(([fp, m]) => (
                              <div key={fp} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "white", borderRadius: 6, padding: "0.4rem 0.6rem", border: "1px solid #e2e8f0" }}>
                                <div>
                                  <span style={{ fontSize: "0.75rem", fontWeight: 600, color: "#374151" }}>{m._sourceName || "Unknown format"}</span>
                                  {m._savedAt && <span style={{ fontSize: "0.68rem", color: "#94a3b8", marginLeft: "0.5rem" }}>saved {m._savedAt}</span>}
                                  <div style={{ fontSize: "0.68rem", color: "#64748b", marginTop: "0.1rem" }}>
                                    {m.assessmentCols?.length || 0} score column{(m.assessmentCols?.length || 0) !== 1 ? "s" : ""} · name in col {m.nameCol + 1}
                                    {m.sectionCol !== null && m.sectionCol !== undefined ? ` · section in col ${m.sectionCol + 1}` : " · one section per file"}
                                  </div>
                                </div>
                                <button onClick={() => {
                                  const updated = Object.fromEntries(Object.entries(columnMappings).filter(([k]) => k !== fp && !(columnMappings[k] === m)));
                                  setColumnMappings(updated);
                                  if (driveUser?.accessToken) driveSaveMappings(updated);
                                }} style={{ background: "none", border: "1px solid #fca5a5", borderRadius: 5, padding: "0.2rem 0.5rem", fontSize: "0.68rem", color: "#dc2626", cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}>
                                  Delete
                                </button>
                              </div>
                            ))}
                          </div>
                          <div style={{ fontSize: "0.68rem", color: "#94a3b8", marginTop: "0.5rem" }}>
                            Deleting a saved format means Reach will ask you to re-map the next file with that structure.
                          </div>
                        </div>
                      )}
                    </div>
                    {stepDone && (
                      <div style={{ fontSize: "0.75rem", color: "#15803d", fontWeight: 600 }}>
                        {sections.length} section{sections.length !== 1 ? "s" : ""} · {sections.reduce((n, s) => n + s.students.length, 0)} students · <strong>{resolve(currentAssessmentName)}</strong>
                      </div>
                    )}
                  </div>

                  <div style={{ padding: "1rem 1.25rem" }}>
                    {/* Drop zone */}
                    <div
                      onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                      onDragLeave={() => setDragOver(false)}
                      onDrop={onDrop}
                      onClick={() => document.getElementById("fileIn").click()}
                      style={{ border: `2px dashed ${dragOver ? "#0f766e" : "#cbd5e1"}`, borderRadius: 10, padding: "1.5rem", textAlign: "center", cursor: "pointer", background: dragOver ? "#f0fdfa" : "#f8fafc", transition: "all 0.2s", marginBottom: sections.length ? "0.75rem" : 0 }}>
                      <div style={{ fontSize: "1.5rem", marginBottom: "0.3rem" }}>📂</div>
                      <div style={{ fontWeight: 600, color: "#374151", fontSize: "0.85rem", marginBottom: "0.2rem" }}>
                        {sections.length ? "Drop more files or click to add" : "Drop gradebook CSV files here or click to browse"}
                      </div>
                      <div style={{ color: "#94a3b8", fontSize: "0.75rem" }}>IC, Canvas Quiz Student, PowerSchool, Skyward, and more — multiple files at once</div>
                      <input id="fileIn" type="file" accept=".csv" multiple onChange={e => processFiles(e.target.files)} style={{ display: "none" }} />
                    </div>

                    {/* Loaded sections list */}
                    {sections.length > 0 && (
                      <div style={{ display: "flex", flexDirection: "column", gap: "0.5rem", marginBottom: "0.75rem" }}>
                        {sections.map(s => {
                          const renaming = pendingRenames[s.teacherLabel];
                          return (
                            <div key={s.teacherLabel}>
                              <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", background: s._needsRename ? "#fffbeb" : "#f0fdfa", borderRadius: 7, padding: "0.45rem 0.75rem", border: `1px solid ${s._needsRename ? "#fde68a" : "#99f6e4"}` }}>
                                <span style={{ fontSize: "0.82rem", fontWeight: 600, color: s._needsRename ? "#92400e" : "#0f766e", flex: 1 }}>
                                  {s.teacherName || s.teacherLabel}
                                  {s.teacherLabel !== (s.teacherName || s.teacherLabel) && (
                                    <span style={{ fontWeight: 400, color: "#94a3b8", fontSize: "0.72rem", marginLeft: "0.35rem" }}>({s.teacherLabel})</span>
                                  )}
                                </span>
                                <span style={{ fontSize: "0.72rem", color: "#64748b" }}>{s.students.length} students</span>
                                <span style={{ fontSize: "0.68rem", background: s._needsRename ? "#fef9c3" : "#e0f7f4", color: s._needsRename ? "#92400e" : "#0f766e", borderRadius: 4, padding: "0.1rem 0.4rem", fontWeight: 600 }}>{s.currentAssessment}</span>
                                {s._needsRename && !renaming && (
                                  <button onClick={() => setPendingRenames(prev => ({ ...prev, [s.teacherLabel]: { teacherName: s.teacherName, label: s.teacherLabel, previewStudents: (parsedSection => (parsedSection?.students || []).slice(0,5).map(st=>st.name))(s) } }))}
                                    style={{ background: "#d97706", color: "white", border: "none", borderRadius: 5, padding: "0.2rem 0.55rem", fontSize: "0.7rem", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}>
                                    ✏️ Name this section
                                  </button>
                                )}
                                <button onClick={() => setSections(prev => prev.filter(x => x.teacherLabel !== s.teacherLabel))} style={{ background: "none", border: "none", color: "#94a3b8", cursor: "pointer", fontSize: "0.85rem", padding: 0, lineHeight: 1 }}>✕</button>
                              </div>

                              {/* Inline rename UI */}
                              {renaming && (
                                <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderTop: "none", borderRadius: "0 0 8px 8px", padding: "0.85rem 0.75rem", display: "flex", flexDirection: "column", gap: "0.65rem" }}>

                                  {/* Student preview */}
                                  {renaming.previewStudents?.length > 0 && (
                                    <div>
                                      <div style={{ fontSize: "0.7rem", fontWeight: 700, color: "#78350f", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "0.3rem" }}>Students in this file</div>
                                      <div style={{ display: "flex", flexWrap: "wrap", gap: "0.25rem" }}>
                                        {renaming.previewStudents.map((n, i) => (
                                          <span key={i} style={{ background: "white", border: "1px solid #fde68a", borderRadius: 20, padding: "0.12rem 0.5rem", fontSize: "0.72rem", color: "#92400e" }}>{n}</span>
                                        ))}
                                        {s.students.length > 5 && <span style={{ fontSize: "0.72rem", color: "#94a3b8", padding: "0.12rem 0.25rem" }}>+{s.students.length - 5} more</span>}
                                      </div>
                                    </div>
                                  )}

                                  {/* Source hint */}
                                  {renaming.source && (
                                    <div style={{ fontSize: "0.72rem", color: "#78350f", background: "white", borderRadius: 6, padding: "0.3rem 0.6rem", border: "1px solid #fde68a" }}>
                                      <span style={{ fontWeight: 700 }}>From file: </span>{renaming.source}
                                    </div>
                                  )}

                                  <div style={{ fontSize: "0.75rem", color: "#92400e", fontWeight: 600 }}>
                                    Confirm or edit the teacher and section name — Reach will remember this for next time.
                                  </div>

                                  <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", alignItems: "flex-end" }}>
                                    <div style={{ flex: 1, minWidth: 140 }}>
                                      <label style={{ display: "block", fontSize: "0.7rem", fontWeight: 700, color: "#78350f", marginBottom: "0.2rem", textTransform: "uppercase", letterSpacing: "0.05em" }}>Teacher Name</label>
                                      <input value={renaming.teacherName} onChange={e => setPendingRenames(prev => ({ ...prev, [s.teacherLabel]: { ...prev[s.teacherLabel], teacherName: e.target.value } }))}
                                        placeholder="e.g. Smith" style={{ width: "100%", border: "1px solid #fde68a", borderRadius: 6, padding: "0.35rem 0.6rem", fontSize: "0.82rem", fontFamily: "inherit", outline: "none", background: "white" }} />
                                    </div>
                                    <div style={{ flex: 1, minWidth: 140 }}>
                                      <label style={{ display: "block", fontSize: "0.7rem", fontWeight: 700, color: "#78350f", marginBottom: "0.2rem", textTransform: "uppercase", letterSpacing: "0.05em" }}>Section Label</label>
                                      <input value={renaming.label} onChange={e => setPendingRenames(prev => ({ ...prev, [s.teacherLabel]: { ...prev[s.teacherLabel], label: e.target.value } }))}
                                        placeholder="e.g. Smith Period 1" style={{ width: "100%", border: "1px solid #fde68a", borderRadius: 6, padding: "0.35rem 0.6rem", fontSize: "0.82rem", fontFamily: "inherit", outline: "none", background: "white" }} />
                                    </div>
                                    <button onClick={() => confirmRename(s.teacherLabel, renaming.teacherName.trim(), renaming.label.trim(), s._fingerprint)}
                                      disabled={!renaming.teacherName.trim()}
                                      style={{ background: renaming.teacherName.trim() ? "#0f766e" : "#e2e8f0", color: renaming.teacherName.trim() ? "white" : "#94a3b8", border: "none", borderRadius: 7, padding: "0.35rem 0.9rem", fontSize: "0.8rem", fontWeight: 700, cursor: renaming.teacherName.trim() ? "pointer" : "not-allowed", fontFamily: "inherit", whiteSpace: "nowrap" }}>
                                      Confirm & Remember
                                    </button>
                                    <button onClick={() => { setPendingRenames(prev => { const n = { ...prev }; delete n[s.teacherLabel]; return n; }); setSections(prev => prev.map(x => x.teacherLabel === s.teacherLabel ? { ...x, _needsRename: false } : x)); }}
                                      style={{ background: "none", border: "none", color: "#94a3b8", cursor: "pointer", fontFamily: "inherit", fontSize: "0.75rem", padding: 0 }}>
                                      Skip
                                    </button>
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {/* Column mapping UI */}
                    {pendingMapping && (
                      <ColumnMappingUI rows={pendingMapping.rows} fileName={pendingMapping.fileName} onConfirm={confirmMapping} onCancel={() => setPendingMapping(null)} />
                    )}

                    {/* Mismatch resolver */}
                    {pendingMismatches.length > 0 && (
                      <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 10, padding: "1rem 1.25rem", marginTop: "0.75rem" }}>
                        <div style={{ fontWeight: 700, color: "#92400e", fontSize: "0.88rem", marginBottom: "0.25rem" }}>⚠️ Assessment name mismatch detected</div>
                        <p style={{ fontSize: "0.78rem", color: "#78350f", margin: "0 0 0.75rem", lineHeight: 1.5 }}>Teachers are using different names for the same assessment. Set a canonical name for each — saved automatically so you only need to do this once.</p>

                    // We'll show a dotted line across the chart at the threshold position
                    // Position = fraction of the threshold within its grade band

                    // Find which column the threshold sits in

                          const isThreshBand = bi === threshBandIdx;
                          // Within the band, where does the threshold sit? (0=bottom, 1=top of band)
                          const bandRange = hi - lo + 1;
                          const posInBand = (thresh - lo) / bandRange; // 0–1 from bottom of band
                          return (
                            <div key={g} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: "0.2rem", position: "relative" }}>
